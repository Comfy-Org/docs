          type: string
        size: 
          description: 이미지 크기 (지원되지 않음)
          type: string
        style: 
          description: 이미지 스타일 (지원되지 않음)
          type: string
        user: 
          description: "최종 사용자를 나타내는 고유 식별자로, xAI가 남용을 모니터링하고 탐지하는 데 도움이 될 수 있습니다."
          type: string
      required: 
        - prompt
      type: object
    XAIImageGenerationRequest: 
      description: xAI Grok Imagine 이미지 생성을 위한 요청 본문
      properties: 
        aspect_ratio: 
          default: auto
          description: 생성된 이미지의 종횡비. 프롬프트에 가장 적합한 비율을 자동으로 선택하기 위해 기본값은 auto입니다.
          enum: 
            - 1:1
            - 3:4
            - 4:3
            - 9:16
            - 16:9
            - 2:3
            - 3:2
            - 9:19.5
            - 19.5:9
            - 9:20
            - 20:9
            - 1:2
            - 2:1
            - auto
          type: string
        model: 
          default: grok-imagine-image
          description: 사용할 모델
          type: string
        "n": 
          default: 1
          description: 생성할 이미지 수
          maximum: 10
          minimum: 1
          type: integer
        prompt: 
          description: 이미지 생성을 위한 프롬프트
          type: string
        quality: 
          description: "출력 이미지의 품질. 현재는 아무 작업도 하지 않으며, 향후 사용을 위해 예약되어 있습니다."
          enum: 
            - low
            - medium
            - high
          type: string
        resolution: 
          default: 1k
          description: 생성된 이미지의 해상도. 기본값은 1k입니다.
          enum: 
            - 1k
            - 2k
          type: string
        response_format: 
          default: url
          description: 이미지를 반환할 응답 형식. url 또는 b64_json일 수 있습니다.
          enum: 
            - url
            - b64_json
          type: string
        size: 
          description: 이미지 크기 (지원되지 않음)
          type: string
        style: 
          description: 이미지 스타일 (지원되지 않음)
          type: string
        user: 
          description: "최종 사용자를 나타내는 고유 식별자로, xAI가 남용을 모니터링하고 탐지하는 데 도움이 될 수 있습니다."
          type: string
      required: 
        - prompt
      type: object
    XAIImageGenerationResponse: 
      description: xAI 이미지 생성 또는 편집의 응답
      properties: 
        block_reason: 
          description: "요청이 입력 검열에 의해 차단된 경우, 차단 이유를 포함합니다."
          type: string
        data: 
          description: 생성된 이미지 객체 목록
          items: 
            $ref: "#/components/schemas/XAIGeneratedImage"
          type: array
        usage: 
          $ref: "#/components/schemas/XAIImageUsage"
      type: object
    XAIImageObject: 
      description: xAI 엔드포인트를 위한 입력 이미지 객체
      properties: 
        type: 
          description: 이미지 입력 유형
          enum: 
            - image_url
          type: string
        url: 
          description: 입력 이미지의 URL (공개 URL 또는 base64로 인코딩된 데이터 URI)
          type: string
      required: 
        - url
      type: object
    XAIImageUsage: 
      description: 이미지 생성 요청에 대한 사용 정보
      properties: 
        cost_in_usd_ticks: 
          description: "이 요청의 USD 틱 단위 정확한 비용 (10,000,000,000 틱 = 1 USD)"
          type: integer
      type: object
    XAIReferenceImageObject: 
      description: R2V 모드에서 비디오 생성을 안내하는 데 사용되는 레퍼런스 이미지
      properties: 
        url: 
          description: "레퍼런스 이미지의 URL. HTTPS URL(공개) 또는 base64로 인코딩된 데이터 URL(예: data:image/jpeg;base64,...)을 지원합니다."
          type: string
      required: 
        - url
      type: object
    XAIVideoAsyncResponse: 
      description: xAI 비디오 생성 또는 편집의 응답 (비동기 작업)
      properties: 
        request_id: 
          description: 완료된 비디오를 폴링하기 위한 고유 식별자
          type: string
      type: object
    XAIVideoEditRequest: 
      description: xAI Grok Imagine 비디오 편집을 위한 요청 본문
      properties: 
        model: 
          description: 사용할 모델
          nullable: true
          type: string
        output: 
          description: 생성된 비디오의 선택적 출력 대상
          nullable: true
          type: object
        prompt: 
          description: 비디오 편집을 위한 프롬프트
          type: string
        user: 
          description: 최종 사용자를 나타내는 고유 식별자
          nullable: true
          type: string
        video: 
          $ref: "#/components/schemas/XAIVideoObject"
      required: 
        - prompt
        - video
      type: object
    XAIVideoExtensionRequest: 
      description: xAI Grok Imagine 비디오 확장을 위한 요청 본문
      properties: 
        duration: 
          default: 6
          description: "확장의 길이(초). 범위 [2, 10]. 기본값 6."
          maximum: 10
          minimum: 2
          nullable: true
          type: integer
        model: 
          description: 사용할 모델
          nullable: true
          type: string
        prompt: 
          description: 비디오에서 다음에 발생해야 하는 상황에 대한 텍스트 설명
          type: string
        video: 
          $ref: "#/components/schemas/XAIVideoObject"
      required: 
        - prompt
        - video
      type: object
    XAIVideoGenerationRequest: 
      description: "xAI Grok Imagine 비디오 생성을 위한 요청 본문.\n세 가지 모드를 지원합니다: 텍스트 기반 비디오 생성(프롬프트만), 이미지 기반 비디오 생성(프롬프트 + 이미지),\n그리고 레퍼런스 기반 비디오 생성(프롬프트 + reference_images).\n필드 image, reference_images 및 video는 상호 배타적입니다.\n"
      properties: 
        aspect_ratio: 
          default: 16:9
          description: 생성된 비디오의 종횡비
          enum: 
            - 1:1
            - 16:9
            - 9:16
            - 4:3
            - 3:4
            - 3:2
            - 2:3
          type: string
        duration: 
          default: 8
          description: "비디오 길이(초). 범위 [1, 15]. 기본값 8."
          maximum: 15
          minimum: 1
          nullable: true
          type: integer
        image: 
          $ref: "#/components/schemas/XAIImageObject"
        model: 
          description: 사용할 모델
          type: string
        output: 
          description: 생성된 비디오의 선택적 출력 대상
          nullable: true
          type: object
        prompt: 
          description: "비디오 생성용 프롬프트. 최대 4,096자."
          type: string
        reference_images: 
          description: 비디오 생성을 안내하는 하나 이상의 레퍼런스 이미지 (레퍼런스 기반 비디오 생성 모드). image 및 video와 상호 배타적입니다.
          items: 
            $ref: "#/components/schemas/XAIReferenceImageObject"
          type: array
        resolution: 
          description: 출력 비디오의 해상도
          nullable: true
          type: string
        size: 
          description: 출력 비디오의 크기
          nullable: true
          type: string
        user: 
          description: 최종 사용자를 나타내는 고유 식별자
          nullable: true
          type: string
      required: 
        - prompt
      type: object
    XAIVideoObject: 
      description: xAI 엔드포인트를 위한 입력 비디오 객체
      properties: 
        url: 
          description: "비디오의 URL (공개 URL 또는 base64로 인코딩된 데이터 URL). 비디오는 .mp4 파일 확장자를 가져야 하며 H.265, H.264, AV1 등과 같은 .mp4 지원 코덱으로 인코딩되어야 합니다."
          type: string
      required: 
        - url
      type: object
    XAIVideoResultResponse: 
      description: 비디오 생성 결과 응답
      properties: 
        block_reason: 
          description: 요청이 입력 모더레이션에 의해 차단된 경우 차단 이유를 포함합니다.
          nullable: true
          type: string
        model: 
          description: 비디오를 생성하는 데 사용된 모델
          type: string
        status: 
          description: "지연된 요청의 상태: \"pending\" 또는 \"done\""
          enum: 
            - pending
            - done
          type: string
        usage: 
          $ref: "#/components/schemas/XAIVideoUsage"
        video: 
          $ref: "#/components/schemas/XAIGeneratedVideo"
      type: object
    XAIVideoUsage: 
      description: 비디오 생성 요청에 대한 사용 정보
      properties: 
        cost_in_usd_ticks: 
          description: "이 요청의 비용은 USD 틱으로 표시됩니다. 1 USD 센트는 100,000,000 틱에 해당하며, 따라서 1 미국 달러는 10,000,000,000 틱에 해당합니다.\n"
          type: integer
      type: object
  securitySchemes: 
    BearerAuth: 
      bearerFormat: JWT
      scheme: bearer
      type: http
info: 
  title: Comfy API
  version: "1.0"
openapi: 3.0.2
paths: 
  "/admin/customers/{customer_id}/archive-metronome-data": 
    post: 
      description: Metronome 데이터를 보관합니다. https://docs.metronome.com/api-reference/customers/archive-a-customer를 참조하세요.
      operationId: PostAdminArchiveMetronomeData
      parameters: 
        - description: Metronome 데이터를 보관할 고객의 ID
          in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - description: 이 요청을 승인하는 데 사용되는 관리자 API 시크릿
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    description: 성공 메시지
                    type: string
                type: object
          description: Metronome 데이터가 성공적으로 보관됨
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 잘못된 요청 - 필수 매개변수 누락됨
        "401": 
          description: 인증되지 않음 또는 관리자 API 시크릿 누락됨
        "404": 
          description: 고객을 찾을 수 없음
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 고객 Metronome 데이터 보관
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/balance": 
    get: 
      description: 지정된 고객의 현재 남은 잔액을 microamount와 통화로 반환합니다.
      operationId: GetAdminCustomerBalance
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  amount_micros: 
                    format: double
                    type: number
                  cloud_credit_balance_micros: 
                    format: double
                    type: number
                  currency: 
                    type: string
                  effective_balance_micros: 
                    format: double
                    type: number
                  pending_charges_micros: 
                    format: double
                    type: number
                  prepaid_balance_micros: 
                    format: double
                    type: number
                required: 
                  - amount_micros
                  - currency
                type: object
          description: 고객 잔액을 성공적으로 검색함
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 인증되지 않음
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 고객을 찾을 수 없음
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 관리자가 고객의 남은 잔액 조회
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/cloud-subscription-status": 
    get: 
      description: 관리자가 특정 고객의 클라우드 구독 상태를 확인할 수 있습니다.
      operationId: GetAdminCustomerCloudSubscriptionStatus
      parameters: 
        - description: 구독 상태를 검색할 고객의 ID
          in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - description: 이 요청을 승인하는 데 사용되는 관리자 API 시크릿
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  end_date: 
                    description: 구독 종료 예정 날짜 (ISO 8601 형식)
                    format: date-time
                    nullable: true
                    type: string
                  has_fund: 
                    description: 고객이 사용 가능한 자금/크레딧을 보유하고 있는지 여부
                    type: boolean
                  is_active: 
                    description: 고객이 활성 클라우드 구독을 보유하고 있는지 여부
                    type: boolean
                  renewal_date: 
                    description: 구독의 다음 갱신 날짜 (ISO 8601 형식)
                    format: date-time
                    nullable: true
                    type: string
                  subscription_duration: 
                    allOf: 
                      - $ref: "#/components/schemas/SubscriptionDuration"
                    nullable: true
                  subscription_id: 
                    description: 존재하는 경우 활성 구독 ID
                    nullable: true
                    type: string
                  subscription_tier: 
                    allOf: 
                      - $ref: "#/components/schemas/SubscriptionTier"
                    nullable: true
                type: object
          description: 클라우드 구독 상태를 성공적으로 검색했습니다
        "401": 
          description: 인증되지 않음 또는 관리자 API 시크릿 누락
        "404": 
          description: 고객을 찾을 수 없음
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 관리자가 클라우드 구독 상태 확인
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/partner-node-concurrency-override": 
    delete: 
      description: "재정의를 지웁니다(NULL로 설정). 그러면 고객의 제한이 지출 엔진으로 되돌아갑니다.\n"
      operationId: ClearAdminCustomerConcurrencyOverride
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    type: string
                type: object
          description: 재정의가 성공적으로 지워졌습니다
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 인증되지 않음
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 고객을 찾을 수 없음
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 관리자가 고객의 파트너-노드 동시성 재정의를 지움
      tags: 
        - Admin
      x-excluded: true
    get: 
      description: "고객의 현재 파트너-노드 동시성 재정의(원시 열 값), 게이트가 현재 적용하는 제한, 그리고 재정의가 지워질 경우 지출 엔진이 적용할 제한을 반환합니다.\n"
      operationId: GetAdminCustomerConcurrencyOverride
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  customer_id: 
                    type: string
                  effective_limit: 
                    description: 게이트가 현재 적용하는 제한입니다.
                    type: integer
                  effective_reason: 
                    type: string
                  engine_limit: 
                    description: 재정의가 지워질 경우 지출 엔진이 적용할 제한입니다.
                    type: integer
                  engine_reason: 
                    type: string
                  lifetime_paid_spend_cents: 
                    description: 수명 기간 동안의 유료 지출(센트 단위). 지출 쿼리가 실패한 경우 null입니다.
                    format: int64
                    nullable: true
                    type: integer
                  override: 
                    description: 원시 재정의 열 값. 설정되지 않은 경우 null입니다.
                    nullable: true
                    type: integer
                required: 
                  - customer_id
                  - effective_limit
                  - effective_reason
                  - engine_limit
                  - engine_reason
                type: object
          description: 재정의 및 확인된 제한을 성공적으로 검색했습니다
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 인증되지 않음
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 고객을 찾을 수 없음
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 관리자 고객 파트너 노드 동시 실행 오버라이드 조회
      tags: 
        - Admin
      x-excluded: true
    put: 
