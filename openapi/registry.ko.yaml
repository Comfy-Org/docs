  /upload-artifact: 
    post: 
      description: ComfyUI GitHub Action에서 아티팩트(출력 파일)를 수신합니다.
      operationId: PostUploadArtifact
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                author: 
                  description: 커밋의 작성자
                  type: string
                avg_vram: 
                  description: 실행에서 사용된 평균 VRAM 수량입니다.
                  type: integer
                branch_name: 
                  type: string
                bucket_name: 
                  description: 출력 파일이 저장된 버킷의 이름입니다.
                  type: string
                comfy_logs_gcs_path: 
                  description: "ComfyUI 로그의 경로입니다. 예: gs://bucket-name/logs"
                  type: string
                comfy_run_flags: 
                  description: comfy 실행에 사용된 플래그
                  type: string
                commit_hash: 
                  type: string
                commit_message: 
                  description: 커밋 메시지
                  type: string
                commit_time: 
                  description: "커밋 시간은 \"YYYY-MM-DDTHH:MM:SSZ\" 형식입니다. (2016-10-10T00:00:00Z)"
                  type: string
                cuda_version: 
                  description: Cuda 버전.
                  type: string
                end_time: 
                  description: 작업 종료 시간(Unix 타임스탬프)입니다.
                  format: int64
                  type: integer
                job_id: 
                  description: 작업의 고유 식별자
                  type: string
                job_trigger_user: 
                  description: 작업을 트리거한 사용자
                  type: string
                machine_stats: 
                  $ref: "#/components/schemas/MachineStats"
                os: 
                  description: 실행에 사용된 운영 체제
                  type: string
                output_files_gcs_paths: 
                  description: "출력 파일의 GCS 경로를 포함하는 쉼표로 구분된 문자열입니다. 예: gs://bucket-name/output, gs://bucket-name/output2"
                  type: string
                peak_vram: 
                  description: 실행에서 사용된 최대 VRAM 수량입니다.
                  type: integer
                pr_number: 
                  description: 풀 리퀘스트 번호
                  type: string
                python_version: 
                  description: 실행에 사용된 Python 버전
                  type: string
                pytorch_version: 
                  description: 실행에 사용된 PyTorch 버전
                  type: string
                repo: 
                  description: 저장소 이름
                  type: string
                run_id: 
                  description: 실행의 고유 식별자
                  type: string
                start_time: 
                  description: 작업의 시작 시간(Unix 타임스탬프)
                  format: int64
                  type: integer
                status: 
                  $ref: "#/components/schemas/WorkflowRunStatus"
                workflow_name: 
                  description: 워크플로 이름
                  type: string
              required: 
                - repo
                - job_id
                - run_id
                - os
                - commit_hash
                - commit_time
                - commit_message
                - branch_name
                - workflow_name
                - start_time
                - end_time
                - pr_number
                - python_version
                - job_trigger_user
                - author
                - status
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    type: string
                type: object
          description: 아티팩트 세부 정보를 성공적으로 수신함
        "400": 
          description: 잘못된 요청
        "500": 
          description: 내부 서버 오류
      summary: ComfyUI GitHub Action에서 아티팩트(출력 파일) 수신
      tags: 
        - ComfyUI CI
      x-excluded: true
