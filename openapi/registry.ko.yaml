    TextResponseFormatConfiguration: 
      description: "모델이 출력해야 하는 형식을 지정하는 객체.\n\n`{ \"type\": \"json_schema\" }`를 설정하면 구조화된 출력이 활성화되어\n모델이 제공된 JSON 스키마와 일치하도록 보장합니다. 더 알아보기:\n[Structured Outputs 가이드](/docs/guides/structured-outputs).\n\n기본 형식은 추가 옵션 없이 `{ \"type\": \"text\" }`입니다.\n\n**gpt-4o 및 최신 모델에는 권장되지 않음:**\n\n`{ \"type\": \"json_object\" }`로 설정하면 이전 JSON 모드가 활성화되어\n모델이 생성하는 메시지가 유효한 JSON임을 보장합니다. 지원되는 모델의 경우 `json_schema`를 사용하는 것이 좋습니다.\n"
      oneOf: 
        - $ref: "#/components/schemas/ResponseFormatText"
        - $ref: "#/components/schemas/TextResponseFormatJsonSchema"
        - $ref: "#/components/schemas/ResponseFormatJsonObject"
    TextResponseFormatJsonSchema: 
      description: "JSON Schema 응답 형식. 구조화된 JSON 응답을 생성하는 데 사용됩니다.\n[Structured Outputs](/docs/guides/structured-outputs)에 대해 더 알아보기.\n"
      properties: 
        description: 
          description: "응답 형식의 용도에 대한 설명으로, 모델이 형식에 따라 응답하는 방법을 결정하는 데 사용됩니다.\n"
          type: string
        name: 
          description: "응답 형식의 이름. a-z, A-Z, 0-9 또는 밑줄과 대시를 포함할 수 있으며 최대 길이는 64자입니다.\n"
          type: string
        schema: 
          $ref: "#/components/schemas/ResponseFormatJsonSchemaSchema"
        strict: 
          default: false
          description: "출력 생성 시 엄격한 스키마 준수를 활성화할지 여부.\n참(true)으로 설정하면 모델이 항상 `schema` 필드에 정의된 정확한 스키마를 따릅니다.\n`strict`가 `true`일 때 지원되는 JSON Schema의 하위 집합만 사용됩니다.\n더 알아보려면 [Structured Outputs 가이드](/docs/guides/structured-outputs)를 읽어보세요.\n"
          type: boolean
        type: 
          description: "정의 중인 응답 형식의 유형. 항상 `json_schema`입니다."
          enum: 
            - json_schema
          type: string
          x-stainless-const: true
      required: 
        - type
        - schema
        - name
      title: JSON schema
      type: object
    Tool: 
      discriminator: 
        propertyName: type
      oneOf: 
