    ElevenLabsSTTRequest: 
      description: ElevenLabs Speech-to-Text의 요청 본문
      properties: 
        additional_formats: 
          description: 대본을 내보낼 추가 형식 목록입니다.
          items: 
            $ref: "#/components/schemas/ElevenLabsSTTExportOptions"
          nullable: true
          type: array
        cloud_storage_url: 
          description: "변환할 파일의 HTTPS URL입니다. file 또는 cloud_storage_url 파라미터 중 하나만 제공해야 합니다.\n파일은 HTTPS로 접근 가능해야 하며 파일 크기는 2GB 미만이어야 합니다.\n"
          nullable: true
          type: string
        diarization_threshold: 
          description: "화자 분할(diarization) 중 적용할 화자 분할 임계값입니다.\n값이 높을수록 한 화자가 두 명의 다른 화자로 분할될 가능성이 낮아집니다.\ndiarize=True이고 num_speakers=None인 경우에만 설정할 수 있습니다. 기본값은 None입니다.\n"
          format: double
          nullable: true
          type: number
        diarize: 
          default: false
          description: 업로드된 파일에서 현재 말하고 있는 화자를 주석 처리할지 여부입니다.
          type: boolean
        entity_detection: 
          description: "대본에서 엔터티를 감지합니다. 'all'을 사용하여 모든 엔터티를 감지하거나,\n단일 엔터티 유형 또는 카테고리 문자열, 또는 엔터티 유형/카테고리 목록을 사용할 수 있습니다.\n카테고리에는 'pii', 'phi', 'pci', 'other', 'offensive_language'가 포함됩니다.\n활성화하면 감지된 엔터티가 텍스트, 유형 및 문자 위치와 함께 'entities' 필드에 반환됩니다.\n이 파라미터를 사용하면 추가 비용이 발생합니다.\n"
          nullable: true
          oneOf: 
            - type: string
            - items: 
                type: string
              type: array
        file: 
          description: "변환할 파일입니다. 모든 주요 오디오 및 비디오 형식을 지원합니다.\nfile 또는 cloud_storage_url 파라미터 중 하나만 제공해야 합니다.\n파일 크기는 3.0GB 미만이어야 합니다.\n"
          format: binary
          type: string
        file_format: 
          default: other
          description: "입력 오디오의 형식입니다. 옵션은 'pcm_s16le_16' 또는 'other'입니다.\npcm_s16le_16의 경우 입력 오디오는 16kHz 샘플 속도의 16비트 PCM, 단일 채널(모노)이어야 합니다.\n"
          enum: 
            - pcm_s16le_16
            - other
          type: string
        keyterms: 
          description: "변환을 특정 방향으로 유도하는 키텀 목록입니다.\n키텀 수는 100개를 초과할 수 없으며 각 키텀은 50자 미만이어야 합니다.\n"
          items: 
            type: string
          nullable: true
          type: array
        language_code: 
          description: "오디오 파일의 언어에 해당하는 ISO-639-1 또는 ISO-639-3 language_code입니다.\n사전에 알려진 경우 변환 성능을 향상시킬 수 있습니다.\n기본값은 null이며, 이 경우 언어가 자동으로 예측됩니다.\n"
          nullable: true
          type: string
        model_id: 
          description: 변환에 사용할 모델의 ID입니다.
          enum: 
            - scribe_v1
            - scribe_v2
          type: string
        num_speakers: 
          description: "업로드된 파일에서 말하는 최대 화자 수입니다.\n누가 언제 말하는지 예측하는 데 도움이 될 수 있습니다. 예측 가능한 최대 화자 수는 32명입니다.\n기본값은 null이며, 이 경우 화자 수는 모델이 지원하는 최대값으로 설정됩니다.\n"
          nullable: true
          type: integer
        seed: 
          description: "지정된 경우 시스템은 결정론적으로 샘플링하기 위해 최선을 다합니다.\n0에서 2147483647 사이의 정수여야 합니다.\n"
          maximum: 2147483647
          minimum: 0
          nullable: true
          type: integer
        tag_audio_events: 
          default: true
          description: "변환에서 (웃음), (발자국) 등의 오디오 이벤트에 태그를 지정할지 여부입니다."
          type: boolean
        temperature: 
          description: "변환 출력의 무작위성을 제어합니다. 0.0에서 2.0 사이의 값을 허용합니다.\n값이 높을수록 더 다양하고 덜 결정적인 결과가 생성됩니다.\n"
          format: double
          nullable: true
          type: number
        timestamps_granularity: 
          default: word
          description: "변환에서 타임스탬프의 세분성입니다.\n'word'는 단어 수준 타임스탬프를 제공하고 'character'는 단어당 문자 수준 타임스탬프를 제공합니다.\n"
          enum: 
            - none
            - word
            - character
          type: string
        use_multi_channel: 
          default: false
          description: "오디오 파일에 각 채널에 단일 화자가 포함된 여러 채널이 있는지 여부입니다.\n활성화하면 각 채널이 독립적으로 변환되고 결과가 결합됩니다.\n최대 5개의 채널이 지원됩니다.\n"
          type: boolean
        webhook: 
          default: false
          description: "변환 결과를 설정된 speech-to-text 웹훅으로 보낼지 여부입니다.\n설정하면 요청이 변환 없이 조기 반환되며, 변환은 나중에 웹훅을 통해 전달됩니다.\n"
          type: boolean
        webhook_id: 
          description: "변환 결과를 보낼 선택적 특정 웹훅 ID입니다.\nwebhook이 true로 설정된 경우에만 유효합니다.\n"
          nullable: true
          type: string
        webhook_metadata: 
          description: "웹훅 응답에 포함할 선택적 메타데이터입니다.\n최대 깊이 2레벨, 최대 크기 16KB의 객체를 나타내는 JSON 문자열이어야 합니다.\n"
          nullable: true
          type: string
      required: 
        - model_id
      type: object
    ElevenLabsSTTResponse: 
      description: ElevenLabs Speech-to-Text의 응답
      properties: 
        additional_formats: 
          description: 요청된 대본의 추가 형식입니다.
          items: 
            $ref: "#/components/schemas/ElevenLabsSTTAdditionalFormat"
          nullable: true
          type: array
