            user_location: 
              $ref: "#/components/schemas/OpenRouterWebSearchPluginUserLocation"
          required: 
            - id
          type: object
        - description: web-fetch 변형
          properties: 
            allowed_domains: 
              description: 이 도메인에서만 가져옵니다.
              items: 
                type: string
              type: array
            blocked_domains: 
              description: 이 도메인에서는 절대 가져오지 않습니다.
              items: 
