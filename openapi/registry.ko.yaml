    KlingImage2VideoRequest: 
      properties: 
        callback_url: 
          description: 콜백 알림 주소입니다. 작업 상태가 변경되면 서버가 알림을 보냅니다.
          format: uri
          type: string
        camera_control: 
          $ref: "#/components/schemas/KlingCameraControl"
        cfg_scale: 
          $ref: "#/components/schemas/KlingVideoGenCfgScale"
        duration: 
          $ref: "#/components/schemas/KlingVideoGenDuration"
        dynamic_masks: 
          description: 동적 브러시 구성 목록(최대 6개 그룹). 5초 비디오의 경우 궤적 길이가 77개 좌표를 초과해서는 안 됩니다.
          items: 
            properties: 
              mask: 
                description: 동적 브러시 적용 영역(사용자가 모션 브러시를 사용하여 만든 마스크 이미지). 종횡비가 입력 이미지와 일치해야 합니다.
                format: uri
                type: string
              trajectories: 
                items: 
                  properties: 
                    x: 
                      description: "궤적 점의 수평 좌표입니다. 이미지의 왼쪽 아래 모서리를 원점(0,0)으로 합니다."
                      type: integer
                    "y": 
                      description: "궤적 점의 수직 좌표입니다. 이미지의 왼쪽 아래 모서리를 원점(0,0)으로 합니다."
                      type: integer
                  type: object
                type: array
            type: object
          type: array
        element_list: 
          description: 요소 ID 구성에 따른 참조 요소 목록입니다. 최대 3개의 참조 요소를 지원합니다. element_list와 voice_list 파라미터는 상호 배타적입니다.
          items: 
            properties: 
              element_id: 
                description: 요소 ID
                format: int64
                type: integer
            type: object
          type: array
        external_task_id: 
          description: 사용자 정의 작업 ID. 단일 사용자 계정 내에서 고유해야 합니다.
          type: string
        image: 
          description: "참조 이미지: URL 또는 Base64 인코딩 문자열, 10MB를 초과할 수 없으며 해상도는 300*300px 이상, 종횡비는 1:2.5 ~ 2.5:1 사이여야 합니다. Base64는 data:image 접두사를 포함해서는 안 됩니다."
          type: string
        image_tail: 
          description: "참조 이미지: 종료 프레임 제어. URL 또는 Base64 인코딩 문자열, 10MB를 초과할 수 없으며 해상도는 300*300px 이상입니다. Base64는 data:image 접두사를 포함해서는 안 됩니다. dynamic_masks/static_mask 또는 camera_control과 동시에 사용할 수 없습니다."
          type: string
        mode: 
          $ref: "#/components/schemas/KlingVideoGenMode"
        model_name: 
          $ref: "#/components/schemas/KlingVideoGenModelName"
        multi_prompt: 
          description: 각 스토리보드에 대한 정보(프롬프트 및 지속 시간 등). 최대 6개의 스토리보드를 지원하며 최소 1개입니다. multi_shot이 true이고 shot_type이 customize인 경우 필수입니다.
          items: 
            properties: 
              duration: 
                description: 이 스토리보드의 지속 시간(초). 전체 작업 지속 시간을 초과할 수 없으며 1초보다 작을 수 없습니다. 모든 스토리보드 지속 시간의 합은 전체 작업 지속 시간과 같습니다.
                type: string
              index: 
                description: 샷 시퀀스 번호
                type: integer
              prompt: 
                description: 이 스토리보드의 프롬프트 단어. 최대 길이 512자.
                maxLength: 512
                type: string
            type: object
          type: array
        multi_shot: 
          default: false
          description: 멀티 샷 비디오 생성 여부. true인 경우 prompt 파라미터가 유효하지 않습니다. false인 경우 shot_type 및 multi_prompt 파라미터가 유효하지 않습니다.
          type: boolean
        negative_prompt: 
          description: 네거티브 텍스트 프롬프트. 긍정 프롬프트 내에서 직접 네거티브 문장을 통해 네거티브 프롬프트 정보를 보완하는 것이 권장됩니다.
          maxLength: 2500
          type: string
        prompt: 
          description: 긍정 텍스트 프롬프트. <<<voice_1>>>을 사용하여 voice_list 파라미터 순서와 일치하는 음성을 지정합니다. 하나의 작업은 최대 2개의 톤을 참조할 수 있습니다. 톤을 지정할 때 sound 파라미터 값이 on이어야 합니다.
          maxLength: 2500
          type: string
        shot_type: 
          description: 스토리보드 방법. multi_shot 파라미터가 true로 설정된 경우 필수입니다.
          enum: 
            - customize
            - intelligence
          type: string
        sound: 
          default: "off"
          description: 비디오 생성 시 동시에 사운드를 생성할지 여부. V2.6 이상 모델 버전에서만 이 파라미터를 지원합니다.
          enum: 
            - "on"
            - "off"
          type: string
        static_mask: 
          description: 정적 브러시 적용 영역(사용자가 모션 브러시를 사용하여 만든 마스크 이미지). 종횡비가 입력 이미지와 일치해야 합니다.
          type: string
        voice_list: 
          description: 비디오 생성 시 참조되는 음성 목록. 최대 2개의 음성을 지원합니다. element_list와 voice_list 파라미터는 상호 배타적입니다.
          items: 
            properties: 
              voice_id: 
                description: 음성 사용자 정의 API를 통해 반환된 음성 ID 또는 시스템 사전 설정 음성 ID.
                type: string
            type: object
          type: array
        watermark_info: 
          description: 워터마크 결과를 동시에 생성할지 여부. 현재 사용자 정의 워터마크는 지원되지 않습니다.
          properties: 
            enabled: 
              description: "true는 워터마크 생성, false는 생성 안 함을 의미합니다."
              type: boolean
          type: object
      type: object
    KlingImageGenAspectRatio: 
