          description: 기본 동작은 다른 가로세로 비율이 선택된 경우 이미지를 레터박스 처리하는 것입니다. 대신 이미지를 자르기 위해 crop_to_fill을 true로 설정하여 이미지를 크기에 맞게 자르려면 이 옵션을 활성화하세요.
          type: boolean
        face_enhancement: 
          default: true
          description: 기본적으로 이미지 처리 중에 얼굴(있는 경우)도 향상됩니다. 원하지 않으면 face_enhancement를 false로 설정하세요.
          type: boolean
        face_enhancement_creativity: 
          default: 0
          description: "얼굴 향상을 위한 창의성 수준을 0에서 1까지 선택합니다. 기본값은 0이며, face_enhancement가 false인 경우 무시됩니다."
          maximum: 1
          minimum: 0
          type: number
        face_enhancement_strength: 
          default: 0.8
          description: "향상된 얼굴이 배경에 비해 얼마나 선명한지 0에서 1까지 제어합니다. 기본값은 0.8이며, face_enhancement가 false인 경우 무시됩니다."
          maximum: 1
          minimum: 0
          type: number
        face_preservation: 
          default: "true"
          description: "캐릭터의 정체성을 유지하려면: Reimagine에서만 사용 가능(Topaz API 요구 사항으로 인해 문자열 \"true\" 또는 \"false\"여야 함)"
          enum: 
            - "true"
            - "false"
          type: string
        image: 
          description: "처리할 이미지 파일. 지원 형식: jpeg(또는 jpg), png, tiff(또는 tif)"
          format: binary
          type: string
        model: 
          default: Reimagine
          description: 이미지 처리에 사용할 모델 (Bloom - Creative Upscale)
          enum: 
            - Reimagine
          type: string
        output_format: 
          default: jpeg
          description: 출력 이미지의 원하는 형식
          enum: 
            - jpeg
            - jpg
            - png
            - tiff
            - tif
          type: string
        output_height: 
          description: 출력 이미지의 원하는 높이(픽셀 단위)
          maximum: 32000
          minimum: 1
          type: integer
        output_width: 
          description: 출력 이미지의 원하는 너비(픽셀 단위)
          maximum: 32000
          minimum: 1
          type: integer
        prompt: 
          description: 창의적인 업스케일링 가이드를 위한 텍스트 프롬프트 - Reimagine에서만 사용 가능
          example: enter-your-prompt-here
          type: string
        source_id: 
          description: 소스 이미지의 고유 식별자
          example: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
          type: string
        source_url: 
          description: 소스 이미지의 URL
          example: https://example.com/image.jpg
          type: string
        subject_detection: 
          default: All
          description: "이미지에서 모든 피사체, 전경 피사체만, 또는 배경만 감지할지 여부를 지정합니다. AI 모델이 실행될 기준입니다."
          enum: 
            - All
            - Foreground
            - Background
          type: string
      required: 
        - model
      type: object
    TopazEnhanceGenResponse: 
      properties: 
        eta: 
          description: 예상 완료 시간(Unix 타임스탬프)
