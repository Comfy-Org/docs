        - description: fusion 변형
          properties: 
            analysis_models: 
              description: "판사가 분석하는 \"전문가 패널\"로 병렬 실행할 모델의 slug. 각 모델은 web_search + web_fetch가 활성화된 동일한 사용자 프롬프트를 받습니다. 비용 증폭을 제한하기 위해 최대 8개의 모델로 제한됩니다. 생략 시 /labs/fusion UI의 Quality 프리셋(~anthropic/claude-opus-latest, ~openai/gpt-latest, ~google/gemini-pro-latest)을 기본값으로 사용합니다."
              items: 
                type: string
              type: array
            enabled: 
              description: 이 요청에 대해 fusion 플러그인을 비활성화하려면 거짓으로 설정. 기본값은 참.
              type: boolean
            id: 
              description: "판별자 값: fusion"
              enum: 
                - fusion
              type: string
            max_tool_calls: 
              description: 각 패널리스트(분석 모델)와 판사 모델이 에이전트 웹 연구 루프 동안 수행할 수 있는 도구 호출 단계의 최대 수. web_search/web_fetch가 활성화된 모델은 텍스트 응답을 생성하거나 이 한도에 도달할 때까지 반복합니다. 기본값은 8. 최대 16.
              type: integer
            model: 
              description: 판사 단계(web_search + web_fetch 포함)와 최종 합성을 모두 수행하는 모델의 slug. 생략 시 Quality 프리셋의 첫 번째 모델을 기본값으로 사용합니다.
              type: string
          required: 
            - id
          type: object
        - description: moderation 변형
          properties: 
            id: 
              description: "판별자 값: moderation"
              enum: 
                - moderation
              type: string
          required: 
            - id
          type: object
        - description: pareto-router 변형
          properties: 
            enabled: 
              description: 이 요청에 대해 pareto-router 플러그인을 비활성화하려면 거짓으로 설정. 기본값은 참.
              type: boolean
            id: 
              description: "판별자 값: pareto-router"
              enum: 
                - pareto-router
              type: string
            min_coding_score: 
              description: "0과 1 사이의 최소 원하는 코딩 점수(1이 최고). 값이 높을수록 더 강력한 코딩 모델(Artificial Analysis 코딩 백분위수에서 가져옴)을 선택합니다. 내부적으로 세 가지 티어(낮음, 중간, 높음) 중 하나에 매핑됩니다. 생략하면 라우터 기본 티어를 사용합니다."
              format: double
              type: number
          required: 
            - id
          type: object
        - description: response-healing 변형
          properties: 
            enabled: 
              description: 이 요청에 대해 response-healing 플러그인을 비활성화하려면 거짓으로 설정하세요. 기본값은 참입니다.
              type: boolean
            id: 
              description: "식별자 값: response-healing"
              enum: 
                - response-healing
              type: string
          required: 
            - id
          type: object
        - description: web 변형
          properties: 
            enabled: 
              description: 이 요청에 대해 웹 검색 플러그인을 비활성화하려면 거짓으로 설정하세요. 기본값은 참입니다.
              type: boolean
            engine: 
              $ref: "#/components/schemas/OpenRouterWebSearchEngine"
            exclude_domains: 
              description: "웹 검색 결과에서 제외할 도메인 목록입니다. 와일드카드(예: \"*.substack.com\") 및 경로 필터링(예: \"openai.com/blog\")을 지원합니다."
              items: 
                type: string
              type: array
            id: 
              $ref: "#/components/schemas/OpenRouterWebSearchPluginId"
            include_domains: 
              description: "웹 검색 결과를 제한할 도메인 목록입니다. 와일드카드(예: \"*.substack.com\") 및 경로 필터링(예: \"openai.com/blog\")을 지원합니다."
              items: 
                type: string
              type: array
            max_results: 
              type: integer
            max_uses: 
              description: "모델이 단일 턴에서 웹 검색을 호출할 수 있는 최대 횟수입니다. 이를 지원하는 네이티브 제공자(예: Anthropic)에 그대로 전달됩니다."
              type: integer
