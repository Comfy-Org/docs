            - failed
            - expired
          type: string
        updated_at: 
          description: 작업이 마지막 업데이트된 시간입니다. 값은 초 단위의 UNIX 타임스탬프입니다.
          type: integer
        usage: 
          description: 요청에 대한 토큰 사용량
          properties: 
