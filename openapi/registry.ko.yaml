            - items: 
                $ref: "#/components/schemas/BytePlusResponseMessageContent"
              type: array
        partial: 
          description: "지속 모드를 활성화합니다. 마지막 메시지의 역할을 `assistant`로 설정하고 `partial`을 참(true)로 설정합니다. 모델이 기존 콘텐츠에서 계속됩니다.\n"
          type: boolean
        role: 
          enum: 
            - user
            - system
            - assistant
            - developer
          type: string
        status: 
          description: "이전에 저장된 메시지의 상태입니다. 이전 입력을 모델로 다시 에코할 때만 사용됩니다.\n"
