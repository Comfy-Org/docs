  "/proxy/bria/v2/status/{request_id}": 
    get: 
      description: "비동기 Bria 요청의 현재 상태를 검색합니다.\n\n상태가 COMPLETED 또는 ERROR가 될 때까지 이 엔드포인트를 폴링합니다.\n\n상태 값:\n- `IN_PROGRESS`: 요청이 처리 중입니다. 계속 폴링하세요.\n- `COMPLETED`: 성공. 이미지의 경우 `result.image_url`, 비디오의 경우 `result.video_url`, 구조화된 프롬프트 생성의 경우 `result.structured_prompt`를 응답에 포함합니다. 추가 선택적 필드(seed, prompt, refined_prompt)가 포함될 수 있습니다.\n- `ERROR`: 처리 실패. 자세한 내용은 error 객체를 확인하세요.\n- `UNKNOWN`: 예기치 않은 내부 오류.\n"
      operationId: BriaGetStatus
      parameters: 
        - description: "요청의 고유 식별자(edit, generate 또는 remove_background 엔드포인트에서 반환됨)"
          in: path
          name: request_id
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BriaStatusResponse"
          description: 상태를 성공적으로 검색함
        "401": 
          description: 인증되지 않음
        "402": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 결제 필요
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BriaStatusNotFoundResponse"
          description: 요청 ID를 찾을 수 없거나 만료됨
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      security: 
        - BearerAuth: 
            []
      summary: Bria 요청 상태 가져오기
      tags: 
        - API Nodes
        - Released
      x-excluded: true
