  /proxy/seedance/assets: 
    get: 
      description: "호출자의 완료된 검증 그룹 전체로 BytePlus ListAssets를 팬 아웃하며, 그룹 레이블을 각 행에 비정규화하고 단일 플랫 리스트를 반환합니다. 결과는 asset_type으로 사후 필터링됩니다. 선택적 group_id는 하나의 그룹으로 범위를 좁힙니다. 하드 제한: 그룹당 5페이지 × 100개 에셋, 총 1000개 에셋.\n"
      operationId: SeedanceListUserAssets
      parameters: 
        - description: 반환할 에셋 유형.
          in: query
          name: asset_type
          required: true
          schema: 
            enum: 
              - Image
              - Video
            type: string
        - description: 목록을 하나의 그룹으로 좁힙니다. 호출자가 그룹을 소유해야 합니다.
