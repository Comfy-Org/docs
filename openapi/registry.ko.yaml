                description: "업로드된 비디오의 URL입니다. .mp4/.mov 형식만 지원됩니다. 길이는 3-10초 사이입니다. 해상도는 720px에서 2160px 사이여야 합니다. 24-60 fps의 프레임 속도가 지원됩니다. 비디오는 1개만 업로드할 수 있으며, 크기는 200MB를 초과할 수 없습니다."
                type: string
            type: object
          type: array
        watermark_info: 
          description: 워터마크 결과를 동시에 생성할지 여부입니다. 현재 사용자 정의 워터마크는 지원되지 않습니다.
          properties: 
            enabled: 
              description: "true는 워터마크 생성, false는 생성하지 않음을 의미합니다."
              type: boolean
          type: object
      type: object
