            - $ref: "#/components/schemas/BFLOutputFormat"
          default: jpeg
          description: "생성된 이미지의 출력 형식. 'jpeg' 또는 'png'일 수 있습니다."
        preprocessed_image: 
          anyOf: 
            - type: string
          description: 제어 전처리 단계를 실행 건너뛰는 선택적 사전 처리된 이미지
          title: Preprocessed Image
        prompt: 
          description: 이미지 생성을 위한 텍스트 프롬프트
          example: ein fantastisches bild
          title: Prompt
          type: string
        prompt_upsampling: 
          anyOf: 
            - type: boolean
          default: false
          description: 프롬프트에 업샘플링을 수행할지 여부
          title: Prompt Upsampling
        safety_tolerance: 
          default: 2
          description: "입력 및 출력 검열에 대한 허용치 수준. 0에서 6 사이, 0이 가장 엄격하고 6이 가장 덜 엄격합니다."
          maximum: 6
          minimum: 0
          title: Safety Tolerance
          type: integer
        seed: 
          anyOf: 
            - type: integer
          description: 재현성을 위한 선택적 시드
          example: 42
          title: Seed
        steps: 
          anyOf: 
            - maximum: 50
              minimum: 15
              type: integer
          default: 50
          description: 이미지 생성 프로세스의 단계 수
          title: Steps
        webhook_secret: 
          anyOf: 
            - type: string
          description: 웹훅 서명 확인을 위한 선택적 시크릿
          title: Webhook Secret
        webhook_url: 
          anyOf: 
            - format: uri
              maxLength: 2083
              minLength: 1
              type: string
          description: 웹훅 알림을 수신할 URL
          title: Webhook Url
      required: 
        - prompt
      title: CannyInputs
      type: object
