    BFLEraseV1Request: 
      description: BFL Flux Tools Erase v1 객체 제거 API의 요청 본문.
      properties: 
        dilate_pixels: 
          default: 10
          description: 제거 전에 마스크를 확장할 픽셀 수. 확장은 객체 가장자리를 덮는 데 도움이 됩니다. 최대 25픽셀입니다.
          maximum: 25
          minimum: 0
