          description: "참조 비디오 목록입니다. 기능을 위한 참조 비디오 또는 편집할 비디오로 사용할 수 있으며, 기본값은 편집할 비디오입니다."
          items: 
            properties: 
              keep_original_sound: 
                description: "비디오 원본 사운드를 유지할지 여부입니다. yes는 유지, no는 미유지를 나타냅니다."
                enum: 
                  - "yes"
                  - "no"
                type: string
              refer_type: 
                description: "참조 비디오 유형입니다. feature는 기능 참조 비디오, base는 편집할 비디오입니다."
                enum: 
