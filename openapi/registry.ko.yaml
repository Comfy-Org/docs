    GeminiSystemInstructionContent: 
      description: "gemini-2.0-flash 및 gemini-2.0-flash-lite에서 사용할 수 있습니다. 모델을 더 나은 성능으로 이끌기 위한 지침입니다. 예를 들어, \"가능한 한 간결하게 답변하세요\" 또는 \"응답에 기술 용어를 사용하지 마세요\"와 같습니다. 텍스트 문자열은 토큰 제한에 포함됩니다. systemInstruction의 role 필드는 무시되며 모델의 성능에 영향을 미치지 않습니다. 참고: 부분에는 텍스트만 사용해야 하며 각 부분의 콘텐츠는 별도의 단락에 있어야 합니다.\n"
      properties: 
        parts: 
          description: "단일 메시지를 구성하는 정렬된 부분의 목록입니다. 서로 다른 부분은 서로 다른 IANA MIME 유형을 가질 수 있습니다. 최대 토큰 수 또는 이미지 수와 같은 입력 제한에 대해서는 Google 모델 페이지의 모델 사양을 참조하세요.\n"
          items: 
            $ref: "#/components/schemas/GeminiTextPart"
          type: array
        role: 
          description: "메시지를 생성하는 엔터티의 ID입니다. 다음 값이 지원됩니다. user: 실제 사람이 보낸 메시지임을 나타내며, 일반적으로 사용자 생성 메시지입니다. model: 모델이 생성한 메시지임을 나타냅니다. model 값은 다중 턴 대화 중에 모델의 메시지를 대화에 삽입하는 데 사용됩니다. 다중 턴이 아닌 대화의 경우 이 필드는 비워 두거나 설정하지 않을 수 있습니다.\n"
          enum: 
            - user
            - model
          example: user
          type: string
      required: 
        - role
        - parts
      type: object
    GeminiTextPart: 
      properties: 
        text: 
          description: 텍스트 프롬프트 또는 코드 스니펫입니다.
          example: Answer as concisely as possible
          type: string
      type: object
    GeminiTool: 
      description: "시스템이 모델의 지식과 범위를 벗어나 외부 시스템과 상호 작용하여 작업 또는 작업 집합을 수행할 수 있도록 하는 코드 조각입니다. Function calling을 참조하세요.\n"
