        request_id: 
          description: 시스템에서 생성된 요청 ID입니다.
          type: string
      type: object
    KlingV2Image2VideoRequest: 
      properties: 
        contents: 
          description: 프롬프트 및 이미지와 같은 참조 모음입니다. 동일한 자료와 관련된 필드는 동일한 객체에 속합니다.
          items: 
            properties: 
              text: 
                description: "텍스트 프롬프트. type이 \"prompt\"일 때 제공됩니다. 긍정 및 네거티브 설명을 포함할 수 있으며, 최대 2500자를 초과할 수 없습니다."
                type: string
              type: 
                description: "참조 유형. \"prompt\" 또는 \"first_frame\" 중 하나입니다."
                type: string
              url: 
                description: "첫 번째 프레임 자료. type이 \"first_frame\"일 때 제공됩니다. URL 또는 Base64 콘텐츠일 수 있습니다. .jpg, .jpeg, .png를 최대 50MB까지 지원하며, 너비와 높이는 최소 300px이어야 하고 가로 세로 비율이 1:2.5에서 2.5:1 사이여야 합니다."
                type: string
            type: object
          type: array
        options: 
          $ref: "#/components/schemas/KlingV2Options"
        settings: 
          description: 해상도 및 지속 시간과 같은 출력 구성입니다.
