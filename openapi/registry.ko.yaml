          enum: 
            - pcm_s16le_16
            - other
          nullable: true
          type: string
        model_id: 
          default: eleven_english_sts_v2
          description: "사용될 모델의 식별자입니다. GET /v1/models를 쿼리하여 사용 가능한 모델을 나열합니다.\n모델은 음성 대 음성 지원(can_do_voice_conversion 속성)이 있어야 합니다.\n"
          type: string
        remove_background_noise: 
          default: false
          description: "설정하면 오디오 분리 모델을 사용하여 오디오 입력에서 배경 노이즈를 제거합니다.\n음성 변환기에만 적용됩니다.\n"
          type: boolean
        seed: 
          description: "지정된 경우 시스템이 결정적으로 샘플링하기 위해 최선을 다합니다.\n동일한 시드와 파라미터로 반복된 요청은 동일한 결과를 반환해야 합니다.\n0에서 4294967295 사이의 정수여야 합니다.\n"
          maximum: 4294967295
          minimum: 0
          nullable: true
          type: integer
        voice_settings: 
          description: "주어진 음성에 대해 저장된 설정을 재정의하는 음성 설정입니다.\n지정된 요청에만 적용됩니다. JSON 인코딩 문자열로 전송해야 합니다.\n"
          nullable: true
          type: string
      required: 
        - audio
      type: object
