              output_format: 
                description: 출력 이미지의 파일 형식입니다. seedream-5.0-pro만 이 필드를 지원합니다.
                type: string
              size: 
                description: "이미지의 너비와 높이(픽셀 단위)로, 형식은 <width>x<height>입니다. seedream-5.0-pro, 5.0-lite, 4.5 및 4.0만 이 파라미터를 지원합니다."
                type: string
              url: 
                description: "이미지 다운로드 URL (response_format이 \"url\"인 경우)"
                format: uri
                type: string
            type: object
          type: array
        error: 
          description: 오류 정보(있는 경우)
          properties: 
            code: 
              description: 오류 코드
              type: string
            message: 
              description: 오류 메시지
              type: string
          type: object
        model: 
          description: 요청에 사용된 모델 ID
          example: seedream-3-0-t2i-250415
          type: string
        usage: 
          properties: 
            generated_images: 
              description: 모델이 생성한 이미지 수
              type: integer
            input_images: 
              description: 모델에 입력된 이미지 수입니다. seedream-5.0-pro만 이 필드를 지원합니다.
              type: integer
            output_tokens: 
              description: 모델이 생성한 그림에 사용된 토큰 수입니다.
              type: integer
            total_tokens: 
              description: 이 요청에서 소비된 총 토큰 수입니다.
              type: integer
          type: object
      type: object
