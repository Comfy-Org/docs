          type: boolean
        negative_prompt: 
          description: 네거티브 텍스트 프롬프트. 네거티브 프롬프트 정보는 포지티브 프롬프트 내에서 직접 네거티브 문장을 통해 보완하는 것이 권장됩니다.
          maxLength: 2500
          type: string
        prompt: 
          description: 포지티브 텍스트 프롬프트. <<<voice_1>>>를 사용하여 voice_list 파라미터 순서와 일치하는 음성을 지정합니다. 작업은 최대 2개의 톤을 참조할 수 있습니다. 톤을 지정할 때 사운드 파라미터 값이 on이어야 합니다.
          maxLength: 2500
          type: string
        shot_type: 
          description: 스토리보드 방법. multi_shot 파라미터가 true로 설정된 경우 필수입니다.
          enum: 
            - customize
            - intelligence
          type: string
        sound: 
          default: "off"
