        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      security: 
        - BearerAuth: 
            []
      summary: 고객 사용량 시계열 가져오기
      tags: 
        - API Nodes
      x-excluded: true
