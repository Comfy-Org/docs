    BytePlusResponseCreateRequest: 
      additionalProperties: true
      properties: 
        caching: 
          additionalProperties: true
          description: 컨텍스트 캐시 구성.
          properties: 
            prefix: 
              default: false
              description: "참인 경우에는 공용 접두사 캐시만 생성하며, 모델은 응답하지 않습니다.\n"
              type: boolean
