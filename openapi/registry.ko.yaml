  /proxy/hitpaw/api/photo-enhancer: 
    post: 
      description: "HitPaw Photo Enhancement API를 사용하여 이미지 처리 작업을 제출합니다.\n이미지 초해상도 처리를 위한 여러 개선 모델을 지원합니다.\n\n반환된 job_id는 task-status 엔드포인트와 함께 사용하여 처리 결과를 확인할 수 있습니다.\n\n**사용 가능한 모델:**\n- 개선 및 노이즈 제거 모델 (face_2x/4x, face_v2_2x/4x, general_2x/4x, high_fidelity_2x/4x, sharpen_denoise, detail_denoise):\n  - 최대 입력: 67 MP, 최대 출력: 600 MP\n  - 지원 형식: bmp, jpeg, jpg, png, jfif, tga, tiff, webp, heif\n- 생성 모델 (generative_portrait, generative):\n  - 입력 제한 없음, 최대 출력: 8K (33 MP)\n  - 지원 형식: bmp, jpeg, jpg, png, jfif, tga, tiff, webp, heif\n"
      operationId: HitpawPhotoEnhancer
      requestBody: 
        content: 
          application/json: 
            schema: 
              $ref: "#/components/schemas/HitPawPhotoEnhancerRequest"
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/HitPawJobResponse"
          description: 작업이 성공적으로 제출되었습니다.
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/HitPawErrorResponse"
          description: 잘못된 요청
        "401": 
          description: 인증되지 않음
        "402": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 결제 필요
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/HitPawErrorResponse"
          description: 내부 서버 오류
      security: 
        - BearerAuth: 
            []
      summary: HitPaw 이미지 향상 작업 제출
      tags: 
        - API Nodes
        - HitPaw
      x-excluded: true
