    EasyInputMessage: 
      description: "모델에 대한 입력 메시지로, 역할이 명령 수행 계층을 나타냅니다. `developer` 또는 `system` 역할로 제공된 명령은 `user` 역할로 제공된 명령보다 우선합니다. `assistant` 역할의 메시지는 이전 상호작용에서 모델에 의해 생성된 것으로 간주됩니다.\n"
      properties: 
        content: 
          description: "모델에 대한 텍스트, 이미지 또는 오디오 입력으로, 응답을 생성하는 데 사용됩니다.\n이전 어시스턴트 응답도 포함할 수 있습니다.\n"
          oneOf: 
            - description: "모델에 대한 텍스트 입력.\n"
              title: Text input
              type: string
            - $ref: "#/components/schemas/InputMessageContentList"
        role: 
          description: "메시지 입력의 역할. `user`, `assistant`, `system`, 또는 `developer` 중 하나.\n"
