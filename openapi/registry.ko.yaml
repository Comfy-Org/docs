    VeoGenVidRequest: 
      properties: 
        instances: 
          items: 
            properties: 
              cameraControl: 
                description: 카메라 움직임 유형. 이미지가 제공되어야 합니다.
                enum: 
                  - fixed
                  - pan_left
                  - pan_right
                  - tilt_up
                  - tilt_down
                  - truck_left
                  - truck_right
                  - pedestal_up
                  - pedestal_down
                  - push_in
                  - pull_out
                type: string
              image: 
                description: 비디오 생성을 안내하는 선택적 첫 프레임 이미지
                oneOf: 
                  - required: 
                      - bytesBase64Encoded
                  - required: 
                      - gcsUri
                properties: 
                  bytesBase64Encoded: 
                    description: Base64로 인코딩된 이미지 데이터
                    format: byte
                    type: string
                  gcsUri: 
                    description: 이미지의 Cloud Storage URI
                    type: string
                  mimeType: 
                    description: 이미지의 MIME 유형 (image/jpeg 또는 image/png)
                    enum: 
                      - image/jpeg
                      - image/png
                    type: string
                type: object
              lastFrame: 
                description: 선택적 마지막 프레임 이미지. 이미지와 함께 사용하여 첫 프레임과 마지막 프레임 사이의 비디오를 생성합니다. Veo 3.0+ 모델에서 지원됩니다.
                oneOf: 
                  - required: 
                      - bytesBase64Encoded
                  - required: 
                      - gcsUri
                properties: 
                  bytesBase64Encoded: 
                    description: Base64로 인코딩된 이미지 데이터
                    format: byte
                    type: string
                  gcsUri: 
                    description: 이미지의 Cloud Storage URI
                    type: string
                  mimeType: 
                    description: 이미지의 MIME 유형 (image/jpeg 또는 image/png)
                    enum: 
                      - image/jpeg
                      - image/png
                    type: string
                type: object
              mask: 
                description: 비디오 편집을 위한 선택적 마스크. 입력 비디오에 적용됩니다.
                oneOf: 
                  - required: 
                      - bytesBase64Encoded
                  - required: 
                      - gcsUri
                properties: 
                  bytesBase64Encoded: 
                    description: Base64로 인코딩된 마스크 바이트
                    format: byte
                    type: string
                  gcsUri: 
                    description: 마스크 파일의 Cloud Storage URI
                    type: string
                  maskMode: 
                    description: 마스크가 적용되는 방식
                    enum: 
                      - insert
                      - remove
                      - remove_static
                      - outpaint
                    type: string
                  mimeType: 
                    description: "마스크의 MIME 유형 (image/png, image/jpeg, image/webp 또는 비디오 형식)"
                    type: string
                type: object
              prompt: 
                description: 생성할 비디오의 텍스트 설명
                type: string
              referenceImages: 
                description: 비디오 생성을 안내하는 선택적 참조 이미지. 최대 3개의 에셋 이미지 또는 1개의 스타일 이미지를 지원합니다. Veo 3.1 모델(미리보기)에서 지원됩니다.
                items: 
                  properties: 
                    image: 
                      oneOf: 
                        - required: 
                            - bytesBase64Encoded
                        - required: 
                            - gcsUri
                      properties: 
                        bytesBase64Encoded: 
                          description: Base64로 인코딩된 이미지 데이터
                          format: byte
                          type: string
                        gcsUri: 
                          description: 이미지의 Cloud Storage URI
                          type: string
                        mimeType: 
                          description: 이미지의 MIME 유형 (image/jpeg 또는 image/png)
                          enum: 
                            - image/jpeg
                            - image/png
                          type: string
                      type: object
                    referenceId: 
                      description: 참조 이미지의 선택적 식별자
                      type: string
                    referenceType: 
                      description: 참조 이미지 유형
                      enum: 
                        - asset
                        - style
                      type: string
                  required: 
                    - image
                    - referenceType
                  type: object
                type: array
              video: 
                description: 비디오 확장 또는 편집을 위한 선택적 입력 비디오. 이미지 및 referenceImages와 호환되지 않습니다.
                oneOf: 
                  - required: 
                      - bytesBase64Encoded
                  - required: 
                      - gcsUri
                properties: 
                  bytesBase64Encoded: 
                    description: Base64로 인코딩된 비디오 바이트
                    format: byte
                    type: string
                  gcsUri: 
                    description: 입력 비디오의 Cloud Storage URI
                    type: string
                  mimeType: 
                    description: 비디오의 MIME 타입
                    enum: 
                      - video/mov
                      - video/mpeg
                      - video/mp4
                      - video/mpg
                      - video/avi
                      - video/wmv
                      - video/mpegps
                      - video/x-flv
                    type: string
                type: object
            required: 
              - prompt
            type: object
          type: array
        parameters: 
