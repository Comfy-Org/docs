          description: 워크플로의 이름
          type: string
      type: object
    AnthropicCacheCreationUsage: 
      description: Anthropic Messages API 호출에 대한 캐시 쓰기 입력 토큰의 TTL별 분석.
      properties: 
        ephemeral_1h_input_tokens: 
          type: integer
        ephemeral_5m_input_tokens: 
          type: integer
      type: object
    AnthropicCreateMessageRequest: 
      additionalProperties: true
      description: "Anthropic Messages API (`/v1/messages`)의 요청 본문. 프록시가 읽는 필드(모델, 프롬프트 추출, 스트리밍, 과금)에만 엄격한 타입 지정으로 업스트림 스키마를 미러링합니다. 다른 최상위 필드(`tools`, `temperature`, `top_p`, `thinking`, `metadata` 등)는 `additionalProperties`를 통해 변경 없이 전달됩니다."
      properties: 
        max_tokens: 
          description: 중단하기 전에 생성할 최대 토큰 수.
          type: integer
        messages: 
          description: 대화 턴. 전체 콘텐츠 블록 분류는 Anthropic Messages API 문서를 참조하세요.
          items: 
            $ref: "#/components/schemas/AnthropicMessageParam"
          type: array
        model: 
          description: "Anthropic 모델 식별자 (예: `claude-sonnet-4-5`, `claude-opus-4-7`)."
          type: string
        stream: 
          description: "참(true)인 경우, 응답은 단일 JSON 본문 대신 Anthropic 메시지 이벤트의 `text/event-stream`입니다."
          type: boolean
        system: 
          description: 최상위 시스템 프롬프트. Anthropic은 또한 패스스루를 통해 배열 형식을 허용합니다.
          type: string
      required: 
        - model
        - max_tokens
        - messages
      type: object
    AnthropicCreateMessageResponse: 
      additionalProperties: true
      description: "비스트리밍 Messages API 응답의 JSON 형태. 대부분의 필드는 전달되며, 프록시는 과금을 위해 `usage`를 읽습니다."
      properties: 
        id: 
          type: string
        model: 
          type: string
        role: 
          type: string
        stop_reason: 
          nullable: true
          type: string
        stop_sequence: 
          nullable: true
          type: string
        type: 
          type: string
        usage: 
          $ref: "#/components/schemas/AnthropicMessagesUsage"
      type: object
    AnthropicMessageParam: 
      additionalProperties: true
      description: "단일 대화 턴. 프록시는 프롬프트 캡처를 위해 `role`과 `content`(문자열 또는 콘텐츠 블록 배열)만 읽으며, 추가 필드는 전달됩니다."
      properties: 
        content: 
          description: "문자열 요약 또는 콘텐츠 블록 배열(텍스트, 이미지, 문서, tool_use, tool_result, ...) 중 하나입니다."
          x-go-type: "interface{}"
        role: 
          enum: 
            - user
            - assistant
          type: string
      required: 
        - role
        - content
      type: object
    AnthropicMessagesUsage: 
      description: Anthropic Messages API 호출의 토큰 사용량.
      properties: 
        cache_creation: 
          $ref: "#/components/schemas/AnthropicCacheCreationUsage"
        cache_creation_input_tokens: 
          type: integer
        cache_read_input_tokens: 
          type: integer
        input_tokens: 
          type: integer
        output_tokens: 
