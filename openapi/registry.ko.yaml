    BytePlusResponseInputItem: 
      description: "Responses 요청의 `input` 배열에 있는 하나의 항목입니다. `type` 필드로 구분됩니다. 자세한 내용은 https://docs.byteplus.com/en/docs/ModelArk/1585128를 참조하세요.\n"
      discriminator: 
