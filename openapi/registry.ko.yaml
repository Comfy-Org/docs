    TopazExternalStorage: 
      properties: 
        bucketName: 
          example: galaxies
          type: string
        credentials: 
          $ref: "#/components/schemas/TopazCredentialsS3"
        key: 
          description: "예시에는 선택적 디렉터리 경로가 포함된 이미지 시퀀스 요청의 표준 지정자가 포함되어 있습니다. \"%\"로 시작하고 정수 지정자 \"d\"로 끝나야 합니다. 예시의 \"0\"은 왼쪽에 0을 채우는 것을 나타내며, \"6\"은 파일 이름의 자릿수를 나타냅니다.\n비디오 요청의 키는 S3에서 지원하는 유효한 문자여야 합니다.\n"
          example: milky_way/%06d.tiff
          type: string
        provider: 
          enum: 
            - s3
          example: s3
          type: string
      required: 
        - provider
        - credentials
        - bucketName
        - key
      type: object
    TopazInputFilters: 
      description: EnhancementFilter 또는 FrameInterpolationFilter 객체의 배열
