            type: string
        - description: 릴리스 노트의 언어 설정
          in: query
          name: locale
          schema: 
            default: en
            enum: 
              - en
              - es
              - fr
              - ja
              - ko
              - ru
              - zh
            type: string
        - description: 릴리스 노트를 요청하는 플랫폼
          in: query
