          enum: 
            - message
          type: string
      required: 
        - type
        - role
        - content
      type: object
    BytePlusResponseInputReasoning: 
      additionalProperties: true
      description: "Chain-of-thought 블록입니다. 입력(seed-1-8, seed-2-0, deepseek-v3-2에 대한 수동 추론 주입) 및 응답 출력 항목으로 모두 사용됩니다. 입력으로 사용할 때는 다중 턴 대화에서 `previous_response_id`를 선호합니다.\n"
      properties: 
        content: 
