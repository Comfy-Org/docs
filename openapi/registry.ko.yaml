            - 4:3
            - 1:1
            - 3:4
            - 9:16
            - 21:9
            - adaptive
          type: string
        resolution: 
          description: "비디오 해상도. Seedance 2.0 & 2.0 fast, 1.5 pro, 1.0 lite 기본값: 720p. Seedance 1.0 pro & pro-fast 기본값: 1080p.\n참고: Seedance 2.0 & 2.0 fast는 1080p를 지원하지 않습니다.\n"
          enum: 
            - 480p
            - 720p
            - 1080p
            - 4k
          type: string
        return_last_frame: 
          default: false
          description: "생성된 비디오의 마지막 프레임 이미지를 반환할지 여부.\n참: 생성된 비디오의 마지막 프레임 이미지를 반환합니다. 이 파라미터를 참으로 설정한 후 비디오 생성 작업 정보 조회를 호출하여 마지막 프레임 이미지를 얻을 수 있습니다. 마지막 프레임 이미지는 PNG 형식이며, 픽셀 너비와 높이는 생성된 비디오와 일치하며, 워터마크가 포함되지 않습니다. 이 파라미터를 사용하면 여러 개의 연속 비디오를 생성할 수 있습니다: 이전에 생성된 비디오의 마지막 프레임이 다음 비디오 작업의 첫 번째 프레임으로 사용되어 여러 개의 연속 비디오를 빠르게 생성할 수 있습니다.\n거짓: 생성된 비디오의 마지막 프레임 이미지를 반환하지 않습니다.\n"
          type: boolean
        seed: 
          description: "무작위성을 제어하기 위한 시드 정수. 범위: [-1, 2^32-1]. -1은 무작위 시드를 사용합니다.\n"
          type: integer
        service_tier: 
          description: "처리를 위한 서비스 등급. Seedance 2.0 & 2.0 fast는 flex(오프라인 추론)를 지원하지 않습니다.\n"
          enum: 
