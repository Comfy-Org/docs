    BytePlusFile: 
      description: "POST /api/v3/files 및 GET /api/v3/files/{id}에서 반환된 파일 개체. https://docs.byteplus.com/en/docs/ModelArk/1873424를 참조하세요.\n"
      properties: 
        bytes: 
          description: "파일 크기(바이트). 상태가 `active`인 경우에만 반환됩니다."
          type: integer
        created_at: 
          description: 파일이 업로드된 Unix 타임스탬프(초)
          type: integer
        error: 
          description: "상태가 `failed`인 경우에만 반환되는 오류 세부 정보"
          nullable: true
          properties: 
            code: 
              description: 오류 코드
              type: string
            message: 
              description: 오류 설명
              type: string
          type: object
        expire_at: 
          description: 파일이 만료되는 Unix 타임스탬프(초)
          type: integer
        id: 
          description: 파일의 고유 ID
          type: string
        mime_type: 
          description: "파일의 MIME 유형. 상태가 `active`인 경우에만 반환됩니다."
          type: string
        object: 
          description: "`file`로 고정됨."
          type: string
        preprocess_configs: 
          $ref: "#/components/schemas/BytePlusFilePreprocessConfigs"
        purpose: 
          description: 파일의 목적
          type: string
        status: 
          description: 파일의 처리 상태
          enum: 
            - processing
            - active
            - failed
          type: string
      type: object
    BytePlusFilePreprocessConfigs: 
      description: 파일 유형별로 업로드된 파일에 적용되는 전처리 규칙
      nullable: true
      properties: 
        video: 
          nullable: true
          properties: 
            fps: 
              default: 1
              description: "업로드 시 비디오에서 샘플링되는 초당 프레임 수입니다.\n값이 높을수록 더 많은 세부 정보를 캡처하지만 추론 중에 더 많은 토큰을 소비합니다(비디오당 [10k, 80k] 토큰 범위).\n"
              format: float
              maximum: 5
              minimum: 0.2
              nullable: true
              type: number
            model: 
              description: "전처리 중에 프레임 샘플링 전략을 적용해야 하는 비디오 이해 모델 ID 또는 엔드포인트 ID입니다.\n생략하면 사전 `seed-1.8` 기본 전략이 사용됩니다.\n"
              type: string
          type: object
      type: object
    BytePlusFileUploadRequest: 
      description: "POST /api/v3/files에 대한 멀티파트 업로드 페이로드입니다. 바이너리 `file`은 필수입니다. 나머지 모든 것은 업스트림 선택적 필드를 반영합니다. https://docs.byteplus.com/en/docs/ModelArk/1870405를 참조하세요.\n"
      properties: 
        expire_at: 
          description: "파일이 만료되어야 하는 Unix 타임스탬프(초, UTC)입니다.\n범위: [now + 86400, now + 2592000] (1일~30일).\n기본값: now + 604800 (7일).\n"
          type: integer
        file: 
          description: 업로드할 바이너리 파일입니다.
          format: binary
          type: string
        preprocess_configs: 
          $ref: "#/components/schemas/BytePlusFilePreprocessConfigs"
        purpose: 
          default: user_data
          description: "업로드된 파일의 목적입니다. `user_data`는 일반 목적 값이며 현재 BytePlus에서 문서화된 유일한 값입니다.\n"
          type: string
      required: 
        - file
        - purpose
      type: object
    BytePlusImageGenerationRequest: 
      properties: 
        guidance_scale: 
          description: "출력 이미지가 입력 프롬프트와 얼마나 밀접하게 일치하는지 제어합니다. 범위 [1, 10]. 값이 높을수록 프롬프트 준수도가 높아집니다. seedream-3-0-t2i-250415의 기본값은 2.5, seededit-3-0-i2i-250628의 기본값은 5.5입니다. seedream-5.0-pro, 5.0-lite, 4.5 및 4.0에서는 지원되지 않습니다."
          format: float
          maximum: 10
          minimum: 1
          type: number
        image: 
          description: "Seedream-5.0-pro, 5.0-lite, 4.5 및 4.0, 그리고 seededit-3.0-i2i는 이 매개변수를 지원합니다.\n\n편집할 이미지의 Base64 인코딩 또는 접근 가능한 URL을 입력하세요. Seedream-5.0-pro, 5.0-lite, 4.5 및 4.0은 단일 이미지 또는 여러 이미지(다중 이미지 혼합 예시 참조) 입력을 지원하는 반면, seededit-3.0-i2i는 단일 이미지 입력만 지원합니다.\n\n• 이미지 URL: 이미지 URL이 접근 가능한지 확인하세요.\n• Base64 인코딩: 형식은 data:image/<이미지 형식>;base64,<Base64 인코딩>이어야 합니다. 참고: <이미지 형식>은 소문자여야 합니다(예: data:image/png;base64,<base64_image>).\n\n입력 이미지는 다음 요구 사항을 충족해야 합니다.\n• 이미지 형식: jpeg, png (seedream-5.0-pro, 5.0-lite, 4.5 및 4.0은 webp, bmp, tiff 및 gif도 지원하며, seedream-5.0-pro는 heic 및 heif도 지원합니다)\n• 종횡비(너비/높이): seedream-5.0-pro, 5.0-lite, 4.5 및 4.0의 경우 [1/16, 16] 범위; seededit-3.0-i2i의 경우 [1/3, 3] 범위\n• 너비 및 높이(px): > 14\n• 크기: 10MB 이하(seedream-5.0-pro의 경우 30MB)\n• 총 픽셀: seedream-5.0-pro의 경우 6000x6000(36,000,000px) 이하\n• 최대 14개의 참조 이미지(seedream-5.0-pro의 경우 10개)\n"
          oneOf: 
            - description: 단일 이미지 (URL 또는 Base64)
              type: string
            - description: "여러 이미지 (URL 또는 Base64) - seedream-5.0-pro, 5.0-lite, 4.5 및 4.0에서 지원"
              items: 
                type: string
              maxItems: 14
              type: array
        model: 
          enum: 
            - seedream-3-0-t2i-250415
            - seededit-3-0-i2i-250628
            - seedream-4-0-250828
            - seedream-4-5-251128
            - seedream-5-0-260128
            - seedream-5-0-pro-260628
          type: string
        optimize_prompt_options: 
          description: "프롬프트 최적화 기능에 대한 구성입니다. seedream-5.0-pro/5.0-lite/4.5(표준 모드만 지원) 및 seedream-4.0만 이 매개변수를 지원합니다.\n"
          properties: 
            mode: 
              default: standard
              description: "프롬프트 최적화 기능의 모드를 설정합니다. standard = 더 높은 품질, 더 긴 생성 시간. fast = 더 빠르지만 평균적인 품질."
              enum: 
                - standard
                - fast
              type: string
          type: object
        output_format: 
          default: jpeg
          description: 출력 이미지의 형식을 지정합니다. seedream-5.0-pro 및 5.0-lite만 이 매개변수를 지원합니다.
          enum: 
            - png
            - jpeg
          type: string
        prompt: 
          description: 이미지 생성 또는 변환을 위한 텍스트 설명
          type: string
        response_format: 
          default: url
          description: 응답으로 반환되는 생성된 이미지의 형식을 지정합니다.
          enum: 
            - url
            - b64_json
          type: string
        seed: 
          default: -1
          description: "이미지 생성의 무작위성을 제어하기 위한 시드입니다. 범위: [-1, 2147483647]. 지정하지 않으면 시드가 자동으로 생성됩니다. 동일한 출력을 재현하려면 동일한 시드 값을 사용하세요."
          type: integer
        sequential_image_generation: 
          description: "배치 생성 기능을 비활성화할지 여부를 제어합니다. 이 매개변수는 seedream-5.0-lite, 4.5 및 4.0에서만 지원됩니다(seedream-5.0-pro는 지원되지 않음). 유효한 값:\nauto: 자동 모드에서 모델은 사용자의 프롬프트에 따라 여러 이미지를 반환할지 여부와 포함할 이미지 수를 자동으로 결정합니다.\ndisabled: 배치 생성 기능을 비활성화합니다. 모델은 하나의 이미지만 생성합니다.\n"
          type: string
        sequential_image_generation_options: 
          description: "seedream-5.0-lite, 4.5 및 4.0만 이 매개변수를 지원합니다(seedream-5.0-pro는 지원되지 않음).\n배치 이미지 생성 기능에 대한 구성입니다. 이 매개변수는 sequential_image_generation이 auto로 설정된 경우에만 유효합니다.\n"
          properties: 
            max_images: 
              default: 15
              description: 이 요청에서 생성할 최대 이미지 수를 지정합니다. 입력 참조 이미지 수 + 생성된 이미지 수 ≤ 15.
              maximum: 15
              minimum: 1
              type: integer
          type: object
        size: 
          description: "\"seedream-3-0-t2i-250415\": 생성된 이미지의 크기(너비 x 높이(픽셀))를 지정합니다. [512x512, 2048x2048] 사이여야 합니다.\n\"seededit-3-0-i2i-250628\": 생성된 이미지의 너비 및 높이 픽셀입니다. 현재 적응형만 지원합니다.\n\"seedream-4-0-250828\": 생성된 이미지의 사양을 설정합니다. 두 가지 방법을 사용할 수 있지만 함께 사용할 수는 없습니다.\n  방법 1 | 해상도를 지정합니다. 선택적 값: 1K, 2K, 4K\n  방법 2 | 너비와 높이를 픽셀 단위로 지정합니다. 기본값: 2048x2048, 총 픽셀: [1024x1024, 4096x4096], 종횡비: [1/16, 16]\n\"seedream-4-5-251128\": 두 가지 방법을 사용할 수 있습니다.\n  방법 1 | 해상도를 지정합니다. 선택적 값: 2K, 4K\n  방법 2 | 너비와 높이를 픽셀 단위로 지정합니다. 기본값: 2048x2048, 총 픽셀: [2560x1440, 4096x4096], 종횡비: [1/16, 16]\n\"seedream-5-0-260128\": 두 가지 방법을 사용할 수 있습니다.\n  방법 1 | 해상도를 지정합니다. 선택적 값: 2K, 3K\n  방법 2 | 너비와 높이를 픽셀 단위로 지정합니다. 기본값: 2048x2048, 총 픽셀: [2560x1440, ~3072x3072], 종횡비: [1/16, 16]\n\"seedream-5-0-pro-260628\": 두 가지 방법을 사용할 수 있습니다(함께 사용할 수 없음).\n  방법 1 | 해상도를 지정하고 프롬프트에서 이미지의 종횡비, 형태 또는 목적을 설명합니다. 모델이 최종 크기를 결정합니다. 선택적 값: 1K, 2K\n  방법 2 | 너비와 높이를 픽셀 단위로 지정합니다. 기본값: 1024x1024, 총 픽셀: [1024x1024 (1048576), 2048x2048 (4194304)], 종횡비: [1/16, 16]\n"
          type: string
        stream: 
          default: false
          description: "스트리밍 출력 모드를 활성화할지 여부입니다. seedream-5.0-lite, 4.5 및 4.0만 이 매개변수를 지원합니다(seedream-5.0-pro는 지원되지 않음). false = 모든 출력 이미지가 한 번에 반환됩니다. true = 각 출력 이미지가 생성된 후 즉시 반환됩니다."
          type: boolean
        watermark: 
          default: true
          description: "생성된 이미지에 워터마크를 추가할지 여부를 지정합니다. false = 워터마크 없음, true = 'AI generated' 레이블이 있는 워터마크 추가"
          type: boolean
      required: 
        - prompt
        - model
      type: object
    BytePlusImageGenerationResponse: 
      properties: 
        created: 
          description: 요청이 생성된 시간을 나타내는 Unix 타임스탬프(초)
          type: integer
        data: 
          description: 생성된 이미지에 대한 정보를 포함합니다.
          items: 
            properties: 
              b64_json: 
                description: "Base64로 인코딩된 이미지 데이터 (response_format이 \"b64_json\"인 경우)"
