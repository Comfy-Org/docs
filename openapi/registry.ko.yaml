    WanVideoGenerationRequest: 
      properties: 
        input: 
          description: 프롬프트 단어 등 기본 정보를 입력합니다.
          properties: 
            audio_url: 
              description: "오디오 파일 다운로드 URL. 지원 형식: mp3 및 wav. reference_video_urls와 함께 사용할 수 없습니다."
              type: string
            img_url: 
              description: "첫 번째 프레임 이미지 URL 또는 Base64 인코딩 데이터. I2V 모델에 필수입니다. 이미지 형식: JPEG, JPG, PNG, BMP, WEBP. 해상도: 360-2000 픽셀. 파일 크기: 최대 10MB."
              type: string
            media: 
              description: "wan2.7 모델의 미디어 에셋 목록. 비디오 생성을 위한 참조 자료(이미지, 오디오, 비디오)를 지정합니다.\n각 요소는 type 및 url 필드를 포함합니다.\n지원되는 type 값은 모델에 따라 다릅니다:\n- wan2.7-i2v: first_frame, last_frame, driving_audio, first_clip\n- wan2.7-r2v: reference_image, reference_video\n- wan2.7-videoedit: video, reference_image\n"
              items: 
                properties: 
                  type: 
                    description: 미디어 자산 유형
                    enum: 
                      - first_frame
                      - last_frame
                      - driving_audio
                      - first_clip
                      - reference_image
                      - reference_video
                      - video
                    type: string
                  url: 
                    description: 미디어 파일의 URL (공개 HTTP/HTTPS URL 또는 OSS 임시 URL)
                    type: string
                required: 
                  - type
                  - url
                type: object
              type: array
            negative_prompt: 
              description: 역방향 프롬프트 단어는 비디오 화면에서 보고 싶지 않은 콘텐츠를 설명하는 데 사용됩니다.
              maxLength: 500
              type: string
            prompt: 
              description: "텍스트 프롬프트 단어. 중국어와 영어를 지원하며 길이는 800자를 초과하지 않습니다.\nwan2.6-r2v에서 여러 참조 비디오를 사용하는 경우 참조 비디오 순서대로 'character1', 'character2' 등을 사용하여 주제를 참조합니다.\n예: \"Character1이 길가에서 노래하고, Character2가 그 옆에서 춤을 춥니다\"\n"
              maxLength: 800
              type: string
            reference_video_urls: 
              description: "wan2.6-r2v 모델 전용 참조 비디오 URL입니다. 1-3개의 비디오 URL 배열입니다.\n입력 제한 사항:\n- 형식: mp4, mov\n- 수량: 1-3개 비디오\n- 단일 비디오 길이: 2-30초\n- 단일 파일 크기: 최대 30MB\n- audio_url과 함께 사용할 수 없음\n참조 기간: 단일 비디오 최대 5초, 두 개 비디오 각각 최대 2.5초, 세 개 비디오는 비례적으로 더 짧음.\n결제: 실제 사용된 참조 기간 기준.\n"
              items: 
                type: string
              maxItems: 3
              minItems: 1
              type: array
            template: 
              description: "비디오 효과 템플릿 이름입니다. 선택 사항. 현재 지원: squish, flying, carousel. 사용 시 프롬프트 파라미터는 무시됩니다."
              type: string
          type: object
        model: 
          description: 호출할 모델의 ID
          enum: 
            - wan2.5-t2v-preview
            - wan2.5-i2v-preview
            - wan2.6-t2v
            - wan2.6-i2v
            - wan2.6-r2v
            - wan2.7-i2v
            - wan2.7-t2v
            - wan2.7-r2v
            - wan2.7-videoedit
            - happyhorse-1.0-t2v
            - happyhorse-1.0-i2v
            - happyhorse-1.0-r2v
            - happyhorse-1.0-video-edit
            - happyhorse-1.1-t2v
            - happyhorse-1.1-i2v
            - happyhorse-1.1-r2v
          type: string
        parameters: 
          description: 비디오 처리 파라미터
          properties: 
            audio: 
              default: true
              description: 비디오에 오디오를 추가할지 여부
              type: boolean
            audio_setting: 
              default: auto
              description: "wan2.7-videoedit 모델의 비디오 오디오 설정입니다.\n- auto (기본값): 모델이 프롬프트 콘텐츠를 기반으로 지능적으로 판단합니다.\n- origin: 입력 비디오의 원본 오디오를 강제로 유지합니다.\n"
              enum: 
                - auto
                - origin
              type: string
            duration: 
              default: 5
              description: "생성된 비디오의 길이(초):\n- wan2.5 모델: 5초 또는 10초\n- wan2.6-t2v, wan2.6-i2v: 5초, 10초 또는 15초\n- wan2.6-r2v: 5초 또는 10초만 (15초 지원 안 함)\n- wan2.7-i2v, wan2.7-t2v: [2, 15] 범위의 정수\n- wan2.7-r2v, wan2.7-videoedit: [2, 10] 범위의 정수\n"
              maximum: 15
              minimum: 2
              type: integer
            prompt_extend: 
              default: true
              description: 프롬프트 지능형 재작성을 활성화할지 여부입니다. 기본값은 참입니다.
              type: boolean
            ratio: 
              description: "생성된 비디오의 화면 비율입니다. wan2.7 모델 전용입니다.\n제공되지 않으면 해상도 계층을 기준으로 기본값이 사용됩니다.\n"
              enum: 
                - 16:9
                - 9:16
                - 1:1
                - 4:3
                - 3:4
              type: string
            resolution: 
              description: "해상도 레벨입니다. 지원되는 값은 모델에 따라 다릅니다:\n- wan2.5-i2v-preview: 480P, 720P, 1080P\n- wan2.6-i2v: 720P, 1080P만 (480P 지원 안 함)\n- wan2.7 모델 (i2v, t2v, r2v, videoedit): 720P, 1080P (기본값 1080P)\n"
              enum: 
                - 480P
                - 720P
                - 1080P
              type: string
            seed: 
              description: "난수 시드, 모델 생성 콘텐츠의 무작위성을 제어하는 데 사용됩니다."
              maximum: 2147483647
              minimum: 0
              type: integer
            shot_type: 
              default: single
              description: "지능형 멀티 렌즈 제어입니다. prompt_extend가 활성화된 경우에만 작동합니다.\nwan2.6 및 wan2.7-r2v 모델용입니다.\n- single: 단일 샷 비디오 (기본값)\n- multi: 멀티 샷 비디오\n"
              enum: 
                - multi
                - single
              type: string
            size: 
              description: "비디오 해상도(너비*높이 형식). 지원되는 해상도는 모델에 따라 다릅니다:\nwan2.5 T2V: 480P (480*832, 832*480, 624*624), 720P, 1080P 크기\nwan2.6 T2V/R2V (480P 없음):\n  720P: 1280*720, 720*1280, 960*960, 1088*832, 832*1088\n  1080P: 1920*1080, 1080*1920, 1440*1440, 1632*1248, 1248*1632\n"
              type: string
            watermark: 
              default: false
              description: 워터마크 로고를 추가할지 여부입니다. 워터마크는 오른쪽 하단에 위치합니다.
              type: boolean
          type: object
      required: 
        - model
        - input
      type: object
