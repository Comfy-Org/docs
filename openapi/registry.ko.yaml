      description: "Sonilo 텍스트-음악 AI를 사용하여 텍스트 프롬프트로 음악을 생성합니다.\n원하는 음악을 설명하는 프롬프트와 호출자가 지정한 길이가 필요합니다.\n제목, 오디오 청크 및 완료 이벤트가 포함된 스트리밍 NDJSON 응답을 반환합니다.\n"
      operationId: SoniloTextToMusicGenerate
      requestBody: 
        content: 
          multipart/form-data: 
            schema: 
              $ref: "#/components/schemas/SoniloTextToMusicRequest"
        required: true
      responses: 
        "200": 
          content: 
            application/x-ndjson: 
              schema: 
                $ref: "#/components/schemas/SoniloStreamEvent"
          description: OK - 오디오 생성 이벤트가 포함된 스트리밍 NDJSON 응답
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SoniloErrorResponse"
          description: 잘못된 요청
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SoniloErrorResponse"
          description: 인증되지 않음 - 유효하지 않거나 누락된 API 키
        "402": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SoniloErrorResponse"
          description: 결제 필요 - 잔액 부족
        "422": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SoniloErrorResponse"
          description: 처리할 수 없는 엔티티 - 검증 오류
        "429": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SoniloErrorResponse"
          description: 너무 많은 요청 - 속도 제한됨
