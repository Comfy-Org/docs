          name: group_id
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SeedanceListUserAssetsResponse"
          description: 호출자가 소유한 에셋
        default: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 오류 4xx/5xx
      security: 
        - BearerAuth: 
            []
      summary: 호출자가 소유한 모든 그룹의 에셋 목록
      tags: 
        - API Nodes
        - Released
