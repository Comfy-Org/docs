          description: "Seedance 2.0, 2.0 fast 및 1.5 pro에서 지원됩니다. 생성된 비디오에 시각적 요소와 동기화된 오디오가 포함되는지 여부.\n참: 모델이 동기화된 오디오가 있는 비디오를 출력합니다.\n거짓: 모델이 무음 비디오를 출력합니다.\n"
          type: boolean
        model: 
          description: "호출할 모델의 ID. 사용 가능한 모델에는 seedance-1-5-pro-251215, seedance-1-0-pro-250528, seedance-1-0-pro-fast-251015, seedance-1-0-lite-t2v-250428, seedance-1-0-lite-i2v-250428이 있습니다."
          enum: 
            - seedance-1-5-pro-251215
            - seedance-1-0-pro-250528
            - seedance-1-0-lite-t2v-250428
            - seedance-1-0-lite-i2v-250428
            - seedance-1-0-pro-fast-251015
            - dreamina-seedance-2-0-260128
            - dreamina-seedance-2-0-fast-260128
            - dreamina-seedance-2-0-mini
          type: string
        ratio: 
          description: "생성된 비디오의 가로 세로 비율. Seedance 2.0 & 2.0 fast, 1.5 pro 기본값: adaptive.\n"
