    KlingMotionControlRequest: 
      properties: 
        callback_url: 
          description: 이 작업 결과의 콜백 알림 주소입니다. 설정된 경우 서버는 작업 상태가 변경될 때 적극적으로 알립니다.
          format: uri
          type: string
        character_orientation: 
          description: "비디오에서 캐릭터의 방향을 생성합니다. image: 사진 속 인물과 동일한 방향 (참조 비디오 길이는 10초를 초과할 수 없음). video: 비디오 내 캐릭터의 방향과 일치 (참조 비디오 길이는 30초를 초과할 수 없음)."
          enum: 
            - image
            - video
          type: string
        element_list: 
          description: 요소 ID 설정을 기반으로 한 참조 요소 목록입니다. 현재는 하나의 요소만 도입할 수 있습니다.
          items: 
            properties: 
              element_id: 
                description: 요소 ID
                format: int64
                type: integer
            type: object
          type: array
        external_task_id: 
          description: "사용자 정의 작업 ID. 사용자는 사용자 정의 작업 ID를 제공할 수 있으며, 이는 시스템 생성 작업 ID를 덮어쓰지 않지만 작업 조회에 사용할 수 있습니다. 단일 사용자 계정 내에서 고유해야 합니다."
          type: string
        image_url: 
          description: "참조 이미지. 생성된 비디오의 캐릭터, 배경 및 기타 요소는 참조 이미지를 기반으로 합니다. 이미지 Base64 인코딩 또는 이미지 URL 입력을 지원합니다 (접근성 보장). 지원되는 이미지 형식은 .jpg / .jpeg / .png입니다. 이미지 파일 크기는 10MB를 초과할 수 없으며, 이미지의 너비와 높이 크기는 300px에서 65536px 범위이고, 이미지의 가로 세로 비율은 1:2.5 ~ 2.5:1 사이여야 합니다."
          type: string
        keep_original_sound: 
          default: "yes"
          description: "비디오의 원본 사운드를 유지할지 여부. 열거 값: yes (원본 사운드 유지), no (원본 비디오 사운드 보존 안 함)."
          enum: 
            - "yes"
            - "no"
          type: string
        mode: 
          description: "비디오 생성 모드. std: 표준 모드 (비용 효율적). pro: 전문가 모드 (더 긴 지속 시간이지만 높은 품질의 비디오 출력)."
          enum: 
            - std
            - pro
          type: string
        model_name: 
          default: kling-v2-6
          description: "모션 제어의 모델 이름. 열거 값: kling-v2-6, kling-v3."
          enum: 
            - kling-v2-6
            - kling-v3
          type: string
        prompt: 
          description: "텍스트 프롬프트 단어로, 긍정 및 네거티브 설명을 포함할 수 있습니다. 2500자를 초과할 수 없습니다."
          maxLength: 2500
          type: string
        video_url: 
          description: "참조 비디오의 URL입니다. 생성된 비디오의 캐릭터 동작은 참조 비디오와 일치합니다. 비디오 파일은 .mp4/.mov를 지원하며, 파일 크기는 100MB를 초과하지 않고, 측면 길이는 340px에서 3850px 사이만 지원합니다. 비디오 지속 시간의 하한은 3초 이상이어야 하며, 상한은 character_orientation에 따라 다릅니다."
          type: string
        watermark_info: 
          description: 워터마크가 있는 결과를 동시에 생성할지 여부. 현재 사용자 정의 워터마크는 지원되지 않습니다.
