  /admin/sync-api-key-deletion: 
    post: 
      description: "역방향 삭제 동기화(클라우드 → comfy-api 레지스트리, BE-1542). 워크스페이스 API 키가 클라우드(새로운 진실의 소스)에서 삭제되면 클라우드는 이 엔드포인트를 호출하여 comfy-api 레지스트리의 api_keys 행도 제거되어 두 저장소가 수렴되도록 합니다. 멱등성: 알 수 없는 해시를 삭제하면 no_op입니다. M2M/관리자 전용입니다. 키 해시를 전달하며 평문은 절대 전달하지 않습니다.\n"
      operationId: SyncApiKeyDeletion
      parameters: 
        - description: 이 요청을 인증하는 데 사용되는 관리자 API 시크릿
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                customer_id: 
                  description: "키 소유자의 Firebase UID, 불일치 감지용. 삭제는 해시를 통해 진행됩니다(클라우드의 인바운드 RevokeByHash 의미 체계를 반영).\n"
                  type: string
                event: 
                  description: "동기화 이벤트 유형; \"delete\"만 지원됩니다."
                  enum: 
                    - delete
                  example: delete
                  type: string
                key_hash: 
                  description: 해지할 API 키의 SHA-256 16진수 해시.
                  maxLength: 64
                  minLength: 64
                  pattern: "^[A-Fa-f0-9]{64}$"
                  type: string
              required: 
                - event
                - key_hash
                - customer_id
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  result: 
                    description: "일치하는 키가 삭제된 경우 revoked; 해시와 일치하는 키가 없는 경우 no_op (이미 삭제되었거나 존재하지 않음).\n"
                    type: string
                required: 
                  - result
                type: object
          description: 삭제 동기화가 처리되었습니다
        "400": 
          content: 
