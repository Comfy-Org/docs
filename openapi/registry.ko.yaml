              description: 모델에 의해 생성된 토큰 수
              type: integer
            total_tokens: 
              description: 비디오 생성 모델의 경우 입력 토큰 수가 계산되지 않으며 기본값은 0입니다. 따라서 total_tokens = completion_tokens입니다.
              type: integer
          type: object
      type: object
    BytePlusVideoGenerationRequest: 
      properties: 
