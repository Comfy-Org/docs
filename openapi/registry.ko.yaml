    OpenRouterProviderPreferences: 
      description: "여러 모델 공급자를 사용할 수 있는 경우, 선택적으로 라우팅 선호도를 지정하세요."
      properties: 
        allow_fallbacks: 
          description: "백업 공급자가 요청을 처리하도록 허용할지 여부\n- true: (기본값) 기본 공급자(또는 \"order\"의 사용자 정의 공급자)를 사용할 수 없는 경우, 다음 최상의 공급자를 사용합니다.\n- false: 기본/사용자 정의 공급자만 사용하고, 사용할 수 없는 경우 업스트림 오류를 반환합니다.\n"
          nullable: true
          type: boolean
        data_collection: 
          description: "데이터 수집 설정입니다. 요구 사항을 충족하는 모델 공급자가 없으면 요청이 오류를 반환합니다.\n- allow: (기본값) 사용자 데이터를 비일시적으로 저장하고 이를 학습에 사용할 수 있는 공급자를 허용합니다.\n- deny: 사용자 데이터를 수집하지 않는 공급자만 사용합니다."
          oneOf: 
            - $ref: "#/components/schemas/OpenRouterProviderPreferencesDataCollection"
        enforce_distillable_text: 
          description: "텍스트 증류를 허용하는 모델로만 라우팅을 제한할지 여부입니다. true로 설정하면, 작성자가 증류를 허용한 모델만 사용됩니다."
          nullable: true
          type: boolean
        ignore: 
          description: "무시할 공급자 슬러그 목록입니다. 제공된 경우, 이 목록은 이 요청에 대해 계정 전체에서 무시된 공급자 설정과 병합됩니다."
          items: 
            $ref: "#/components/schemas/OpenRouterProviderPreferencesIgnoreItems"
          nullable: true
          type: array
        max_price: 
          $ref: "#/components/schemas/OpenRouterProviderPreferencesMaxPrice"
        only: 
          description: "허용할 공급자 슬러그 목록입니다. 제공된 경우, 이 목록은 이 요청에 대해 계정 전체에서 허용된 공급자 설정과 병합됩니다."
          items: 
            $ref: "#/components/schemas/OpenRouterProviderPreferencesOnlyItems"
          nullable: true
          type: array
        order: 
          description: "정렬된 공급자 슬러그 목록입니다. 라우터는 이 목록의 하위 집합에서 요청한 모델을 지원하는 첫 번째 공급자를 사용하려고 하며, 사용할 수 없으면 다음으로 폴백합니다. 사용 가능한 공급자가 없으면 요청은 오류 메시지와 함께 실패합니다."
          items: 
            $ref: "#/components/schemas/OpenRouterProviderPreferencesOrderItems"
          nullable: true
          type: array
        preferred_max_latency: 
          $ref: "#/components/schemas/OpenRouterPreferredMaxLatency"
        preferred_min_throughput: 
          $ref: "#/components/schemas/OpenRouterPreferredMinThroughput"
        quantizations: 
          description: 공급자를 필터링할 양자화 수준 목록입니다.
          items: 
            $ref: "#/components/schemas/OpenRouterQuantization"
          nullable: true
          type: array
        require_parameters: 
          description: "제공한 파라미터를 지원하는 공급자로만 필터링할지 여부입니다. 이 설정이 생략되거나 false로 설정되면, 공급자는 지원하는 파라미터만 수신하고 나머지는 무시합니다."
          nullable: true
          type: boolean
