        mode: 
          $ref: "#/components/schemas/KlingVideoGenMode"
        model_name: 
          $ref: "#/components/schemas/KlingTextToVideoModelName"
        multi_prompt: 
          description: "각 스토리보드에 대한 정보(프롬프트 및 지속 시간 등). 최대 6개 스토리보드 지원, 최소 1개. multi_shot이 true이고 shot_type이 customize인 경우 필수입니다."
          items: 
            properties: 
              duration: 
                description: 이 스토리보드의 지속 시간(초). 총 작업 시간을 초과할 수 없으며 1보다 작을 수 없습니다. 모든 스토리보드 지속 시간의 합은 총 작업 시간과 같습니다.
                type: string
              index: 
                description: 샷 시퀀스 번호
