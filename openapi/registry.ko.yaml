    BytePlusResponseMessageContent: 
      description: "메시지 내의 하나의 콘텐츠 항목입니다. `type`으로 구분됩니다: 텍스트의 경우 `input_text`, 이미지의 경우 `input_image`, 비디오의 경우 `input_video`, PDF/파일 업로드의 경우 `input_file`. 파일 기반 유형은 `file_id`를 통해 Files API ID를 참조할 수 있습니다.\n"
