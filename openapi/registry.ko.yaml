                  $ref: "#/components/schemas/ReleaseNote"
                type: array
          description: 릴리스 노트가 성공적으로 검색됨
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 잘못된 요청
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: 릴리스 노트 가져오기
      tags: 
        - Releases
    post: 
      description: GitHub 릴리스 이벤트를 처리하고 릴리스 노트를 생성하는 웹훅 엔드포인트
      operationId: ProcessReleaseWebhook
      parameters: 
        - description: 전달을 트리거한 이벤트의 이름
          in: header
          name: X-GitHub-Event
          required: true
          schema: 
            enum: 
              - release
            type: string
        - description: 이벤트를 식별하기 위한 전역 고유 식별자(GUID)
          in: header
          name: X-GitHub-Delivery
          required: true
          schema: 
            format: uuid
            type: string
        - description: 웹훅의 고유 식별자
          in: header
          name: X-GitHub-Hook-ID
          required: true
          schema: 
            type: string
        - description: SHA-256 해시 함수를 사용한 요청 본문의 HMAC 16진수 요약
          in: header
          name: X-Hub-Signature-256
          schema: 
            type: string
        - description: 웹훅이 생성된 리소스 유형
          in: header
          name: X-GitHub-Hook-Installation-Target-Type
          schema: 
            type: string
        - description: 웹훅이 생성된 리소스의 고유 식별자
          in: header
          name: X-GitHub-Hook-Installation-Target-ID
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              $ref: "#/components/schemas/GithubReleaseWebhook"
        required: true
      responses: 
        "200": 
          description: 웹훅이 성공적으로 처리됨
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 잘못된 요청
        "422": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 유효성 검사 실패 또는 엔드포인트 스팸 발생
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: 내부 서버 오류
      summary: GitHub 릴리스 웹훅 처리
      tags: 
        - Releases
      x-excluded: true
