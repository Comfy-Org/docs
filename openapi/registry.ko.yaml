        resolution: 
          description: 원하는 출력 해상도
          properties: 
            height: 
              description: 픽셀 단위의 높이. 최대 크기는 인코더에 따라 다르며 아래 표를 참조할 수 있습니다. <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
              type: integer
            width: 
              description: 픽셀 단위의 너비. 최대 크기는 인코더에 따라 다르며 아래 표를 참조할 수 있습니다. <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
              type: integer
          required: 
            - width
            - height
          type: object
        videoEncoder: 
          enum: 
            - DPX
            - EXR
            - JPEG
            - PNG
            - TIFF
          example: TIFF
          type: string
        videoProfile: 
          description: videoEncoder에 특화된 코덱 프로필
          example: Main
          type: string
      required: 
        - resolution
        - frameRate
      type: object
    TopazOutputInformationVideo: 
      properties: 
        audioBitrate: 
          description: "오디오 비트레이트, audioTransfer가 Copy 또는 Convert인 경우. 제공되지 않으면 코덱의 기본값이 사용됩니다."
          example: "320"
          type: string
        audioCodec: 
          description: __audioTransfer가 Copy 또는 Convert인 경우 필수입니다.__
          enum: 
            - AAC
            - AC3
            - PCM
          example: AAC
          type: string
        audioTransfer: 
          enum: 
            - Copy
            - Convert
            - None
          example: Copy
          type: string
        codecId: 
          description: 알려진 경우 비디오 코덱 ID입니다. 기본값은 videoEncoder입니다.
          example: h265-main-win-nvidia
          type: string
        container: 
          description: 원하는 출력 컨테이너
          enum: 
            - mp4
            - mov
            - mkv
          example: mp4
          type: string
        cropToFit: 
          description: 출력 크기에 맞게 중앙 자르기
          example: true
          type: boolean
        dynamicCompressionLevel: 
          description: __videoBitrate가 제공되지 않은 경우 필수입니다.__ 자동 CQP 선택.
          enum: 
            - Low
            - Mid
            - High
          example: Mid
          type: string
        frameRate: 
          description: 프레임 레이트
          example: 30
          type: number
        resolution: 
          description: 원하는 출력 해상도
          properties: 
            height: 
              description: 픽셀 단위의 높이. 최대 크기는 인코더에 따라 다르며 아래 표를 참조할 수 있습니다 <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
              type: integer
            width: 
              description: 픽셀 단위의 너비. 최대 크기는 인코더에 따라 다르며 아래 표를 참조할 수 있습니다 <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
              type: integer
          required: 
            - width
            - height
          type: object
        videoBitrate: 
          description: "__dynamicCompressionLevel이 제공되지 않은 경우 필수입니다.__ 초당 킬로비트는 \"k\", 메가비트는 \"m\" 접미사가 붙은 고정 비트레이트."
          example: 1k
          type: string
        videoEncoder: 
          enum: 
            - AV1
            - FFV1
            - H264
            - H265
            - ProRes
            - QuickTime Animation
            - QuickTime R210
            - QuickTime V210
            - VP9
          example: H265
          type: string
        videoProfile: 
          description: "videoEncoder에 특화된 코덱 프로필. 'videoEncoder' 선택에 따른 사용 가능한 프로필 조합은 다음과 같습니다 <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>High</td> <td>Main, Main10</td> <td>422 Proxy, 422 LT, 422 Std, 422 HQ</td> <td>8-bit, 10-bit</td> <td>Good, Best</td> </tr> </table>"
          example: Main
          type: string
      required: 
        - resolution
        - frameRate
        - audioCodec
        - audioTransfer
      type: object
