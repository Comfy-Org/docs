                description: "이미지 Base64 인코딩 또는 이미지 URL (접근성 보장). 지원되는 형식: .jpg/.jpeg/.png. 파일 크기는 10MB를 초과할 수 없습니다. 너비 및 높이 치수는 300px 이상이어야 하며 종횡비는 1:2.5 ~ 2.5:1 사이여야 합니다."
                type: string
