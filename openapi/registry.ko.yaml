              type: string
          type: object
        context_management: 
          $ref: "#/components/schemas/BytePlusResponseContextManagement"
        expire_at: 
          description: "저장된 응답과 캐시가 만료되는 Unix 타임스탬프(초, UTC)입니다. 범위는 (creation_time, creation_time + 604800]입니다. 기본값: creation_time + 259200(3일).\n"
          type: integer
        include: 
          description: "추가로 포함할 출력 필드입니다. 현재 지원되는 필드: `reasoning.encrypted_content` (수동 다중 턴 재사용을 위한 암호화+압축된 추론).\n"
          items: 
