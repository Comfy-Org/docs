          enum: 
            - "on"
            - "off"
          type: string
        watermark_info: 
          description: 워터마크 결과를 동시에 생성할지 여부. 현재 사용자 정의 워터마크는 지원되지 않습니다.
          properties: 
            enabled: 
              description: "true는 워터마크 생성, false는 생성하지 않음을 의미합니다."
