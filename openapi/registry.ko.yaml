  /releases: 
    get: 
      description: 캐싱을 사용하여 Strapi에서 릴리스 노트 가져오기
      operationId: GetReleaseNotes
      parameters: 
        - description: 릴리스 노트를 가져올 프로젝트
          in: query
          name: project
          required: true
          schema: 
