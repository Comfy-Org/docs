          description: Kling AI에서 생성된 비디오의 ID. 지난 30일 이내에 생성된 5초 및 10초 비디오만 지원됩니다.
          type: string
        video_url: 
          description: "업로드된 비디오의 링크를 가져옵니다. 비디오 파일은 .mp4/.mov를 지원하며, 파일 크기는 100MB를 초과하지 않고, 비디오 길이는 2~10초입니다."
