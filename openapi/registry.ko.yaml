          description: 작업을 트리거한 사용자.
          type: string
        machine_stats: 
          $ref: "#/components/schemas/MachineStats"
        operating_system: 
          description: 사용된 운영 체제
          type: string
        peak_vram: 
          description: 작업에서 사용한 최대 VRAM
          type: integer
        pr_number: 
          description: 풀 리퀘스트 번호
          type: string
        python_version: 
          description: 사용된 PyTorch 버전
          type: string
        pytorch_version: 
          description: 사용된 PyTorch 버전
          type: string
        start_time: 
          description: 작업의 시작 시간(Unix 타임스탬프).
          format: int64
          type: integer
        status: 
          $ref: "#/components/schemas/WorkflowRunStatus"
        storage_file: 
          $ref: "#/components/schemas/StorageFile"
