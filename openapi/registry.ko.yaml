          description: "1-6개의 base64로 인코딩된 참조 이미지 목록입니다. 각각은 10MB 미만이어야 합니다. 총 픽셀 수는 3,200만 픽셀을 초과할 수 없습니다."
          items: 
            type: string
          maxItems: 6
          minItems: 1
          type: array
        test_time_scaling: 
          description: "포함된 경우, 모델이 더 나은 이미지를 만들기 위해 더 많은 노력을 기울입니다. 1에서 15 사이의 값이 허용됩니다. 추가 크레딧 비용이 발생합니다."
          maximum: 15
          minimum: 1
          type: number
        version: 
          default: latest
          description: "사용할 모델 버전. 지원: latest-fast, latest, reve-remix-fast@20251030, reve-remix@20250915."
          type: string
      required: 
        - prompt
        - reference_images
      type: object
    ReveImageResponse: 
      description: Reve 이미지 API의 응답입니다.
      properties: 
        content_violation: 
          description: 생성된 이미지가 콘텐츠 정책을 위반하는지 여부를 나타냅니다.
          type: boolean
        credits_remaining: 
          description: 예산에 남은 크레딧 수입니다.
          type: number
        credits_used: 
          description: 이 요청에 사용된 크레딧 수입니다.
          type: number
        image: 
          description: base64로 인코딩된 이미지 데이터입니다. 요청이 성공하지 못한 경우 비어 있습니다.
          type: string
        request_id: 
          description: 요청에 대한 고유 ID입니다.
          type: string
        version: 
          description: 생성 과정에 사용된 특정 모델 버전입니다.
          type: string
      type: object
    RevePostprocessingOperation: 
      description: 이미지 생성 이후 적용할 후처리 작업입니다.
      properties: 
        effect_name: 
          description: 적용할 효과의 이름입니다. process가 effect인 경우에만 사용됩니다.
          type: string
        effect_parameters: 
          description: 기본 효과 설정을 재정의하는 선택적 파라미터입니다.
          type: object
        max_dim: 
          description: "fit_image의 최대 크기입니다. max_dim, max_width, max_height 중 최소 한 개는 설정되어야 합니다."
          maximum: 1024
          type: integer
        max_height: 
          description: fit_image의 최대 높이입니다.
          maximum: 1024
          type: integer
        max_width: 
          description: fit_image의 최대 너비입니다.
          maximum: 1024
          type: integer
        process: 
          description: "후처리 작업: upscale, remove_background, fit_image 또는 effect."
          enum: 
            - upscale
            - remove_background
            - fit_image
            - effect
          type: string
        upscale_factor: 
          description: "upscale 배율(2, 3 또는 4). process가 upscale인 경우에만 사용됩니다."
          maximum: 4
          minimum: 2
          type: integer
      required: 
        - process
      type: object
    Rodin3DCheckStatusRequest: 
      properties: 
        subscription_key: 
          description: 생성 엔드포인트의 구독 키입니다.
          type: string
      required: 
        - subscription_key
      type: object
    Rodin3DCheckStatusResponse: 
      properties: 
        jobs: 
          description: 생성 상태에 대한 세부 정보입니다.
          items: 
            $ref: "#/components/schemas/RodinCheckStatusJobItem"
          type: array
      type: object
    Rodin3DDownloadRequest: 
      properties: 
        task_uuid: 
          description: 작업 UUID
          type: string
      required: 
        - task_uuid
      type: object
    Rodin3DDownloadResponse: 
      properties: 
        list: 
          items: 
            $ref: "#/components/schemas/RodinResourceItem"
          type: array
      type: object
    Rodin3DGenerateRequest: 
      properties: 
        TAPose: 
          description: "선택 사항입니다. 인간형 모델을 생성할 때 이 파라미터는 생성 결과를 T/A 포즈로 제어합니다. 참(true)인 경우, 모델은 T 포즈 또는 A 포즈가 됩니다.\n"
          type: boolean
        addons: 
          description: "선택 사항입니다. 기본값은 []입니다. 가능한 값은 `HighPack`입니다. HighPack을 선택하면 기본 2K 대신 4K 해상도 텍스처가 생성됩니다. Quad 모드의 경우 면의 개수는 `quality` 파라미터에서 선택된 면 개수의 약 16배가 됩니다.\n"
          items: 
            $ref: "#/components/schemas/RodinAddonType"
          type: array
        bbox_condition: 
          description: "선택 사항입니다. 생성된 모델의 최대 크기를 제어하는 컨트롤넷입니다. 이 배열은 정확히 고정된 순서(y, z, x)로 너비(Y축), 높이(Z축), 길이(X축)의 3개 요소를 포함해야 합니다.\n"
          items: 
            type: integer
          type: array
        condition_mode: 
          $ref: "#/components/schemas/RodinConditionModeType"
        geometry_file_format: 
          $ref: "#/components/schemas/RodinGeometryFileFormatType"
        geometry_instruct_mode: 
          $ref: "#/components/schemas/RodinGeometryInstructModeType"
        hd_texture: 
          description: "선택 사항입니다. 기본값은 거짓(false)입니다. 참(true)인 경우 고품질 텍스처가 제공됩니다.\n"
          type: boolean
        images: 
          description: "생성에 사용할 이미지로, 최대 5개 이미지입니다. 폼 데이터 요청이 이미지 순서를 유지하므로 첫 번째 이미지는 재질 생성을 위한 이미지가 됩니다. 이미지 기반 3D 생성의 경우: 필수(하나 이상의 이미지 필요, 최대 5개). 텍스트 기반 3D 생성의 경우: null.\n"
          type: string
        is_micro: 
          description: "선택 사항입니다. 기본값은 거짓(false)입니다. 참(true)인 경우 마이크로 디테일 크기 조절이 적용됩니다. 이 파라미터는 Gen-2.5-Extreme-High 티어에서만 사용 가능합니다.\n"
          type: boolean
        is_symmetric: 
          description: "선택 사항입니다. 기본값은 거짓(false)입니다. 참(true)인 경우 이 파라미터는 생성된 모델이 대칭인지 여부를 결정합니다.\n"
          type: boolean
        material: 
          $ref: "#/components/schemas/RodinMaterialType"
        mesh_mode: 
          $ref: "#/components/schemas/RodinMeshModeType"
        mesh_simplify: 
          description: "선택 사항입니다. 기본값은 참(true)입니다. 참(true)인 경우 생성된 모델이 단순화됩니다. 이 파라미터는 mesh_mode가 Raw로 설정된 경우 적용됩니다.\n"
          type: boolean
        mesh_smooth: 
          description: "선택 사항입니다. 기본값은 거짓(false)입니다. 참(true)인 경우 생성된 모델이 부드럽게 처리됩니다(Rodin Gen-1과 유사). 이 파라미터는 mesh_mode가 Quad로 설정된 경우 적용됩니다.\n"
          type: boolean
        preview_render: 
          description: "선택 사항입니다. 기본값은 거짓(false)입니다. 참(true)인 경우 다운로드 목록에 추가 고품질 렌더 이미지가 제공됩니다.\n"
          type: boolean
        prompt: 
          description: "모델 생성을 안내하는 텍스트 프롬프트입니다. 이미지 기반 3D 생성의 경우: 선택 사항(제공되지 않으면 제공된 이미지 기반 AI 생성 프롬프트가 사용됩니다). 텍스트 기반 3D 생성의 경우: 필수.\n"
          type: string
        quality: 
          $ref: "#/components/schemas/RodinQualityType"
        quality_override: 
          description: "선택 사항입니다. 생성 시 폴리곤 수를 사용자 정의하여 메시 면 개수를 더 정확하게 제어합니다. mesh_mode = Raw: 500~1,000,000 범위(기본값 500,000). mesh_mode = Quad: 1,000~200,000 범위(기본값 18,000). 이 파라미터가 호출되면 `quality` 파라미터는 적용되지 않습니다.\n"
          type: integer
        seed: 
          description: "선택 사항. 메시 생성 시 무작위화를 위한 시드 값으로, 0에서 65535까지의 범위(양쪽 포함)입니다. 제공되지 않으면 시드가 무작위로 생성됩니다.\n"
          type: integer
        texture_delight: 
          description: "선택 사항. 기본값은 거짓(false)입니다. 참(true)으로 설정하면 이 파라미터가 이미지 전처리를 적용하여 텍스처에서 조명 정보를 제거합니다.\n"
          type: boolean
        texture_mode: 
          $ref: "#/components/schemas/RodinTextureModeType"
        tier: 
          $ref: "#/components/schemas/RodinTierType"
        use_original_alpha: 
          description: "기본값은 거짓(false)입니다. 참(true)으로 설정하면 이미지 처리 시 이미지의 원본 투명도 채널이 사용됩니다.\n"
          type: boolean
      type: object
    Rodin3DGenerateResponse: 
      properties: 
        error: 
          description: "오류 메시지(있는 경우). 가능한 값으로는 NO_ACTIVE_SUBSCRIPTION, SUBSCRIPTION_PLAN_TOO_LOW, INSUFFICIENT_FUND, INVALID_REQUEST, USER_NOT_FOUND, GROUP_NOT_FOUND, PERMISSION_DENIED, UNKNOWN 등이 있습니다.\n"
          nullable: true
          type: string
        jobs: 
          $ref: "#/components/schemas/RodinGenerateJobsData"
        message: 
          description: 성공 메시지 또는 상세 오류 정보.
          type: string
        prompt: 
          description: 에코된 프롬프트(해당하는 경우).
          type: string
        submit_time: 
          description: 제출 타임스탬프.
          type: string
        uuid: 
          description: 작업 UUID. 상태/다운로드 요청에 사용하세요.
          type: string
      type: object
    RodinAddonType: 
      description: "가능한 값은 `HighPack`입니다. HighPack을 선택하면 기본 2K 대신 4K 해상도 텍스처를 생성합니다. Quad 모드인 경우 면의 수는 `quality` 매개변수에서 선택한 면 수의 약 16배가 됩니다. 생성당 추가 1크레딧이 소모됩니다.\n"
      enum: 
        - HighPack
      type: string
    RodinCheckStatusJobItem: 
      properties: 
        status: 
          $ref: "#/components/schemas/RodinStatusOptions"
        uuid: 
          description: 하위 UUID
          type: string
      type: object
    RodinConditionModeType: 
      description: "다중 이미지 3D 생성에만 유용합니다. 선택 사항. 다중 이미지 생성의 모드를 선택합니다. 기본값은 concat입니다. `fuse` 모드(여러 객체의 이미지 업로드)의 경우, fuse 모드는 생성에 사용할 이미지에서 모든 객체의 모든 특징을 추출하여 융합합니다. `concat` 모드(단일 객체의 이미지 업로드)의 경우, concat 모드는 Rodin 모델이 이러한 이미지를 단일 객체의 다중 뷰 이미지로 인식하도록 안내합니다.\n"
      enum: 
        - fuse
        - concat
      type: string
    RodinGenerateJobsData: 
      properties: 
        subscription_key: 
          description: 구독 키.
          type: string
        uuids: 
          description: 하위 작업 UUID.
          items: 
            type: string
          type: array
      type: object
    RodinGeometryFileFormatType: 
      description: "선택 사항. 출력 지오메트리 파일의 형식입니다. 기본값은 glb입니다.\n"
      enum: 
        - glb
        - usdz
        - fbx
        - obj
        - stl
      type: string
    RodinGeometryInstructModeType: 
      description: "선택 사항. 기본값은 `faithful`입니다. Creative 모드는 출력 일관성을 보장하면서 생성 견고성을 향상시켜, 출력 간 품질과 일관성을 유지하면서 더 유연하고 창의적인 생성을 가능하게 합니다. Gen-2.5-Medium 및 Gen-2.5-High 등급에서 사용 가능합니다.\n"
      enum: 
        - faithful
        - creative
      type: string
    RodinMaterialType: 
      description: "선택 사항. 재질 유형입니다. 기본값은 PBR입니다. PBR: 물리 기반 재질(Physically Based Materials)로, 기본 색상 텍스처, 금속성 텍스처, 노멀 텍스처 및 거칠기 텍스처를 포함하며 동적 조명에서 높은 사실성과 물리적으로 정확한 동작을 제공합니다. Shaded: 베이크된 조명이 포함된 기본 색상 텍스처만 제공하여 스타일화된 시각 효과를 제공합니다. All: PBR과 Shaded가 모두 제공됩니다. None: 재질이 없는 에셋입니다.\n"
      enum: 
        - PBR
        - Shaded
        - All
        - None
      type: string
    RodinMeshModeType: 
      description: "선택 사항. 생성된 모델의 면 유형을 제어합니다. 기본값은 Quad입니다. Raw 모드는 삼각형 면 모델을 생성합니다. Quad 모드는 사각형 면 모델을 생성합니다. 값이 Raw인 경우, `quality`는 medium으로 고정되고 `addons`는 []로 고정됩니다. Rodin Sketch 등급의 경우 삼각형 면만 생성할 수 있습니다.\n"
      enum: 
        - Quad
        - Raw
      type: string
    RodinQualityType: 
      description: "선택 사항. 생성된 모델의 면 수입니다. 기본값은 medium입니다.\n"
      enum: 
        - extra-low
        - low
        - medium
        - high
      type: string
    RodinResourceItem: 
      properties: 
        name: 
          description: 파일 이름
          type: string
        url: 
          description: 다운로드 URL
          type: string
      type: object
    RodinStatusOptions: 
      enum: 
        - Done
        - Failed
        - Generating
        - Waiting
      type: string
    RodinTextureModeType: 
      description: "선택 사항. 값이 높을수록 더 많은 사고 노력을 투자하여 더 나은 결과를 생성하지만, 생성 시간이 더 오래 걸립니다.\n"
      enum: 
        - legacy
        - extreme-low
        - low
        - medium
        - high
      type: string
    RodinTierType: 
      description: "생성 등급입니다. 기본값은 Regular입니다. Sketch: 기본 세부 정보가 포함된 빠른 생성, 초기 컨셉에 적합합니다. Regular: 균형 잡힌 품질과 속도, 일반 용도에 이상적입니다. Detail: Regular에 비해 향상된 세부 정보, 복잡한 결과에 권장(처리 시간이 더 오래 걸림). Smooth: Regular보다 선명하고 또렷한 출력, 처리 시간이 약간 더 오래 걸립니다. `Gen-2` 값을 설정하여 Gen-2 생성을 호출합니다. `Gen-2.5-*` 값을 사용하여 Gen-2.5 생성을 호출합니다: Gen-2.5-Extreme-Low (빠른 단순 에셋), Gen-2.5-Low (깔끔한 에셋 및 소형 하드서페이스 소품), Gen-2.5-Medium (중간 정도의 복잡한 모델), Gen-2.5-High (더 풍부한 구조 표현과 부드러운 표면을 갖춘 고품질 에셋), Gen-2.5-Extreme-High (고주파 세부 정보 재현).\n"
      enum: 
        - Regular
        - Sketch
        - Detail
        - Smooth
        - Gen-2
        - Gen-2.5-Extreme-Low
        - Gen-2.5-Low
        - Gen-2.5-Medium
        - Gen-2.5-High
        - Gen-2.5-Extreme-High
      type: string
    RunwayAspectRatioEnum: 
      enum: 
        - 1280:720
        - 720:1280
        - 1104:832
        - 832:1104
        - 960:960
        - 1584:672
        - 1280:768
        - 768:1280
      type: string
    RunwayContentModeration: 
      description: 콘텐츠 관리 시스템의 동작에 영향을 미치는 설정.
      properties: 
        publicFigureThreshold: 
          description: "`low`로 설정하면 콘텐츠 관리 시스템이 인식 가능한 공인을 포함한 생성을 방지하는 데 덜 엄격해집니다."
          enum: 
            - auto
            - low
          type: string
      type: object
    RunwayDurationEnum: 
      enum: 
        - 5
        - 10
      type: integer
    RunwayImageToVideoRequest: 
      properties: 
        duration: 
          $ref: "#/components/schemas/RunwayDurationEnum"
        model: 
          $ref: "#/components/schemas/RunwayModelEnum"
        promptImage: 
          $ref: "#/components/schemas/RunwayPromptImageObject"
        promptText: 
          description: 생성을 위한 텍스트 프롬프트
          maxLength: 1000
          type: string
        ratio: 
          $ref: "#/components/schemas/RunwayAspectRatioEnum"
        seed: 
          description: 생성을 위한 랜덤 시드
          format: int64
          maximum: 4294967295
          minimum: 0
          type: integer
      required: 
        - promptImage
        - seed
        - model
        - duration
        - ratio
      type: object
    RunwayImageToVideoResponse: 
      properties: 
        id: 
          description: 작업 ID
          type: string
      type: object
    RunwayModelEnum: 
      description: 생성에 사용 가능한 Runway 모델입니다.
      enum: 
        - gen4_turbo
        - gen3a_turbo
      type: string
    RunwayPromptImageDetailedObject: 
      description: 비디오 시퀀스에서 위치가 지정된 이미지를 나타냅니다.
      properties: 
        position: 
          description: "출력 비디오에서 이미지의 위치입니다. 'last'는 현재 gen3a_turbo에서만 지원됩니다."
          enum: 
            - first
            - last
          type: string
        uri: 
          description: 인코딩된 이미지를 포함하는 HTTPS URL 또는 데이터 URI입니다.
          type: string
      required: 
        - uri
        - position
      type: object
    RunwayPromptImageObject: 
      description: 비디오 생성에 사용할 이미지입니다. 단일 URI 또는 위치가 있는 이미지 객체 배열일 수 있습니다.
      oneOf: 
