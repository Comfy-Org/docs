          default: Normal
          description: "생성 작업 유형:\n- Normal: 텍스처가 있는 기하학적 모델 생성(기본값)\n- LowPoly: 지능형 다각형 축소 후 생성된 모델\n- Geometry: 텍스처 없는 모델 생성(흰색 모델)\n- Sketch: 스케치 또는 선화에서 생성 모델\n"
          enum: 
            - Normal
            - LowPoly
            - Geometry
            - Sketch
          type: string
        ImageBase64: 
          description: "이미지 기반 3D 생성을 위한 Base64 인코딩 이미지.\n해상도: 최소 128px, 최대 5000px (한 면 기준).\n최대 크기: 8MB (인코딩 전 6MB 권장).\n지원 형식: jpg, png, jpeg, webp.\nImageBase64/ImageUrl 또는 Prompt 중 하나가 필수입니다.\n"
          type: string
        ImageUrl: 
          description: "이미지 기반 3D 생성을 위한 입력 이미지 URL.\n해상도: 최소 128px, 최대 5000px (한 면 기준).\n최대 크기: 8MB.\n지원 형식: jpg, png, jpeg, webp.\nImageBase64/ImageUrl 또는 Prompt 중 하나가 필수입니다.\n"
          format: uri
          type: string
        Model: 
          default: "3.0"
          description: "Tencent HY 3D 글로벌 모델 버전.\n기본값은 3.0이며, 선택 가능: 3.0, 3.1.\n버전 3.1 선택 시 LowPoly 파라미터를 사용할 수 없습니다.\n"
          enum: 
            - "3.0"
            - "3.1"
          example: "3.0"
          type: string
        MultiViewImages: 
          description: "3D 생성을 위한 다중 원근 모델 이미지.\n각 원근은 이미지 하나로 제한됩니다.\n이미지 크기 제한: 인코딩 후 최대 8MB.\n이미지 해상도: 최소 128px, 최대 5000px (한 면 기준).\n지원 형식: JPG, PNG.\n"
          items: 
            $ref: "#/components/schemas/TencentViewImage"
          type: array
        PolygonType: 
          default: triangle
          description: "다각형 유형 (GenerateType이 LowPoly인 경우에만 유효).\n- triangle: 삼각형 면 (기본값)\n- quadrilateral: 사각형과 삼각형 면의 혼합\n"
          enum: 
            - triangle
            - quadrilateral
          type: string
        Prompt: 
          description: "3D 콘텐츠 생성을 위한 텍스트 설명.\n최대 1024자의 utf-8 문자 지원.\nPrompt 또는 ImageBase64/ImageUrl 중 하나가 필수이며, 둘 다는 안 됩니다.\n"
          example: A cat
          maxLength: 1024
          type: string
      type: object
