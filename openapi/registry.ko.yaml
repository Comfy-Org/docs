                  type: string
              type: object
            imageSize: 
              description: "선택 사항입니다. 생성된 이미지의 크기를 지정합니다. 지원되는 값은 1K, 2K, 4K입니다. 지정되지 않은 경우 모델은 기본값 1K를 사용합니다."
              type: string
          type: object
        maxOutputTokens: 
          description: "응답에서 생성될 수 있는 최대 토큰 수입니다. 토큰은 약 4자입니다. 100토큰은 대략 60-80단어에 해당합니다.\n"
          example: 2048
          maximum: 8192
          minimum: 16
          type: integer
        responseModalities: 
          items: 
            enum: 
              - TEXT
              - IMAGE
            type: string
          type: array
        seed: 
          description: "시드가 특정 값으로 고정되면 모델은 반복 요청에 대해 동일한 응답을 제공하기 위해 최선을 다합니다. 결정적 출력은 보장되지 않습니다. 또한 온도와 같은 모델 또는 파라미터 설정을 변경하면 동일한 시드 값을 사용하더라도 응답에 변형이 발생할 수 있습니다. 기본적으로 무작위 시드 값이 사용됩니다. 다음 모델에서 사용 가능합니다: gemini-2.5-flash, gemini-2.5-pro, gemini-2.5-flash-preview-04-1, gemini-2.5-pro-preview-05-0, gemini-2.0-flash-lite-00, gemini-2.0-flash-001\n"
          example: 343940597
          type: integer
        stopSequences: 
          items: 
            type: string
          type: array
        temperature: 
          default: 1
          description: "온도는 응답 생성 중 샘플링에 사용되며, topP 및 topK가 적용될 때 발생합니다. 온도는 토큰 선택의 무작위성 정도를 제어합니다. 낮은 온도는 덜 개방적이거나 창의적인 응답이 필요한 프롬프트에 좋은 반면, 높은 온도는 더 다양하거나 창의적인 결과를 초래할 수 있습니다. 온도가 0이면 가장 높은 확률의 토큰이 항상 선택됩니다. 이 경우 주어진 프롬프트에 대한 응답은 대부분 결정적이지만 여전히 약간의 변형이 가능합니다. 모델이 너무 일반적이거나 너무 짧은 응답을 반환하거나 모델이 대체 응답을 제공하는 경우 온도를 높여 보십시오.\n"
          format: float
          maximum: 2
          minimum: 0
          type: number
        thinkingConfig: 
          description: 선택 사항입니다. 생각 기능을 위한 구성입니다. 생각은 모델이 복잡한 작업을 더 작은 단계로 분해하여 더 높은 품질의 응답을 생성하는 프로세스입니다.
          properties: 
            includeThoughts: 
              description: "선택 사항입니다. 참(true)인 경우, 모델은 응답에 생각을 포함합니다."
              type: boolean
            thinkingBudget: 
              description: 선택 사항입니다. 모델의 생각 프로세스에 대한 토큰 예산입니다. 모델은 이 예산 내에서 유지하기 위해 최선을 다합니다.
              type: integer
            thinkingLevel: 
              description: 선택 사항입니다. 모델의 생각 수준입니다.
              enum: 
                - THINKING_LEVEL_UNSPECIFIED
                - LOW
                - MEDIUM
                - HIGH
                - MINIMAL
              type: string
          type: object
        topK: 
          default: 40
          description: "Top-K는 모델이 출력을 위해 토큰을 선택하는 방식을 변경합니다. Top-K가 1이면 다음 선택된 토큰은 모델 어휘의 모든 토큰 중에서 가장 확률이 높은 토큰입니다. Top-K가 3이면 다음 토큰은 temperature를 사용하여 가장 확률이 높은 3개의 토큰 중에서 선택됩니다.\n"
          example: 40
          minimum: 1
          type: integer
        topP: 
          default: 0.95
          description: "지정된 경우, nucleus 샘플링이 사용됩니다.\nTop-P는 모델이 출력을 위해 토큰을 선택하는 방식을 변경합니다. 토큰은 가장 확률이 높은 것(top-K 참조)에서 가장 낮은 것까지 선택되며, 확률의 합이 top-P 값과 같아질 때까지 선택됩니다. 예를 들어, 토큰 A, B, C의 확률이 각각 0.3, 0.2, 0.1이고 top-P 값이 0.5인 경우, 모델은 temperature를 사용하여 A 또는 B를 다음 토큰으로 선택하고 C는 후보에서 제외합니다.\n덜 무작위적인 응답을 위해서는 낮은 값을, 더 무작위적인 응답을 위해서는 높은 값을 지정하세요.\n"
          format: float
          maximum: 1
          minimum: 0
          type: number
      type: object
    GeminiInlineData: 
      description: "원시 바이트의 인라인 데이터입니다. gemini-2.0-flash-lite 및 gemini-2.0-flash의 경우 inlineData를 사용하여 최대 3000개의 이미지를 지정할 수 있습니다.\n"
      properties: 
        data: 
          description: "프롬프트에 인라인으로 포함할 이미지, PDF 또는 비디오의 base64 인코딩입니다. 미디어를 인라인으로 포함할 때는 데이터의 미디어 유형(mimeType)도 지정해야 합니다. 크기 제한: 20MB\n"
          format: byte
          type: string
        mimeType: 
          $ref: "#/components/schemas/GeminiMimeType"
      type: object
    GeminiMimeType: 
      description: data 또는 fileUri 필드에 지정된 파일의 미디어 유형입니다. 허용되는 값은 다음과 같습니다. gemini-2.0-flash-lite 및 gemini-2.0-flash의 경우 오디오 파일의 최대 길이는 8.4시간이고 비디오 파일(오디오 제외)의 최대 길이는 1시간입니다. 자세한 내용은 Gemini 오디오 및 비디오 요구 사항을 참조하세요. 텍스트 파일은 UTF-8로 인코딩되어야 합니다. 텍스트 파일의 내용은 토큰 제한에 포함됩니다. 이미지 해상도에는 제한이 없습니다.
      enum: 
        - application/pdf
        - audio/mpeg
        - audio/mp3
        - audio/wav
        - image/png
        - image/jpeg
        - image/webp
        - text/plain
        - video/mov
        - video/mpeg
        - video/mp4
        - video/mpg
        - video/avi
        - video/wmv
        - video/mpegps
        - video/flv
      type: string
    GeminiOffset: 
      description: "비디오 타임라인 위치의 기간 오프셋을 나타냅니다.\n"
      properties: 
        nanos: 
          description: "나노초 해상도의 초 단위 부호가 있는 분수입니다. 분수가 있는 음수 초 값은 여전히 음수가 아닌 나노초 값을 가져야 합니다.\n"
          example: 0
          maximum: 999999999
          minimum: 0
          type: integer
        seconds: 
          description: "시간 범위의 부호가 있는 초입니다. -315,576,000,000에서 +315,576,000,000 사이여야 합니다(포함).\n"
          example: 60
