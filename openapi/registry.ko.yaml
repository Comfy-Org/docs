  /admin/verify-api-key: 
    post: 
      description: "ComfyUI API 키를 검증하고 관련 고객 정보를 반환합니다.\n이 엔드포인트는 cloud.comfy.org에서 Firebase 토큰 대신 API 키를 통해 사용자를 인증하는 데 사용됩니다.\n"
      operationId: VerifyApiKey
      parameters: 
        - description: 이 요청을 승인하는 데 사용되는 관리자 API 시크릿
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                api_key: 
                  description: "검증할 ComfyUI API 키 (예: comfy_xxx...)"
                  type: string
                include_customer_keys: 
                  description: "true인 경우, 응답에 customer_api_keys도 포함됩니다: 고객의 모든 API 키(hash + prefix + name + description)의 전체 집합으로, 클라우드의 migrate-on-miss가 고객의 모든 키를 workspace_api_keys에 seed할 수 있습니다(검증 중인 키뿐만 아니라). M2M/관리자 전용; 해시를 포함하며, 평문은 절대 포함하지 않습니다.\n"
                  type: boolean
              required: 
                - api_key
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  customer_api_keys: 
                    description: "고객의 모든 API 키: 요청에서 include_customer_keys=true로 설정된 경우에만 반환됩니다. 클라우드의 migrate-on-miss가 모든 키를 workspace_api_keys(해시 기준)에 seed할 수 있게 하여, 클라우드 키 목록이 고객의 전체 집합과 일치하도록 합니다(검증된 키뿐만 아니라). M2M/관리자 전용; 해시 포함, 평문 없음.\n"
                    items: 
                      $ref: "#/components/schemas/MigrationAPIKey"
                    type: array
                  email: 
                    description: 고객의 이메일 주소
                    type: string
                  firebase_uid: 
                    description: 사용자의 Firebase UID
                    type: string
                  is_admin: 
                    description: 고객이 관리자인지 여부
                    type: boolean
                  key_description: 
                    description: "api_keys 행 자체의 설명입니다. 클라우드의 migrate-on-miss 경로가 캐시된 workspace_api_keys 행에 자리 표시자를 작성하는 대신 이를 보존할 수 있도록 반환됩니다.\n"
                    type: string
                  key_name: 
                    description: "api_keys 행 자체의 이름(표시 레이블)입니다. 클라우드의 migrate-on-miss 경로가 캐시된 workspace_api_keys 행에 자리 표시자를 작성하는 대신 이를 보존할 수 있도록 반환됩니다.\n"
                    type: string
                  name: 
                    description: 고객의 이름
                    type: string
                  valid: 
                    description: API 키가 유효한지 여부
                    type: boolean
                required: 
                  - valid
                  - firebase_uid
                type: object
          description: API 키가 유효함
        "401": 
          description: 인증되지 않음 또는 관리자 API 시크릿 누락됨
