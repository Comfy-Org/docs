      type: object
    BytePlusTTSCreateRequest: 
      description: BytePlus Seed Audio 1.0 생성 요청 본문입니다.
      properties: 
        audio_config: 
          $ref: "#/components/schemas/BytePlusTTSAudioConfig"
        model: 
          description: 모델 식별자입니다. 지원되는 유일한 모델은 seed-audio-1.0입니다.
          type: string
        references: 
          description: "참조 리소스입니다. 텍스트 전용 생성 시 생략합니다. 최대 3개의 오디오 참조(각각 최대 30초, 10MB; wav, mp3, pcm 또는 ogg_opus) 또는 정확히 1개의 이미지 참조(최대 10MB; jpeg, png 또는 webp). 이미지 참조는 오디오 참조와 혼합할 수 없습니다.\n"
          items: 
            $ref: "#/components/schemas/BytePlusTTSReference"
          type: array
        text_prompt: 
          description: "합성할 프롬프트 또는 텍스트(최대 2,048자). 오디오 참조가 제공된 경우 @Audio1, @Audio2, @Audio3을 사용하여 순서대로 참조합니다.\n"
          maxLength: 2048
          type: string
        watermark: 
          additionalProperties: true
          description: 워터마크 구성 객체입니다. 빈 객체도 허용됩니다.
          type: object
      required: 
        - model
        - text_prompt
      type: object
    BytePlusTTSCreateResponse: 
      description: BytePlus Seed Audio 1.0 생성 응답 본문입니다.
      properties: 
        audio: 
          description: "생성된 오디오 데이터, Base64 인코딩됨."
          type: string
        code: 
          description: 상태 코드입니다. 세부 정보는 공식 오류 코드 문서를 참조하십시오.
          type: integer
        duration: 
          description: 속도 또는 후처리 이후의 지속 시간(초)입니다.
          format: double
          type: number
        message: 
          description: 상태 세부 정보입니다.
          type: string
        original_duration: 
          description: 원본 모델 출력 지속 시간(초)입니다. 요금 청구에 사용되며 최대 120초로 제한됩니다.
          format: double
          type: number
        url: 
          description: "임시 오디오 URL, 2시간 동안 유효합니다."
          type: string
      type: object
    BytePlusTTSReference: 
      description: "단일 참조 리소스입니다. 오디오 참조의 경우 speaker, audio_data 또는 audio_url 중 정확히 하나를 제공하세요. 이미지 참조의 경우 image_data 또는 image_url 중 정확히 하나를 제공하세요.\n"
      properties: 
        audio_data: 
          description: Base64로 인코딩된 ReferenceTimbreAudio입니다.
          type: string
        audio_url: 
          description: 원격 ReferenceTimbreAudio 파일의 URL입니다.
          type: string
        image_data: 
          description: Base64로 인코딩된 참조 이미지입니다.
          type: string
        image_url: 
          description: 원격 참조 이미지의 URL입니다.
          type: string
        speaker: 
          description: 음성 ID입니다. 지원되는 Doubao TTS 음성 또는 음성 복제 음성 ID일 수 있습니다.
          type: string
      type: object
    BytePlusVideoGenerationContent: 
      properties: 
        audio_url: 
          description: 입력 오디오 객체입니다. Seedance 2.0 및 2.0 fast만 오디오 입력을 지원합니다. 단독으로 사용할 수 없으며 최소 1개의 이미지 또는 비디오가 포함되어야 합니다.
          properties: 
            url: 
              description: "오디오 URL, Base64 인코딩 또는 자산 ID입니다.\n오디오 URL: 오디오의 공개 URL (wav, mp3)입니다.\nBase64: 형식 data:audio/<format>;base64,<content>\n자산 ID: 형식 asset://<ASSET_ID>\n"
              type: string
          type: object
        image_url: 
          properties: 
            url: 
              description: "이미지 기반 비디오 생성용 이미지 콘텐츠입니다(유형이 \"image_url\"인 경우).\n이미지 URL: 이미지 URL에 접근 가능한지 확인하십시오.\nBase64 인코딩 콘텐츠: 형식은 data:image/<format>;base64,<content>여야 합니다.\n자산 ID: 형식 asset://<ASSET_ID>\n"
              type: string
          type: object
        role: 
          description: "콘텐츠 항목의 역할/위치입니다.\n이미지의 경우: first_frame, last_frame 또는 reference_image입니다.\n비디오의 경우: reference_video(Seedance 2.0 및 2.0 fast만 해당)입니다.\n오디오의 경우: reference_audio(Seedance 2.0 및 2.0 fast만 해당)입니다.\n"
          enum: 
            - first_frame
            - last_frame
            - reference_image
            - reference_video
            - reference_audio
          type: string
        text: 
          description: "모델에 대한 입력 텍스트 정보입니다. 텍스트 프롬프트와 선택적 파라미터가 포함됩니다.\n\n텍스트 프롬프트(필수): 중국어 및 영어 문자를 사용하여 생성할 비디오에 대한 설명입니다.\n\n파라미터(선택 사항): 텍스트 프롬프트 뒤에 --[파라미터]를 추가하여 비디오 사양을 제어합니다:\n- --resolution (--rs): 480p, 720p, 1080p (기본값: 720p)\n- --ratio (--rt): 21:9, 16:9, 4:3, 1:1, 3:4, 9:16, 9:21, adaptive (기본값: 16:9 또는 adaptive)\n- --duration (--dur): 3-12초 (기본값: 5)\n- --framepersecond (--fps): 24 (기본값: 24)\n- --watermark (--wm): 참/거짓 (기본값: 거짓)\n- --seed (--seed): -1에서 2^32-1 (기본값: -1)\n- --camerafixed (--cf): 참/거짓 (기본값: 거짓)\n\n예: \"아름다운 풍경 --ratio 16:9 --resolution 720p --duration 5\"\n"
          maxLength: 4096
          type: string
        type: 
          description: 입력 콘텐츠의 유형
          enum: 
            - text
            - image_url
            - video_url
            - audio_url
          type: string
        video_url: 
          description: 입력 비디오 객체입니다. Seedance 2.0 및 2.0 fast만 비디오 입력을 지원합니다.
          properties: 
            url: 
              description: "비디오 URL 또는 자산 ID입니다.\n비디오 URL: 비디오의 공개 URL (mp4, mov)입니다.\n자산 ID: 형식 asset://<ASSET_ID>\n"
              type: string
          type: object
      required: 
        - type
      type: object
    BytePlusVideoGenerationQueryResponse: 
      properties: 
        content: 
          description: "비디오 생성 작업이 완료된 후의 출력으로, 출력 비디오의 다운로드 URL을 포함합니다."
          properties: 
            video_url: 
              description: 출력 비디오의 URL입니다. 보안상의 이유로 출력 비디오는 24시간 후에 삭제됩니다.
