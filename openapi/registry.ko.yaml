  /proxy/tripo/v2/openapi/import: 
    post: 
      description: "Tripo 모델 가져오기(PN-328)를 위한 복합 엔드포인트입니다. 클라이언트는 먼저 모델 파일을 ComfyUI API 스토리지(POST /customers/storage)에 업로드한 다음 결과 다운로드 URL로 이 엔드포인트를 호출합니다. 백엔드는 서버 측에서 전체 Tripo 가져오기 흐름을 수행합니다: 스토리지에서 파일을 다운로드하고, Tripo로부터 단기 STS 업로드 자격 증명을 얻고, 파일을 Tripo의 객체 스토리지(SigV4)에 업로드하고, 업로드된 객체를 참조하는 import_model 작업을 생성합니다. Tripo의 create-task 응답을 반환하며, 완료를 위해 /proxy/tripo/v2/openapi/task/{task_id}를 폴링합니다. 결과 작업 ID는 Tripo 후처리 작업(texture_model, animate_rig, convert_model, ...)에 사용할 수 있습니다.\n\n이는 합성 comfy-api 경로입니다(Tripo에는 단일 호출에 해당하는 것이 없음). 이는 Tripo의 임시 스토리지 자격 증명이 백엔드를 절대 떠나지 않고 이 요청 내에서 모델 바이너리가 전송되지 않도록 하기 위해 존재합니다.\n\nurl 호스트는 ComfyUI API 스토리지(storage.googleapis.com)여야 합니다.\n지원되는 형식: glb, fbx, obj, stl. 최대 파일 크기: 150MB.\n"
      operationId: TripoImportModel
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                format: 
                  description: "파일 형식(\"glb\", \"fbx\", \"obj\", \"stl\"). 선택 사항; 생략 시 URL 경로 확장자에서 파생됩니다."
                  type: string
                url: 
                  description: 이전에 ComfyUI API 스토리지에 업로드된 모델 파일의 다운로드 URL입니다.
                  type: string
              required: 
                - url
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoSuccessTask"
          description: 가져오기 작업이 생성됨
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 잘못된 요청 파라미터
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 인증 실패
        "403": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 요청된 리소스에 대한 무단 액세스
        "413": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 파일이 150MB 제한을 초과했습니다
        "429": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 계정 예외 또는 속도 제한 초과
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 내부 서버 오류
        "502": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 업스트림 업로드 또는 작업 생성 실패
        "503": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 서비스를 일시적으로 사용할 수 없음
        "504": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: 서버 시간 초과
      summary: 외부 3D 모델을 Tripo로 가져오기
      tags: 
        - API Nodes
        - Released
      x-excluded: true
