        call_id: 
          description: Unique ID of the tool call generated by the model.
          type: string
        name: 
          type: string
        status: 
          type: string
        type: 
          enum: 
            - function_call
          type: string
      required: 
        - type
        - arguments
        - call_id
        - name
      type: object
    BytePlusResponseInputFunctionCallOutput: 
