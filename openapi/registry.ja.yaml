              type: integer
          type: object
      type: object
    BytePlusVideoGenerationRequest: 
      properties: 
        callback_url: 
          description: Callback notification address for the result of this generation task
          format: uri
          type: string
        content: 
          description: The input content for the model to generate a video
          items: 
            $ref: "#/components/schemas/BytePlusVideoGenerationContent"
          minItems: 1
          type: array
        duration: 
          description: "Video duration in seconds. Seedance 2.0 & 2.0 fast: [4,15] or -1 (auto). Seedance 1.5 pro: [4,12] or -1. Seedance 1.0: [2,12].\n"
          type: integer
        execution_expires_after: 
          description: "Task timeout threshold in seconds. Default 172800 (48h). Range: [3600, 259200].\n"
          type: integer
        generate_audio: 
          default: true
          description: "Supported by Seedance 2.0, 2.0 fast, and 1.5 pro. Whether the generated video includes audio synchronized with the visuals.\ntrue: The model outputs a video with synchronized audio.\nfalse: The model outputs a silent video.\n"
          type: boolean
        model: 
          description: "The ID of the model to call. Available models include seedance-1-5-pro-251215, seedance-1-0-pro-250528, seedance-1-0-pro-fast-251015, seedance-1-0-lite-t2v-250428, seedance-1-0-lite-i2v-250428"
          enum: 
            - seedance-1-5-pro-251215
            - seedance-1-0-pro-250528
            - seedance-1-0-lite-t2v-250428
            - seedance-1-0-lite-i2v-250428
            - seedance-1-0-pro-fast-251015
            - dreamina-seedance-2-0-260128
            - dreamina-seedance-2-0-fast-260128
            - dreamina-seedance-2-0-mini
          type: string
        ratio: 
          description: "Aspect ratio of the generated video. Seedance 2.0 & 2.0 fast, 1.5 pro default: adaptive.\n"
          enum: 
            - 16:9
            - 4:3
            - 1:1
            - 3:4
            - 9:16
            - 21:9
            - adaptive
          type: string
        resolution: 
          description: "Video resolution. Seedance 2.0 & 2.0 fast, 1.5 pro, 1.0 lite default: 720p. Seedance 1.0 pro & pro-fast default: 1080p.\nNote: Seedance 2.0 & 2.0 fast do not support 1080p.\n"
          enum: 
            - 480p
            - 720p
            - 1080p
            - 4k
          type: string
        return_last_frame: 
          default: false
          description: "Whether to return the last frame image of the generated video.\ntrue: Returns the last frame image of the generated video. After setting this parameter to true, you can obtain the last frame image by calling the Querying the information about a video generation task. The last frame image is in PNG format, with its pixel width and height consistent with those of the generated video, and it contains no watermarks. Using this parameter allows the generation of multiple consecutive videos: the last frame of the previously generated video is used as the first frame of the next video task, enabling quick generation of multiple consecutive videos.\nfalse: Does not return the last frame image of the generated video.\n"
          type: boolean
        seed: 
          description: "Seed integer for controlling randomness. Range: [-1, 2^32-1]. -1 uses a random seed.\n"
          type: integer
        service_tier: 
          description: "Service tier for processing. Seedance 2.0 & 2.0 fast do not support flex (offline inference).\n"
          enum: 
            - default
            - flex
          type: string
        watermark: 
          default: false
          description: Whether the generated video includes a watermark.
          type: boolean
      required: 
        - model
        - content
      type: object
