          description: "A textual prompt to guide the model generation. For Image-to-3D generation: optional (if not provided, an AI-generated prompt based on the provided images will be used). For Text-to-3D generation: required.\n"
          type: string
        quality: 
          $ref: "#/components/schemas/RodinQualityType"
        quality_override: 
          description: "Optional. Customize poly count for generation, providing more accurate control over mesh face count. When mesh_mode = Raw: range from 500 to 1,000,000 (default 500,000). When mesh_mode = Quad: range from 1,000 to 200,000 (default 18,000). When this parameter is invoked, the `quality` parameter will not take effect.\n"
          type: integer
        seed: 
          description: "Optional. A seed value for randomization in the mesh generation, ranging from 0 to 65535 (both inclusive). If not provided, the seed will be randomly generated.\n"
          type: integer
        texture_delight: 
          description: "Optional. Default is false. If true, this parameter applies images preprocessing to remove lighting information from textures.\n"
          type: boolean
        texture_mode: 
          $ref: "#/components/schemas/RodinTextureModeType"
        tier: 
          $ref: "#/components/schemas/RodinTierType"
        use_original_alpha: 
          description: "Default is false. If true, the original transparency channel of the images will be used when processing the image.\n"
          type: boolean
      type: object
