                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Get release notes
      tags: 
        - Releases
    post: 
      description: Webhook endpoint to process Github release events and generate release notes
      operationId: ProcessReleaseWebhook
      parameters: 
        - description: The name of the event that triggered the delivery
          in: header
          name: X-GitHub-Event
          required: true
          schema: 
            enum: 
              - release
            type: string
        - description: A globally unique identifier (GUID) to identify the event
          in: header
          name: X-GitHub-Delivery
          required: true
          schema: 
            format: uuid
            type: string
        - description: The unique identifier of the webhook
          in: header
          name: X-GitHub-Hook-ID
          required: true
          schema: 
            type: string
        - description: HMAC hex digest of the request body using SHA-256 hash function
          in: header
          name: X-Hub-Signature-256
          schema: 
            type: string
        - description: The type of resource where the webhook was created
          in: header
          name: X-GitHub-Hook-Installation-Target-Type
          schema: 
            type: string
        - description: The unique identifier of the resource where the webhook was created
          in: header
          name: X-GitHub-Hook-Installation-Target-ID
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              $ref: "#/components/schemas/GithubReleaseWebhook"
        required: true
      responses: 
        "200": 
          description: Webhook processed successfully
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "422": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation failed or endpoint has been spammed
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Process Github release webhook
      tags: 
        - Releases
      x-excluded: true
