            type: object
          type: array
        encrypted_content: 
          description: "Encrypted+compressed original reasoning content. Returned only when `reasoning.encrypted_content` is in the request's `include` list. Supported from seed-2-0-pro-260328.\n"
          type: string
        id: 
          type: string
        status: 
          enum: 
            - in_progress
            - completed
            - incomplete
          type: string
        summary: 
          items: 
            additionalProperties: true
            properties: 
              text: 
                type: string
              type: 
                default: summary_text
                enum: 
                  - summary_text
                type: string
            required: 
              - type
            type: object
          type: array
        type: 
          enum: 
            - reasoning
          type: string
      required: 
        - type
