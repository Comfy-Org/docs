      title: StopServerToolsWhen
      type: array
    OpenRouterStopServerToolsWhenCondition: 
      description: "A single condition that, when met, halts the server-tool agent loop."
      oneOf: 
        - description: "Stop when the upstream model emits this finish reason (e.g. `length`)."
          properties: 
            reason: 
              type: string
            type: 
              $ref: "#/components/schemas/OpenRouterStopServerToolsWhenFinishReasonIsType"
          required: 
            - type
            - reason
          type: object
        - description: Stop after a tool with this name has been called.
          properties: 
            tool_name: 
              type: string
            type: 
              $ref: "#/components/schemas/OpenRouterStopServerToolsWhenHasToolCallType"
          required: 
            - type
            - tool_name
          type: object
        - description: Stop once cumulative cost across the loop exceeds this dollar threshold.
          properties: 
            max_cost_in_dollars: 
              format: double
              type: number
            type: 
              $ref: "#/components/schemas/OpenRouterStopServerToolsWhenMaxCostType"
          required: 
            - type
            - max_cost_in_dollars
          type: object
        - description: Stop once cumulative token usage across the loop exceeds this threshold.
          properties: 
            max_tokens: 
              type: integer
            type: 
              $ref: "#/components/schemas/OpenRouterStopServerToolsWhenMaxTokensUsedType"
          required: 
            - type
            - max_tokens
          type: object
        - description: Stop after the agent loop has executed this many steps.
          properties: 
            step_count: 
              type: integer
            type: 
              $ref: "#/components/schemas/OpenRouterStopServerToolsWhenStepCountIsType"
          required: 
            - type
            - step_count
          type: object
      title: StopServerToolsWhenCondition
    OpenRouterStopServerToolsWhenFinishReasonIsType: 
      enum: 
        - finish_reason_is
      title: StopServerToolsWhenFinishReasonIsType
      type: string
    OpenRouterStopServerToolsWhenHasToolCallType: 
