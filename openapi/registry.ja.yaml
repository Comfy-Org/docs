          title: Prompt
          type: string
        prompt_upsampling: 
          anyOf: 
            - type: boolean
          default: false
          description: プロンプトに対してアップサンプリングを実行するかどうか
          title: Prompt Upsampling
        safety_tolerance: 
          default: 2
          description: 入力および出力モデレーションの許容値。0から6の間で、0が最も厳しく、6が最も緩い。
          maximum: 6
          minimum: 0
          title: Safety Tolerance
          type: integer
        seed: 
          anyOf: 
            - type: integer
          description: 再現性のためのオプションのシード
          example: 42
          title: Seed
        steps: 
          anyOf: 
            - maximum: 50
              minimum: 15
              type: integer
          default: 50
          description: 画像生成プロセスのステップ数
          title: Steps
        webhook_secret: 
          anyOf: 
            - type: string
          description: Webhook署名検証のためのオプションのシークレット
          title: Webhook Secret
        webhook_url: 
          anyOf: 
            - format: uri
              maxLength: 2083
              minLength: 1
              type: string
          description: Webhook通知を受信するURL
          title: Webhook Url
      required: 
        - prompt
      title: CannyInputs
      type: object
