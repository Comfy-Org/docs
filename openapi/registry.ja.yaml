        responseId: 
          description: Unique identifier for the response.
          type: string
        usageMetadata: 
          $ref: "#/components/schemas/GeminiUsageMetadata"
      type: object
    GeminiGenerationConfig: 
      properties: 
        imageConfig: 
          description: Configuration for image generation
          properties: 
            aspectRatio: 
              description: Aspect ratio for generated images
              type: string
            imageOutputOptions: 
              description: Optional. The image output format for generated images.
              properties: 
                compressionQuality: 
                  description: Optional. The compression quality of the output image.
                  type: integer
                mimeType: 
                  description: Optional. The image format that the output should be saved as.
                  type: string
              type: object
            imageSize: 
              description: "Optional. Specifies the size of generated images. Supported values are 1K, 2K, 4K. If not specified, the model will use default value 1K."
              type: string
          type: object
        maxOutputTokens: 
          description: "Maximum number of tokens that can be generated in the response. A token is approximately 4 characters. 100 tokens correspond to roughly 60-80 words.\n"
          example: 2048
          maximum: 8192
          minimum: 16
          type: integer
        responseModalities: 
          items: 
            enum: 
              - TEXT
              - IMAGE
            type: string
          type: array
        seed: 
          description: "When seed is fixed to a specific value, the model makes a best effort to provide the same response for repeated requests. Deterministic output isn't guaranteed. Also, changing the model or parameter settings, such as the temperature, can cause variations in the response even when you use the same seed value. By default, a random seed value is used. Available for the following models:, gemini-2.5-flash, gemini-2.5-pro, gemini-2.5-flash-preview-04-1, gemini-2.5-pro-preview-05-0, gemini-2.0-flash-lite-00, gemini-2.0-flash-001\n"
          example: 343940597
          type: integer
        stopSequences: 
          items: 
            type: string
          type: array
        temperature: 
          default: 1
          description: "The temperature is used for sampling during response generation, which occurs when topP and topK are applied. Temperature controls the degree of randomness in token selection. Lower temperatures are good for prompts that require a less open-ended or creative response, while higher temperatures can lead to more diverse or creative results. A temperature of 0 means that the highest probability tokens are always selected. In this case, responses for a given prompt are mostly deterministic, but a small amount of variation is still possible. If the model returns a response that's too generic, too short, or the model gives a fallback response, try increasing the temperature\n"
          format: float
          maximum: 2
          minimum: 0
          type: number
        thinkingConfig: 
          description: Optional. Configuration for thinking features. Thinking is a process where the model breaks down a complex task into smaller steps to generate a higher-quality response.
          properties: 
            includeThoughts: 
              description: "Optional. If true, the model will include its thoughts in the response."
              type: boolean
            thinkingBudget: 
              description: "Optional. The token budget for the model's thinking process. The model will make a best effort to stay within this budget."
              type: integer
            thinkingLevel: 
              description: Optional. The thinking level for the model.
              enum: 
                - THINKING_LEVEL_UNSPECIFIED
                - LOW
                - MEDIUM
                - HIGH
                - MINIMAL
              type: string
          type: object
        topK: 
          default: 40
          description: "Top-K changes how the model selects tokens for output. A top-K of 1 means the next selected token is the most probable among all tokens in the model's vocabulary. A top-K of 3 means that the next token is selected from among the 3 most probable tokens by using temperature.\n"
          example: 40
          minimum: 1
          type: integer
        topP: 
          default: 0.95
          description: "If specified, nucleus sampling is used.\nTop-P changes how the model selects tokens for output. Tokens are selected from the most (see top-K) to least probable until the sum of their probabilities equals the top-P value. For example, if tokens A, B, and C have a probability of 0.3, 0.2, and 0.1 and the top-P value is 0.5, then the model will select either A or B as the next token by using temperature and excludes C as a candidate.\nSpecify a lower value for less random responses and a higher value for more random responses.\n"
          format: float
          maximum: 1
          minimum: 0
          type: number
      type: object
    GeminiInlineData: 
      description: "Inline data in raw bytes. For gemini-2.0-flash-lite and gemini-2.0-flash, you can specify up to 3000 images by using inlineData.\n"
      properties: 
        data: 
          description: "The base64 encoding of the image, PDF, or video to include inline in the prompt. When including media inline, you must also specify the media type (mimeType) of the data. Size limit: 20MB\n"
          format: byte
          type: string
        mimeType: 
          $ref: "#/components/schemas/GeminiMimeType"
