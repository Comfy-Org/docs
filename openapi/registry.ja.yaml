    BytePlusVideoGenerationContent: 
      properties: 
        audio_url: 
          description: Input audio object. Only Seedance 2.0 & 2.0 fast support audio input. Cannot be used alone - must include at least 1 image or video.
          properties: 
            url: 
              description: "Audio URL, Base64 encoding, or Asset ID.\nAudio URL: Public URL of the audio (wav, mp3).\nBase64: Format data:audio/<format>;base64,<content>\nAsset ID: Format asset://<ASSET_ID>\n"
              type: string
          type: object
        image_url: 
          properties: 
            url: 
              description: "Image content for image-to-video generation (when type is \"image_url\")\nImage URL: Make sure that the image URL is accessible.\nBase64-encoded content: Format must be data:image/<format>;base64,<content>\nAsset ID: Format asset://<ASSET_ID>\n"
              type: string
          type: object
        role: 
          description: "The role/position of the content item.\nFor images: first_frame, last_frame, or reference_image.\nFor videos: reference_video (Seedance 2.0 & 2.0 fast only).\nFor audio: reference_audio (Seedance 2.0 & 2.0 fast only).\n"
          enum: 
            - first_frame
            - last_frame
            - reference_image
            - reference_video
            - reference_audio
          type: string
        text: 
          description: "The input text information for the model. Includes text prompt and optional parameters.\n\nText prompt (required): Description of the video to be generated using Chinese and English characters.\n\nParameters (optional): Add --[parameters] after the text prompt to control video specifications:\n- --resolution (--rs): 480p, 720p, 1080p (default: 720p)\n- --ratio (--rt): 21:9, 16:9, 4:3, 1:1, 3:4, 9:16, 9:21, adaptive (default: 16:9 or adaptive)\n- --duration (--dur): 3-12 seconds (default: 5)\n- --framepersecond (--fps): 24 (default: 24)\n- --watermark (--wm): true/false (default: false)\n- --seed (--seed): -1 to 2^32-1 (default: -1)\n- --camerafixed (--cf): true/false (default: false)\n\nExample: \"A beautiful landscape --ratio 16:9 --resolution 720p --duration 5\"\n"
          maxLength: 4096
          type: string
        type: 
          description: The type of the input content
          enum: 
            - text
            - image_url
            - video_url
            - audio_url
          type: string
        video_url: 
          description: Input video object. Only Seedance 2.0 & 2.0 fast support video input.
          properties: 
            url: 
              description: "Video URL or Asset ID.\nVideo URL: Public URL of the video (mp4, mov).\nAsset ID: Format asset://<ASSET_ID>\n"
              type: string
          type: object
      required: 
        - type
      type: object
    BytePlusVideoGenerationQueryResponse: 
      properties: 
        content: 
          description: "The output after the video generation task is completed, which contains the download URL of the output video."
          properties: 
            video_url: 
              description: "The URL of the output video. For security purposes, the output video is cleared after 24 hours."
              type: string
          type: object
        created_at: 
          description: The time when the task was created. The value is a UNIX timestamp in seconds.
          type: integer
        error: 
          description: "The error information. If the task succeeds, null is returned. If the task fails, the error information is returned."
