          description: 使用されたオペレーティングシステム
          type: string
        peak_vram: 
          description: ジョブによって使用されたピークVRAM
          type: integer
        pr_number: 
          description: プルリクエスト番号
          type: string
        python_version: 
          description: 使用されたPyTorchバージョン
          type: string
        pytorch_version: 
          description: 使用されたPyTorchバージョン
          type: string
        start_time: 
          description: ジョブの開始時間（Unixタイムスタンプ）。
          format: int64
          type: integer
