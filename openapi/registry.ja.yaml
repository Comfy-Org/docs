    GeminiMimeType: 
      description: "The media type of the file specified in the data or fileUri fields. Acceptable values include the following. For gemini-2.0-flash-lite and gemini-2.0-flash, the maximum length of an audio file is 8.4 hours and the maximum length of a video file (without audio) is one hour. For more information, see Gemini audio and video requirements. Text files must be UTF-8 encoded. The contents of the text file count toward the token limit. There is no limit on image resolution."
      enum: 
        - application/pdf
        - audio/mpeg
        - audio/mp3
        - audio/wav
        - image/png
        - image/jpeg
        - image/webp
        - text/plain
        - video/mov
        - video/mpeg
        - video/mp4
        - video/mpg
        - video/avi
        - video/wmv
        - video/mpegps
        - video/flv
      type: string
    GeminiOffset: 
      description: "Represents a duration offset for video timeline positions.\n"
      properties: 
        nanos: 
          description: "Signed fractions of a second at nanosecond resolution. Negative second values with fractions must still have non-negative nanos values.\n"
          example: 0
          maximum: 999999999
          minimum: 0
          type: integer
        seconds: 
          description: "Signed seconds of the span of time. Must be from -315,576,000,000 to +315,576,000,000 inclusive.\n"
          example: 60
          maximum: 315576000000
          minimum: -315576000000
          type: integer
      type: object
