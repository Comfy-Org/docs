    ElevenLabsSTTRequest: 
      description: Request body for ElevenLabs Speech-to-Text
      properties: 
        additional_formats: 
          description: A list of additional formats to export the transcript to.
          items: 
            $ref: "#/components/schemas/ElevenLabsSTTExportOptions"
          nullable: true
          type: array
        cloud_storage_url: 
          description: "The HTTPS URL of the file to transcribe. Exactly one of file or cloud_storage_url parameters must be provided.\nThe file must be accessible via HTTPS and the file size must be less than 2GB.\n"
          nullable: true
          type: string
        diarization_threshold: 
          description: "Diarization threshold to apply during speaker diarization.\nA higher value means there will be a lower chance of one speaker being diarized as two different speakers.\nCan only be set when diarize=True and num_speakers=None. Defaults to None.\n"
          format: double
          nullable: true
          type: number
        diarize: 
          default: false
          description: Whether to annotate which speaker is currently talking in the uploaded file.
          type: boolean
        entity_detection: 
          description: "Detect entities in the transcript. Can be 'all' to detect all entities,\na single entity type or category string, or a list of entity types/categories.\nCategories include 'pii', 'phi', 'pci', 'other', 'offensive_language'.\nWhen enabled, detected entities will be returned in the 'entities' field\nwith their text, type, and character positions. Usage of this parameter will incur additional costs.\n"
          nullable: true
          oneOf: 
            - type: string
            - items: 
                type: string
              type: array
        file: 
          description: "The file to transcribe. All major audio and video formats are supported.\nExactly one of file or cloud_storage_url parameters must be provided.\nThe file size must be less than 3.0GB.\n"
          format: binary
          type: string
        file_format: 
          default: other
          description: "The format of input audio. Options are 'pcm_s16le_16' or 'other'.\nFor pcm_s16le_16, the input audio must be 16-bit PCM at a 16kHz sample rate, single channel (mono).\n"
          enum: 
            - pcm_s16le_16
            - other
          type: string
        keyterms: 
          description: "A list of keyterms to bias the transcription towards.\nThe number of keyterms cannot exceed 100 and each keyterm must be less than 50 characters.\n"
          items: 
            type: string
          nullable: true
          type: array
        language_code: 
          description: "An ISO-639-1 or ISO-639-3 language_code corresponding to the language of the audio file.\nCan sometimes improve transcription performance if known beforehand.\nDefaults to null, in this case the language is predicted automatically.\n"
          nullable: true
          type: string
        model_id: 
          description: The ID of the model to use for transcription.
          enum: 
            - scribe_v1
            - scribe_v2
          type: string
        num_speakers: 
          description: "The maximum amount of speakers talking in the uploaded file.\nCan help with predicting who speaks when. The maximum amount of speakers that can be predicted is 32.\nDefaults to null, in this case the amount of speakers is set to the maximum value the model supports.\n"
          nullable: true
          type: integer
        seed: 
          description: "If specified, our system will make a best effort to sample deterministically.\nMust be an integer between 0 and 2147483647.\n"
          maximum: 2147483647
          minimum: 0
          nullable: true
          type: integer
        tag_audio_events: 
          default: true
          description: "Whether to tag audio events like (laughter), (footsteps), etc. in the transcription."
          type: boolean
        temperature: 
          description: "Controls the randomness of the transcription output. Accepts values between 0.0 and 2.0.\nHigher values result in more diverse and less deterministic results.\n"
          format: double
          nullable: true
          type: number
        timestamps_granularity: 
          default: word
          description: "The granularity of the timestamps in the transcription.\n'word' provides word-level timestamps and 'character' provides character-level timestamps per word.\n"
          enum: 
            - none
            - word
            - character
          type: string
        use_multi_channel: 
          default: false
          description: "Whether the audio file contains multiple channels where each channel contains a single speaker.\nWhen enabled, each channel will be transcribed independently and the results will be combined.\nA maximum of 5 channels is supported.\n"
          type: boolean
        webhook: 
          default: false
          description: "Whether to send the transcription result to configured speech-to-text webhooks.\nIf set the request will return early without the transcription, which will be delivered later via webhook.\n"
          type: boolean
        webhook_id: 
          description: "Optional specific webhook ID to send the transcription result to.\nOnly valid when webhook is set to true.\n"
          nullable: true
          type: string
        webhook_metadata: 
          description: "Optional metadata to be included in the webhook response.\nThis should be a JSON string representing an object with a maximum depth of 2 levels and maximum size of 16KB.\n"
          nullable: true
          type: string
      required: 
        - model_id
      type: object
