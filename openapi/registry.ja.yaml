          description: ワークフロー名
          type: string
      type: object
    AnthropicCacheCreationUsage: 
      description: Anthropic Messages API呼び出しにおける、TTLごとのキャッシュ書き込み入力トークンの内訳。
      properties: 
        ephemeral_1h_input_tokens: 
          type: integer
        ephemeral_5m_input_tokens: 
          type: integer
      type: object
    AnthropicCreateMessageRequest: 
      additionalProperties: true
      description: "Anthropic Messages API (`/v1/messages`) のリクエストボディ。プロキシが読み取るフィールド（モデル、プロンプト抽出、ストリーミング、課金）のみ厳密な型指定でアップストリームスキーマを反映します。その他のトップレベルフィールド（`tools`、`temperature`、`top_p`、`thinking`、`metadata` など）は `additionalProperties` によって変更されずに通過します。"
      properties: 
        max_tokens: 
          description: 停止する前に生成する最大トークン数。
          type: integer
        messages: 
          description: 会話のターン。完全なコンテンツブロック分類についてはAnthropic Messages APIのドキュメントを参照してください。
          items: 
            $ref: "#/components/schemas/AnthropicMessageParam"
          type: array
        model: 
          description: "Anthropicモデル識別子（例：`claude-sonnet-4-5`、`claude-opus-4-7`）。"
          type: string
        stream: 
          description: "trueの場合、レスポンスは単一のJSONボディではなく、Anthropicメッセージイベントの `text/event-stream` になります。"
          type: boolean
        system: 
          description: トップレベルのシステムプロンプト。Anthropicはパススルー経由で配列形式も受け付けます。
          type: string
      required: 
        - model
        - max_tokens
        - messages
      type: object
    AnthropicCreateMessageResponse: 
      additionalProperties: true
      description: "非ストリーミングのMessages APIレスポンスのJSON形状。ほとんどのフィールドは通過します。プロキシは課金のために `usage` を読み取ります。"
      properties: 
        id: 
          type: string
        model: 
          type: string
        role: 
          type: string
        stop_reason: 
          nullable: true
          type: string
        stop_sequence: 
          nullable: true
          type: string
        type: 
          type: string
        usage: 
          $ref: "#/components/schemas/AnthropicMessagesUsage"
      type: object
    AnthropicMessageParam: 
      additionalProperties: true
      description: "単一の会話ターン。プロキシはプロンプトキャプチャのために `role` と `content`（文字列またはコンテンツブロックの配列）のみ読み取り、その他のフィールドは通過します。"
      properties: 
        content: 
          description: 文字列の短縮形、またはコンテンツブロック（テキスト、画像、ドキュメント、tool_use、tool_result ...）の配列。
          x-go-type: "interface{}"
        role: 
          enum: 
            - user
            - assistant
          type: string
      required: 
        - role
        - content
      type: object
    AnthropicMessagesUsage: 
      description: Anthropic Messages API呼び出しのトークン使用量。
      properties: 
        cache_creation: 
          $ref: "#/components/schemas/AnthropicCacheCreationUsage"
        cache_creation_input_tokens: 
          type: integer
        cache_read_input_tokens: 
          type: integer
        input_tokens: 
          type: integer
        output_tokens: 
          type: integer
      type: object
