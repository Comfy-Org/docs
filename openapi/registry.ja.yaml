            - Normal
            - LowPoly
            - Geometry
            - Sketch
          type: string
        ImageBase64: 
          description: "Base64 encoded image for image-to-3D generation.\nResolution: min 128px, max 5000px per side.\nMax size: 8MB (recommend 6MB before encoding).\nSupported formats: jpg, png, jpeg, webp.\nEither ImageBase64/ImageUrl or Prompt is required.\n"
          type: string
        ImageUrl: 
          description: "URL of input image for image-to-3D generation.\nResolution: min 128px, max 5000px per side.\nMax size: 8MB.\nSupported formats: jpg, png, jpeg, webp.\nEither ImageBase64/ImageUrl or Prompt is required.\n"
          format: uri
          type: string
        Model: 
          default: "3.0"
          description: "Tencent HY 3D Global model version.\nDefaults to 3.0, with optional choices: 3.0, 3.1.\nWhen selecting version 3.1, the LowPoly parameter is unavailable.\n"
          enum: 
            - "3.0"
            - "3.1"
          example: "3.0"
          type: string
        MultiViewImages: 
          description: "Multi-perspective model images for 3D generation.\nEach perspective is limited to one image.\nImage size limit: max 8MB after encoding.\nImage resolution: min 128px, max 5000px per side.\nSupported formats: JPG, PNG.\n"
          items: 
            $ref: "#/components/schemas/TencentViewImage"
          type: array
        PolygonType: 
          default: triangle
          description: "Polygon type (only effective when GenerateType is LowPoly).\n- triangle: triangular faces (default)\n- quadrilateral: mix of quadrangle and triangle faces\n"
          enum: 
            - triangle
            - quadrilateral
          type: string
        Prompt: 
          description: "Text description for 3D content generation.\nSupports up to 1024 utf-8 characters.\nEither Prompt or ImageBase64/ImageUrl is required, but not both.\n"
          example: A cat
          maxLength: 1024
          type: string
      type: object
    TencentHunyuan3DProResponse: 
      description: Response from Tencent Hunyuan 3D Pro submit endpoint
      properties: 
        Response: 
          properties: 
            Error: 
              description: Error object (present when request fails)
              properties: 
                Code: 
                  description: Error code
                  type: string
                Message: 
                  description: Error message
                  type: string
              type: object
            JobId: 
              description: Task ID (valid for 24 hours)
              example: "1375367755519696896"
              type: string
            RequestId: 
              description: Unique request ID for troubleshooting
              example: 13f47dd0-1af9-4383-b401-dae18d6e99fc
              type: string
          type: object
      type: object
    TencentHunyuan3DQueryRequest: 
      properties: 
        JobId: 
          description: The JobId returned from the submit endpoint
          example: "1375367755519696896"
          type: string
      required: 
        - JobId
      type: object
    TencentHunyuan3DQueryResponse: 
      description: Response from Tencent Hunyuan 3D query endpoint
      properties: 
        Response: 
          properties: 
            ErrorCode: 
              description: Error code (empty string if no error)
              type: string
            ErrorMessage: 
              description: Error message if task failed (empty string if no error)
              type: string
            RequestId: 
              description: Unique request ID for troubleshooting
              type: string
            ResultFile3Ds: 
              description: Array of generated 3D files
              items: 
                $ref: "#/components/schemas/TencentFile3D"
              type: array
            Status: 
              description: "Task status:\n- WAIT: waiting\n- RUN: running\n- FAIL: failed\n- DONE: successful\n"
              enum: 
                - WAIT
                - RUN
                - FAIL
                - DONE
              type: string
          type: object
      type: object
    TencentHunyuan3DSmartTopologyRequest: 
      description: Request body for Tencent Hunyuan 3D Smart Topology (retopology/polygon reduction)
      properties: 
        FaceLevel: 
          description: Polygon reduction level.
          enum: 
            - high
            - medium
            - low
          example: medium
          type: string
        File3D: 
          $ref: "#/components/schemas/TencentInputFile3D"
        PolygonType: 
          description: Polygon type for the output mesh. Defaults to triangle.
          enum: 
            - triangle
            - quadrilateral
          example: triangle
          type: string
      required: 
        - File3D
      type: object
    TencentHunyuan3DTextureEditRequest: 
      description: Request body for Tencent Hunyuan 3D texture edit
      properties: 
        EnablePBR: 
          description: Whether to enable the PBR texture parameter; only supported when using Prompt.
          example: true
          type: boolean
        File3D: 
          $ref: "#/components/schemas/TencentInputFile3D"
        Image: 
          $ref: "#/components/schemas/TencentImageInfo"
        Prompt: 
          description: Describes texture editing. Either Image or Prompt is required; they cannot coexist.
          example: a kitten
          maxLength: 1024
          type: string
      required: 
        - File3D
      type: object
    TencentHunyuan3DUVRequest: 
      description: Request body for Tencent Hunyuan 3D UV unfolding
      properties: 
        File: 
          $ref: "#/components/schemas/TencentInputFile3D"
      type: object
    TencentHunyuan3DUVResponse: 
      description: Response from Tencent Hunyuan 3D UV submit endpoint
      properties: 
        Response: 
          properties: 
            Error: 
              description: Error object (present when request fails)
              properties: 
                Code: 
                  description: Error code
                  type: string
                Message: 
                  description: Error message
                  type: string
              type: object
            JobId: 
              description: Task ID for the UV unwrapping job
              example: "1384898587778465792"
              type: string
            RequestId: 
              description: Unique request ID for troubleshooting
              example: 5265eb4a-0f4f-4cb1-9b3d-d9f1fb9347d2
              type: string
          type: object
      type: object
    TencentImageInfo: 
      description: Reference image - Base64 data or image URL
      properties: 
        ImageBase64: 
          description: "Base64 encoded image. Resolution 128-4096 per side, converted Base64 less than 10MB. Formats jpg, jpeg, png."
          type: string
        ImageUrl: 
          description: "Image URL. If both Base64 and Url provided, Url prevails."
          format: uri
          type: string
      type: object
    TencentInputFile3D: 
      description: 3D file input for UV unwrapping
      properties: 
        Type: 
          description: 3D file format type
          enum: 
            - FBX
            - OBJ
            - GLB
          example: GLB
          type: string
        Url: 
          description: URL of the 3D file that needs UV unwrapping
          example: https://example.com/model.glb
          format: uri
          type: string
      required: 
        - Type
        - Url
      type: object
    TencentViewImage: 
      description: A view image for multi-perspective 3D generation
      properties: 
        ViewImageBase64: 
          description: "Base64 encoded image for this view.\nResolution: min 128px, max 5000px per side.\nMax size: 8MB.\nSupported formats: JPG, PNG.\n"
          type: string
        ViewImageUrl: 
          description: "URL of the image for this view.\nResolution: min 128px, max 5000px per side.\nMax size: 8MB.\nSupported formats: JPG, PNG.\n"
          format: uri
          type: string
        ViewType: 
          description: "The viewing angle type for this image.\n- left: Left view\n- right: Right view\n- back: Rear view\n- top: Top view (only supported in Model 3.1)\n- bottom: Bottom view (only supported in Model 3.1)\n- left_front: Left front 45 degree view (only supported in Model 3.1)\n- right_front: Right front 45 degree view (only supported in Model 3.1)\n"
          enum: 
            - left
            - right
            - back
            - top
            - bottom
            - left_front
            - right_front
          type: string
      type: object
    TextResponseFormatConfiguration: 
      description: "An object specifying the format that the model must output.\n\nConfiguring `{ \"type\": \"json_schema\" }` enables Structured Outputs,\nwhich ensures the model will match your supplied JSON schema. Learn more in the\n[Structured Outputs guide](/docs/guides/structured-outputs).\n\nThe default format is `{ \"type\": \"text\" }` with no additional options.\n\n**Not recommended for gpt-4o and newer models:**\n\nSetting to `{ \"type\": \"json_object\" }` enables the older JSON mode, which\nensures the message the model generates is valid JSON. Using `json_schema`\nis preferred for models that support it.\n"
      oneOf: 
        - $ref: "#/components/schemas/ResponseFormatText"
        - $ref: "#/components/schemas/TextResponseFormatJsonSchema"
        - $ref: "#/components/schemas/ResponseFormatJsonObject"
    TextResponseFormatJsonSchema: 
      description: "JSON Schema response format. Used to generate structured JSON responses.\nLearn more about [Structured Outputs](/docs/guides/structured-outputs).\n"
      properties: 
        description: 
          description: "A description of what the response format is for, used by the model to\ndetermine how to respond in the format.\n"
          type: string
        name: 
          description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain\nunderscores and dashes, with a maximum length of 64.\n"
          type: string
        schema: 
          $ref: "#/components/schemas/ResponseFormatJsonSchemaSchema"
        strict: 
          default: false
          description: "Whether to enable strict schema adherence when generating the output.\nIf set to true, the model will always follow the exact schema defined\nin the `schema` field. Only a subset of JSON Schema is supported when\n`strict` is `true`. To learn more, read the [Structured Outputs\nguide](/docs/guides/structured-outputs).\n"
          type: boolean
        type: 
          description: "The type of response format being defined. Always `json_schema`."
          enum: 
            - json_schema
          type: string
          x-stainless-const: true
      required: 
        - type
        - schema
        - name
      title: JSON schema
      type: object
    Tool: 
      discriminator: 
        propertyName: type
      oneOf: 
        - $ref: "#/components/schemas/FileSearchTool"
        - $ref: "#/components/schemas/FunctionTool"
        - $ref: "#/components/schemas/WebSearchPreviewTool"
        - $ref: "#/components/schemas/ComputerUsePreviewTool"
    ToolChoiceFunction: 
      description: "Use this option to force the model to call a specific function.\n"
      properties: 
        name: 
          description: The name of the function to call.
          type: string
        type: 
          description: "For function calling, the type is always `function`."
          enum: 
            - function
          type: string
          x-stainless-const: true
      required: 
        - type
        - name
      title: Function tool
      type: object
    ToolChoiceOptions: 
      description: "Controls which (if any) tool is called by the model.\n\n`none` means the model will not call any tool and instead generates a message.\n\n`auto` means the model can pick between generating a message or calling one or\nmore tools.\n\n`required` means the model must call one or more tools.\n"
      enum: 
        - none
        - auto
        - required
      title: Tool choice mode
      type: string
    ToolChoiceTypes: 
      description: "Indicates that the model should use a built-in tool to generate a response.\n[Learn more about built-in tools](/docs/guides/tools).\n"
      properties: 
        type: 
          description: "The type of hosted tool the model should to use. Learn more about\n[built-in tools](/docs/guides/tools).\n\nAllowed values are:\n- `file_search`\n- `web_search_preview`\n- `computer_use_preview`\n"
          enum: 
            - file_search
            - web_search_preview
            - computer_use_preview
            - web_search_preview_2025_03_11
          type: string
      required: 
        - type
      title: Hosted tool
      type: object
    TopazCombinedCreateRequest: 
      oneOf: 
        - $ref: "#/components/schemas/TopazCreateRequestVideoSchema"
        - $ref: "#/components/schemas/TopazCreateRequestImageSequenceSchema"
    TopazCreateRequestImageSequenceSchema: 
      properties: 
        destination: 
          properties: 
            external: 
              $ref: "#/components/schemas/TopazExternalStorage"
          type: object
        filters: 
          $ref: "#/components/schemas/TopazInputFilters"
        output: 
          $ref: "#/components/schemas/TopazOutputInformationImageSequence"
        source: 
          description: Source details for the video
          properties: 
            container: 
              description: The container format of the image files
              enum: 
                - DPX
                - EXR
                - JPEG
                - PNG
                - TIFF
              example: TIFF
              type: string
            endNumber: 
              description: Optional ending frame number for image sequences
              example: 120
              type: integer
            external: 
              $ref: "#/components/schemas/TopazExternalStorage"
            frameCount: 
              description: "Total number of frames in the video, in this case, equal to the number of image files."
              example: 18000
              type: number
            frameRate: 
              description: Frame rate of the video
              example: 30
              type: number
            resolution: 
              description: Resolution details of the image
              properties: 
                height: 
                  description: Height of the image in pixels
                  example: 1080
                  type: integer
                width: 
                  description: Width of the image in pixels
                  example: 1920
                  type: integer
              required: 
                - width
                - height
              type: object
            startNumber: 
              description: Optional starting frame number for image sequences
              example: 120
              type: integer
          required: 
            - container
            - frameCount
            - frameRate
            - resolution
            - external
          type: object
      required: 
        - source
        - filters
        - output
        - destination
      title: Image Sequence
      type: object
    TopazCreateRequestVideoSchema: 
      properties: 
        destination: 
          properties: 
            external: 
              $ref: "#/components/schemas/TopazExternalStorage"
          type: object
        filters: 
