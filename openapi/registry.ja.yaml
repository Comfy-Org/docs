  "/proxy/bria/v2/status/{request_id}": 
    get: 
      description: "Retrieves the current status of an asynchronous Bria request.\n\nPoll this endpoint until the status is COMPLETED or ERROR.\n\nStatus values:\n- `IN_PROGRESS` – Request is being processed. Continue polling.\n- `COMPLETED` – Success. Response includes `result.image_url` for images, `result.video_url` for videos, or `result.structured_prompt` for structured prompt generation. Additional optional fields (seed, prompt, refined_prompt) may be included.\n- `ERROR` – Processing failed. Check error object for details.\n- `UNKNOWN` – Unexpected internal error.\n"
      operationId: BriaGetStatus
      parameters: 
        - description: "Unique identifier of the request (returned from edit, generate, or remove_background endpoints)"
          in: path
          name: request_id
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BriaStatusResponse"
          description: Status retrieved successfully
        "401": 
          description: Unauthorized
        "402": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Payment Required
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BriaStatusNotFoundResponse"
          description: Request ID not found or expired
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal Server Error
      security: 
        - BearerAuth: 
            []
      summary: Get Bria request status
      tags: 
        - API Nodes
        - Released
      x-excluded: true
