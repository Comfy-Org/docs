  /versions: 
    get: 
      operationId: ListAllNodeVersions
      parameters: 
        - in: query
          name: nodeId
          schema: 
            type: string
        - explode: true
          in: query
          name: statuses
          schema: 
            items: 
              $ref: "#/components/schemas/NodeVersionStatus"
            type: array
          style: form
        - in: query
          name: include_status_reason
          schema: 
            default: false
            type: boolean
        - description: The page number to retrieve.
          in: query
          name: page
          schema: 
            default: 1
            type: integer
        - description: The number of items to include per page.
          in: query
          name: pageSize
          schema: 
            default: 10
            type: integer
        - description: "search for status_reason, case insensitive"
          in: query
          name: status_reason
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  page: 
                    description: Current page number
                    type: integer
                  pageSize: 
                    description: Maximum number of node versions per page. Maximum is 100.
                    type: integer
                  total: 
                    description: Total number of node versions available
                    type: integer
                  totalPages: 
                    description: Total number of pages available
                    type: integer
                  versions: 
                    items: 
                      $ref: "#/components/schemas/NodeVersion"
                    type: array
                type: object
          description: List of all node versions
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: "Invalid input, object invalid"
        "403": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Node banned
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: List all node versions given some filters.
      tags: 
        - Registry
