              type: integer
          type: object
        image_url: 
          description: "Image URL or `data:image/...;base64,...` payload."
          type: string
        type: 
          enum: 
            - input_image
          type: string
      required: 
        - type
      type: object
    BytePlusResponseInputItem: 
      description: "One entry in the `input` array of a Responses request. Discriminated by the `type` field. See https://docs.byteplus.com/en/docs/ModelArk/1585128.\n"
      discriminator: 
        mapping: 
          function_call: "#/components/schemas/BytePlusResponseInputFunctionCall"
          function_call_output: "#/components/schemas/BytePlusResponseInputFunctionCallOutput"
          message: "#/components/schemas/BytePlusResponseInputMessage"
          reasoning: "#/components/schemas/BytePlusResponseInputReasoning"
        propertyName: type
      oneOf: 
        - $ref: "#/components/schemas/BytePlusResponseInputMessage"
        - $ref: "#/components/schemas/BytePlusResponseInputFunctionCall"
        - $ref: "#/components/schemas/BytePlusResponseInputFunctionCallOutput"
        - $ref: "#/components/schemas/BytePlusResponseInputReasoning"
    BytePlusResponseInputMessage: 
      additionalProperties: true
      description: "A message sent to the model (or a stored prior message when `status` is set). Role precedence: developer/system > user; assistant messages represent prior model output.\n"
      properties: 
        content: 
          oneOf: 
            - description: "Plain text content, equivalent to a single input_text item."
              type: string
            - items: 
                $ref: "#/components/schemas/BytePlusResponseMessageContent"
              type: array
        partial: 
          description: "Enables Continuation mode. Set the last message's role to `assistant` and `partial` to true; the model continues from its existing content.\n"
          type: boolean
        role: 
          enum: 
            - user
            - system
            - assistant
            - developer
          type: string
        status: 
          description: "Status of a previously stored message. Only used when echoing previous inputs back to the model.\n"
          enum: 
            - in_progress
            - completed
            - incomplete
          type: string
        type: 
          default: message
          enum: 
            - message
          type: string
      required: 
        - type
        - role
        - content
      type: object
    BytePlusResponseInputReasoning: 
