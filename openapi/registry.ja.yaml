          description: "comfy run フラグ。例：`--low-vram`"
          type: string
        commit_hash: 
          description: コミットのハッシュ
          type: string
        commit_id: 
          description: コミットのID
          type: string
        commit_message: 
          description: コミットのメッセージ
          type: string
        commit_time: 
          description: コミットが行われたUnixタイムスタンプ
          format: int64
          type: integer
        cuda_version: 
          description: 使用されたCUDAバージョン
          type: string
        end_time: 
          description: ジョブの終了時間（Unixタイムスタンプ）。
          format: int64
          type: integer
        git_repo: 
          description: リポジトリ名
          type: string
        id: 
          description: ジョブ結果のユニークな識別子
          format: uuid
          type: string
        job_trigger_user: 
          description: ジョブをトリガーしたユーザー。
          type: string
        machine_stats: 
