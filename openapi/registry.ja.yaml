    RodinGeometryInstructModeType: 
      description: "Optional. Default is `faithful`. The Creative mode enhances generative robustness while ensuring output consistency, allowing for more flexible and creative generation while maintaining quality and consistency across outputs. Available for Gen-2.5-Medium and Gen-2.5-High tiers.\n"
      enum: 
        - faithful
        - creative
      type: string
    RodinMaterialType: 
      description: "Optional. The material type. Default is PBR. PBR: Physically Based Materials, including base color texture, metallicness texture, normal texture and roughness texture, providing high realism and physically accurate behavior over dynamic lighting. Shaded: only base color texture with baked lighting, providing stylized visuals. All: both PBR and Shaded will be delivered. None: asset without material.\n"
      enum: 
        - PBR
        - Shaded
        - All
        - None
      type: string
    RodinMeshModeType: 
      description: "Optional. It controls the type of faces of generated models. Default is Quad. The Raw mode generates triangular face models. The Quad mode generates quadrilateral face models. When its value is Raw, `quality` will be fixed to medium and `addons` will be fixed to []. For Rodin Sketch tier, only triangular faces can be generated.\n"
      enum: 
        - Quad
        - Raw
      type: string
    RodinQualityType: 
      description: "Optional. The face count of the generated model. Default is medium.\n"
      enum: 
