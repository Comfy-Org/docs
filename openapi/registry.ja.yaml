      description: "POST /api/v3/files および GET /api/v3/files/{id} によって返されるファイルオブジェクト。詳細は https://docs.byteplus.com/en/docs/ModelArk/1873424 を参照してください。\n"
      properties: 
        bytes: 
          description: "ファイルサイズ（バイト単位）。ステータスが`active`の場合のみ返されます。"
          type: integer
        created_at: 
          description: ファイルがアップロードされたUnixタイムスタンプ（秒）。
          type: integer
        error: 
          description: "ステータスが`failed`の場合のみ返されるエラーの詳細。"
          nullable: true
          properties: 
            code: 
              description: エラーコード。
              type: string
            message: 
              description: エラーの説明。
              type: string
          type: object
        expire_at: 
          description: ファイルの有効期限が切れるUnixタイムスタンプ（秒）。
          type: integer
        id: 
          description: ファイルの一意のID。
          type: string
        mime_type: 
          description: "ファイルのMIMEタイプ。ステータスが`active`の場合のみ返されます。"
          type: string
        object: 
          description: "常に`file`。"
          type: string
        preprocess_configs: 
          $ref: "#/components/schemas/BytePlusFilePreprocessConfigs"
        purpose: 
          description: ファイルの用途。
          type: string
        status: 
          description: ファイルの処理ステータス。
          enum: 
            - processing
            - active
            - failed
          type: string
      type: object
    BytePlusFilePreprocessConfigs: 
      description: ファイルタイプごとにアップロードされたファイルに適用される前処理ルール。
      nullable: true
      properties: 
        video: 
          nullable: true
          properties: 
            fps: 
              default: 1
              description: "Number of frames per second sampled from the video at upload\ntime. Higher values capture more detail but consume more tokens\nduring inference (range [10k, 80k] tokens per video).\n"
              format: float
              maximum: 5
              minimum: 0.2
              nullable: true
              type: number
            model: 
              description: "Video-understanding model ID or endpoint ID whose frame-sampling\nstrategy should be applied during preprocessing. If omitted, the\npre-`seed-1.8` default strategy is used.\n"
              type: string
          type: object
      type: object
    BytePlusFileUploadRequest: 
      description: "Multipart upload payload for POST /api/v3/files. The binary `file` is required; everything else mirrors the upstream optional fields. See https://docs.byteplus.com/en/docs/ModelArk/1870405.\n"
      properties: 
        expire_at: 
          description: "Unix timestamp (seconds, UTC) at which the file should be expired.\nRange: [now + 86400, now + 2592000] (1 day to 30 days).\nDefault: now + 604800 (7 days).\n"
          type: integer
        file: 
          description: The binary file to upload.
          format: binary
          type: string
        preprocess_configs: 
          $ref: "#/components/schemas/BytePlusFilePreprocessConfigs"
        purpose: 
          default: user_data
          description: "Purpose of the uploaded file. `user_data` is a general-purpose value\nand the only one currently documented by BytePlus.\n"
          type: string
      required: 
        - file
        - purpose
      type: object
    BytePlusImageGenerationRequest: 
      properties: 
        guidance_scale: 
          description: "Controls how closely the output image aligns with the input prompt. Range [1, 10]. Higher values result in stronger prompt adherence. Default 2.5 for seedream-3-0-t2i-250415 and 5.5 for seededit-3-0-i2i-250628. Not supported by seedream-5.0-pro, 5.0-lite, 4.5 and 4.0."
          format: float
          maximum: 10
          minimum: 1
          type: number
        image: 
          description: "Seedream-5.0-pro, 5.0-lite, 4.5 and 4.0, and seededit-3.0-i2i support this parameter.\n\nEnter the Base64 encoding or an accessible URL of the image to edit. Seedream-5.0-pro, 5.0-lite, 4.5 and 4.0 support inputting a single image or multiple images (see the multi-image blending example), while seededit-3.0-i2i only supports single-image input.\n\n• Image URL: Make sure that the image URL is accessible.\n• Base64 encoding: The format must be data:image/<image format>;base64,<Base64 encoding>. Note: <image format> must be in lowercase, e.g., data:image/png;base64,<base64_image>.\n\nAn input image must meet the following requirements:\n• Image format: jpeg, png (seedream-5.0-pro, 5.0-lite, 4.5 and 4.0 also support webp, bmp, tiff and gif; seedream-5.0-pro also supports heic and heif)\n• Aspect ratio (width/height): In the range [1/16, 16] for seedream-5.0-pro, 5.0-lite, 4.5 and 4.0; [1/3, 3] for seededit-3.0-i2i\n• Width and height (px): > 14\n• Size: No more than 10 MB (30 MB for seedream-5.0-pro)\n• Total pixels: No more than 6000x6000 (36,000,000 px) for seedream-5.0-pro\n• Maximum of 14 reference images (10 for seedream-5.0-pro)\n"
          oneOf: 
            - description: Single image (URL or Base64)
              type: string
            - description: "Multiple images (URLs or Base64) - supported by seedream-5.0-pro, 5.0-lite, 4.5 and 4.0"
              items: 
                type: string
              maxItems: 14
              type: array
        model: 
          enum: 
            - seedream-3-0-t2i-250415
            - seededit-3-0-i2i-250628
            - seedream-4-0-250828
            - seedream-4-5-251128
            - seedream-5-0-260128
            - seedream-5-0-pro-260628
          type: string
        optimize_prompt_options: 
          description: "Configuration for prompt optimization feature. Only seedream-5.0-pro/5.0-lite/4.5 (only support standard mode) and seedream-4.0 support this parameter.\n"
          properties: 
            mode: 
              default: standard
              description: "Set the mode for the prompt optimization feature. standard = Higher quality, longer generation time. fast = Faster but at a more average quality."
              enum: 
                - standard
                - fast
              type: string
          type: object
        output_format: 
          default: jpeg
          description: Specifies the format of the output image. Only seedream-5.0-pro and 5.0-lite support this parameter.
          enum: 
            - png
            - jpeg
          type: string
        prompt: 
          description: Text description for image generation or transformation
          type: string
        response_format: 
          default: url
          description: Specifies the format of the generated image returned in the response
          enum: 
            - url
            - b64_json
          type: string
        seed: 
          default: -1
          description: "Random seed to control the stochasticity of image generation. Range: [-1, 2147483647]. If not specified, a seed will be automatically generated. To reproduce the same output, use the same seed value."
          type: integer
        sequential_image_generation: 
          description: "Controls whether to disable the batch generation feature. This parameter is only supported on seedream-5.0-lite, 4.5 and 4.0 (not supported by seedream-5.0-pro). Valid values:\nauto: In automatic mode, the model automatically determines whether to return multiple images and how many images it will contain based on the user's prompt.\ndisabled: Disables batch generation feature. The model will only generate one image.\n"
          type: string
        sequential_image_generation_options: 
          description: "Only seedream-5.0-lite, 4.5 and 4.0 support this parameter (not supported by seedream-5.0-pro).\nConfiguration for the batch image generation feature. This parameter is only effective when sequential_image_generation is set to auto.\n"
          properties: 
            max_images: 
              default: 15
              description: Specifies the maximum number of images to generate in this request. Number of input reference images + Number of generated images ≤ 15.
              maximum: 15
              minimum: 1
              type: integer
          type: object
        size: 
          description: "\"seedream-3-0-t2i-250415\": Specifies the dimensions (width x height in pixels) of the generated image. Must be between [512x512, 2048x2048]\n\"seededit-3-0-i2i-250628\": The width and height pixels of the generated image. Currently only supports adaptive.\n\"seedream-4-0-250828\": Set the specification for the generated image. Two methods are available but cannot be used together.\n  Method 1 | Specify the resolution. Optional values: 1K, 2K, 4K\n  Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [1024x1024, 4096x4096], aspect ratio: [1/16, 16]\n\"seedream-4-5-251128\": Two methods available.\n  Method 1 | Specify the resolution. Optional values: 2K, 4K\n  Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [2560x1440, 4096x4096], aspect ratio: [1/16, 16]\n\"seedream-5-0-260128\": Two methods available.\n  Method 1 | Specify the resolution. Optional values: 2K, 3K\n  Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [2560x1440, ~3072x3072], aspect ratio: [1/16, 16]\n\"seedream-5-0-pro-260628\": Two methods available (cannot be used together).\n  Method 1 | Specify the resolution and describe the aspect ratio, shape or purpose of the image in the prompt; the model decides the final size. Optional values: 1K, 2K\n  Method 2 | Specify width and height in pixels. Default: 1024x1024, total pixels: [1024x1024 (1048576), 2048x2048 (4194304)], aspect ratio: [1/16, 16]\n"
          type: string
        stream: 
          default: false
          description: "Whether to enable streaming output mode. Only seedream-5.0-lite, 4.5 and 4.0 support this parameter (not supported by seedream-5.0-pro). false = All output images are returned at once. true = Each output image is returned immediately after generated."
          type: boolean
        watermark: 
          default: true
          description: "Specifies whether to add a watermark to the generated image. false = No watermark, true = Adds watermark with 'AI generated' label"
          type: boolean
      required: 
        - prompt
        - model
      type: object
    BytePlusImageGenerationResponse: 
      properties: 
        created: 
          description: Unix timestamp (in seconds) indicating the time when the request was created
          type: integer
        data: 
          description: Contains information about the generated image(s)
          items: 
            properties: 
              b64_json: 
                description: "Base64-encoded image data (if response_format is \"b64_json\")"
                type: string
              output_format: 
                description: The file format of the output image. Only seedream-5.0-pro supports this field.
                type: string
              size: 
                description: "The width and height of the image in pixels, in the format <width>x<height>. Only seedream-5.0-pro, 5.0-lite, 4.5 and 4.0 support this parameter."
                type: string
              url: 
                description: "URL for image download (if response_format is \"url\")"
                format: uri
                type: string
            type: object
          type: array
        error: 
          description: Error information (if any)
          properties: 
            code: 
              description: Error code
              type: string
            message: 
              description: Error message
              type: string
          type: object
        model: 
          description: The model ID used for the request
          example: seedream-3-0-t2i-250415
          type: string
        usage: 
          properties: 
            generated_images: 
              description: Number of images generated by the model
              type: integer
            input_images: 
              description: The number of images input to the model. Only seedream-5.0-pro supports this field.
              type: integer
            output_tokens: 
              description: The number of tokens used for the picture generated by the model.
              type: integer
            total_tokens: 
              description: The total number of tokens consumed by this request.
              type: integer
          type: object
      type: object
    BytePlusResponseAppliedContextEdit: 
      description: "One applied context-edit, discriminated by `type`."
      discriminator: 
        mapping: 
          clear_thinking: "#/components/schemas/BytePlusResponseAppliedContextEditClearThinking"
          clear_tool_uses: "#/components/schemas/BytePlusResponseAppliedContextEditClearToolUses"
        propertyName: type
      oneOf: 
        - $ref: "#/components/schemas/BytePlusResponseAppliedContextEditClearThinking"
        - $ref: "#/components/schemas/BytePlusResponseAppliedContextEditClearToolUses"
    BytePlusResponseAppliedContextEditClearThinking: 
      additionalProperties: true
      properties: 
        cleared_thinking_turns: 
          description: Number of reasoning turns that were removed.
          type: integer
        type: 
          default: clear_thinking
          enum: 
            - clear_thinking
          type: string
      required: 
        - type
      type: object
    BytePlusResponseAppliedContextEditClearToolUses: 
      additionalProperties: true
      properties: 
        cleared_tool_uses: 
          description: Number of tool invocations that were removed.
          type: integer
        type: 
          default: clear_tool_uses
          enum: 
            - clear_tool_uses
          type: string
      required: 
        - type
      type: object
    BytePlusResponseAppliedContextManagement: 
      additionalProperties: true
      description: "Context-management strategies that were actually applied during this response. Unlike the request-side `BytePlusResponseContextManagement` (which configures strategies), this echoes the strategies the server invoked, with counts of what was cleared.\n"
      properties: 
        applied_edits: 
          items: 
            $ref: "#/components/schemas/BytePlusResponseAppliedContextEdit"
          type: array
      type: object
    BytePlusResponseContextEdit: 
      description: "A single context-edit strategy, discriminated by `type`."
      discriminator: 
        mapping: 
          clear_thinking: "#/components/schemas/BytePlusResponseContextEditClearThinking"
          clear_tool_uses: "#/components/schemas/BytePlusResponseContextEditClearToolUses"
        propertyName: type
      oneOf: 
        - $ref: "#/components/schemas/BytePlusResponseContextEditClearThinking"
        - $ref: "#/components/schemas/BytePlusResponseContextEditClearToolUses"
    BytePlusResponseContextEditClearThinking: 
      additionalProperties: true
      description: "Clears chain-of-thought content per the `keep` strategy."
      properties: 
        keep: 
          oneOf: 
            - additionalProperties: true
              properties: 
                type: 
                  default: thinking_turns
                  enum: 
                    - thinking_turns
                  type: string
                value: 
                  default: 1
                  description: Retain chain-of-thought for the most recent N turns.
                  type: integer
              required: 
                - type
              type: object
            - description: Retain all chain-of-thought.
              enum: 
                - all
              type: string
        type: 
          default: clear_thinking
          enum: 
            - clear_thinking
          type: string
      required: 
        - type
        - keep
      type: object
    BytePlusResponseContextEditClearToolUses: 
      additionalProperties: true
      description: Clears tool-call content when the conversation exceeds a threshold.
      properties: 
        clear_tool_input: 
          default: false
          description: Whether to clear tool-call parameters.
          type: boolean
        exclude_tools: 
          description: Tool names that are never cleared.
          items: 
            type: string
          type: array
        keep: 
          additionalProperties: true
          properties: 
            type: 
              default: tool_uses
              enum: 
                - tool_uses
              type: string
            value: 
              default: 3
              description: Retain tool-call content for the most recent N turns.
              type: integer
          required: 
            - type
          type: object
        trigger: 
          additionalProperties: true
          properties: 
            type: 
              default: tool_uses
              enum: 
                - tool_uses
              type: string
            value: 
              description: Trigger cleanup when tool-call turns reach N.
              type: integer
          required: 
            - type
            - value
          type: object
        type: 
          default: clear_tool_uses
          enum: 
            - clear_tool_uses
          type: string
      required: 
        - type
        - keep
        - trigger
      type: object
    BytePlusResponseContextManagement: 
      additionalProperties: true
      description: "Context-management strategies (`clear_thinking`, `clear_tool_uses`) applied to keep the context window manageable.\n"
      properties: 
        edits: 
          items: 
            $ref: "#/components/schemas/BytePlusResponseContextEdit"
          type: array
      type: object
    BytePlusResponseCreateRequest: 
      additionalProperties: true
      properties: 
        caching: 
          additionalProperties: true
          description: Context-cache configuration.
          properties: 
            prefix: 
              default: false
              description: "When true, only create the public prefix cache; the model does not respond.\n"
              type: boolean
            type: 
              enum: 
                - enabled
                - disabled
              type: string
          type: object
        context_management: 
          $ref: "#/components/schemas/BytePlusResponseContextManagement"
        expire_at: 
          description: "Unix timestamp (seconds, UTC) at which the stored response and cache expire. Range (creation_time, creation_time + 604800]. Default: creation_time + 259200 (3 days).\n"
          type: integer
        include: 
          description: "Additional output fields to include. Currently supported: `reasoning.encrypted_content` (encrypted+compressed reasoning for manual multi-turn reuse).\n"
          items: 
            type: string
          type: array
        input: 
          description: Text content or list of input items provided to the model.
          oneOf: 
            - description: "Plain text input, equivalent to a single user message."
              type: string
            - items: 
                $ref: "#/components/schemas/BytePlusResponseInputItem"
              type: array
        instructions: 
          description: "System/developer message prepended as the first instruction. Not compatible with `caching` — if `caching.type` is `enabled`, setting `instructions` returns an error.\n"
          nullable: true
          type: string
        max_output_tokens: 
          description: Maximum output tokens (response + chain-of-thought).
          nullable: true
          type: integer
        max_tool_calls: 
          maximum: 10
          minimum: 1
          type: integer
        model: 
          description: "Model ID or Endpoint ID. See https://docs.byteplus.com/en/docs/ModelArk/1330310 for the model list and https://docs.byteplus.com/en/docs/ModelArk/1099522 for Endpoint IDs.\n"
          type: string
        previous_response_id: 
          description: "ID of the previous response, used to continue a multi-turn conversation. Insert ~100ms between requests to avoid failures.\n"
          nullable: true
          type: string
        reasoning: 
          additionalProperties: true
          description: Limits the workload of deep thinking.
          properties: 
            effort: 
              description: "`minimal` disables thinking entirely. With `thinking.type =\ndisabled`, only `minimal` is allowed.\n"
              enum: 
                - minimal
                - low
                - medium
                - high
              type: string
          type: object
        store: 
          default: true
          description: "When true, the response is persisted and retrievable by ID for multi-turn use.\n"
          nullable: true
          type: boolean
        temperature: 
          default: 1
          format: float
          maximum: 2
          minimum: 0
          nullable: true
          type: number
        text: 
          additionalProperties: true
          description: Output-format configuration.
          properties: 
            format: 
              $ref: "#/components/schemas/BytePlusResponseTextFormat"
          type: object
        thinking: 
          additionalProperties: true
          description: Controls deep-thinking mode.
          properties: 
            type: 
              description: "`enabled`: always reason before responding.\n`disabled`: respond without additional reasoning.\n`auto`: model decides per-query.\n"
              enum: 
                - enabled
                - disabled
                - auto
              type: string
          type: object
        tool_choice: 
          description: Tool-selection mode. Only seed-1-6 models support this field.
          oneOf: 
            - enum: 
                - none
                - auto
                - required
              type: string
            - $ref: "#/components/schemas/BytePlusResponseToolChoiceObject"
        tools: 
          items: 
            $ref: "#/components/schemas/BytePlusResponseTool"
          type: array
        top_p: 
          default: 0.7
          format: float
          maximum: 1
          minimum: 0
          nullable: true
          type: number
      required: 
        - model
        - input
      type: object
    BytePlusResponseError: 
      description: Error details. Null when the response succeeded.
      nullable: true
      properties: 
        code: 
          type: string
        message: 
          type: string
      required: 
        - code
        - message
      type: object
    BytePlusResponseInputFile: 
