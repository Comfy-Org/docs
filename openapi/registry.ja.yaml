          anyOf: 
            - maximum: 500
              minimum: 0
              type: integer
          default: 200
          description: Cannyエッジ検出の高いしきい値
          title: Canny High Threshold
        canny_low_threshold: 
          anyOf: 
            - maximum: 500
              minimum: 0
              type: integer
          default: 50
          description: Cannyエッジ検出の低いしきい値
          title: Canny Low Threshold
        control_image: 
          anyOf: 
            - type: string
          description: 前処理画像が提供されない場合に制御入力として使用するBase64エンコード画像
          title: Control Image
        guidance: 
          anyOf: 
            - maximum: 100
              minimum: 1
              type: number
          default: 30
          description: 画像生成プロセスのガイダンス強度
          title: Guidance
        output_format: 
