              maximum: 2147483647
              minimum: 0
              type: integer
            shot_type: 
              default: single
              description: "Intelligent multi-lens control. Only active when prompt_extend is enabled.\nFor wan2.6 and wan2.7-r2v models.\n- single: Single-shot video (default)\n- multi: Multi-shot video\n"
              enum: 
                - multi
                - single
              type: string
            size: 
              description: "Video resolution in format width*height. Supported resolutions vary by model:\nFor wan2.5 T2V: 480P (480*832, 832*480, 624*624), 720P, 1080P sizes\nFor wan2.6 T2V/R2V (no 480P):\n  720P: 1280*720, 720*1280, 960*960, 1088*832, 832*1088\n  1080P: 1920*1080, 1080*1920, 1440*1440, 1632*1248, 1248*1632\n"
              type: string
            watermark: 
              default: false
              description: "Whether to add a watermark logo, the watermark is located in the lower right corner"
              type: boolean
          type: object
      required: 
        - model
        - input
      type: object
    WanVideoGenerationResponse: 
      properties: 
        code: 
          description: The error code for the failed request (not returned if request is successful)
          type: string
        message: 
          description: Detailed information about the failed request (not returned if request is successful)
          type: string
        output: 
          properties: 
            task_id: 
              description: Task ID
              type: string
            task_status: 
              description: Task status
              enum: 
                - PENDING
                - RUNNING
                - SUCCEEDED
                - FAILED
                - CANCELED
                - UNKNOWN
              type: string
          required: 
            - task_id
            - task_status
          type: object
        request_id: 
          description: Unique request identifier
          type: string
      required: 
        - output
        - request_id
      type: object
    WavespeedFlashVSRRequest: 
      description: Request body for WavespeedAI FlashVSR video upscaling
      properties: 
        duration: 
          description: "Duration of the video in seconds\n"
          type: number
        target_resolution: 
          default: 1080p
          description: Target resolution to upscale to.
          enum: 
            - 720p
            - 1080p
            - 2k
            - 4k
          type: string
        video: 
          description: "The video to upscale. Can be a URL to the video file or a base64-encoded video.\n"
          type: string
      required: 
        - video
        - duration
      type: object
    WavespeedSeedVR2ImageRequest: 
      description: Request body for WavespeedAI SeedVR2 image upscaling
      properties: 
        enable_base64_output: 
          default: false
          description: "If enabled, the output will be encoded into a BASE64 string instead of a URL."
          type: boolean
        image: 
          description: The URL of the image to upscale.
          type: string
        output_format: 
          default: jpeg
          description: The format of the output image.
          enum: 
            - jpeg
            - png
            - webp
          type: string
        target_resolution: 
          default: 4k
          description: The target resolution of the output image.
          enum: 
            - 2k
            - 4k
            - 8k
          type: string
      required: 
        - image
      type: object
    WavespeedTaskResponse: 
      description: Response from WavespeedAI task submission
      properties: 
        code: 
          description: "HTTP status code (e.g., 200 for success)"
          type: integer
        data: 
          properties: 
            created_at: 
              description: ISO timestamp of when the request was created
              type: string
            error: 
              description: Error message (empty if no error occurred)
              type: string
            has_nsfw_contents: 
              description: Array of boolean values indicating NSFW detection for each output
              items: 
                type: boolean
              type: array
            id: 
              description: Unique identifier for the prediction/task
              type: string
            model: 
              description: Model ID used for the prediction
              type: string
            outputs: 
              description: Array of URLs to the generated content (empty when status is not completed)
              items: 
                type: string
              type: array
            status: 
              description: Status of the task
              enum: 
                - created
                - processing
                - completed
                - failed
              type: string
            timings: 
              properties: 
                inference: 
                  description: Inference time in milliseconds
                  type: integer
              type: object
            urls: 
              properties: 
                get: 
                  description: URL to retrieve the prediction result
                  type: string
              type: object
          type: object
        message: 
          description: "Status message (e.g., \"success\")"
          type: string
      type: object
    WavespeedTaskResultResponse: 
      description: Response from WavespeedAI task result query
      properties: 
        code: 
          description: "HTTP status code (e.g., 200 for success)"
          type: integer
        data: 
          properties: 
            created_at: 
              description: ISO timestamp of when the request was created
              type: string
            error: 
              description: Error message (empty if no error occurred)
              type: string
            id: 
              description: Unique identifier for the prediction/task
              type: string
            model: 
              description: Model ID used for the prediction
              type: string
            outputs: 
              description: Array of URLs to the generated content (empty when status is not completed)
              items: 
                type: string
              type: array
            status: 
              description: Status of the task
              enum: 
                - created
                - processing
                - completed
                - failed
              type: string
            timings: 
              properties: 
                inference: 
                  description: Inference time in milliseconds
                  type: integer
              type: object
            urls: 
              properties: 
                get: 
                  description: URL to retrieve the prediction result
                  type: string
              type: object
          type: object
        message: 
          description: "Status message (e.g., \"success\")"
          type: string
      type: object
    WebSearchPreviewTool: 
      description: "This tool searches the web for relevant results to use in a response. Learn more about the [web search tool](https://platform.openai.com/docs/guides/tools-web-search)."
      properties: 
        search_context_size: 
          description: "High level guidance for the amount of context window space to use for the search. One of `low`, `medium`, or `high`. `medium` is the default."
          enum: 
            - low
            - medium
            - high
          type: string
        type: 
          default: web_search_preview
          description: "The type of the web search tool. One of `web_search_preview` or `web_search_preview_2025_03_11`."
          enum: 
            - web_search_preview
            - web_search_preview_2025_03_11
          type: string
          x-stainless-const: true
      required: 
        - type
      title: Web search preview
      type: object
    WebSearchToolCall: 
      description: "The results of a web search tool call. See the\n[web search guide](/docs/guides/tools-web-search) for more information.\n"
      properties: 
        id: 
          description: "The unique ID of the web search tool call.\n"
          type: string
        status: 
          description: "The status of the web search tool call.\n"
          enum: 
            - in_progress
            - searching
            - completed
            - failed
          type: string
        type: 
          description: "The type of the web search tool call. Always `web_search_call`.\n"
          enum: 
            - web_search_call
          type: string
          x-stainless-const: true
      required: 
        - id
        - type
        - status
      title: Web search tool call
      type: object
    WorkflowRunStatus: 
      enum: 
        - WorkflowRunStatusStarted
        - WorkflowRunStatusFailed
        - WorkflowRunStatusCompleted
      type: string
    XAIGeneratedImage: 
      description: A generated image from xAI
      properties: 
        b64_json: 
          description: A base64-encoded string representation of the generated image in jpeg encoding (if response_format is b64_json)
          type: string
        mime_type: 
          description: "The MIME type of the generated image (e.g. image/png, image/jpeg, image/webp)."
          type: string
        url: 
          description: A url to the generated image (if response_format is url)
          type: string
      type: object
    XAIGeneratedVideo: 
      description: A generated video from xAI
      properties: 
        duration: 
          description: Duration of the generated video in seconds
          type: integer
        respect_moderation: 
          description: Whether the video generated by the model respects moderation rules
          type: boolean
        url: 
          description: A url to the generated video
          nullable: true
          type: string
      type: object
    XAIImageEditRequest: 
      description: Request body for xAI Grok Imagine image editing
      properties: 
        aspect_ratio: 
          description: "Aspect ratio of the output image for image editing with multiple images. For single image editing, do not set this."
          enum: 
            - 1:1
            - 3:4
            - 4:3
            - 9:16
            - 16:9
            - 2:3
            - 3:2
            - 9:19.5
            - 19.5:9
            - 9:20
            - 20:9
            - 1:2
            - 2:1
            - auto
          type: string
        image: 
          $ref: "#/components/schemas/XAIImageObject"
        images: 
          description: "List of input images for multi-reference editing. Mutually exclusive with image. When multiple images are provided, refer to them as <IMAGE_0>, <IMAGE_1>, etc. in the prompt."
          items: 
            $ref: "#/components/schemas/XAIImageObject"
          type: array
        mask: 
          $ref: "#/components/schemas/XAIImageObject"
        model: 
          default: grok-imagine-image
          description: Model to be used
          type: string
        "n": 
          description: Number of image edits to be generated
          type: integer
        prompt: 
          description: Prompt for image editing
          type: string
        quality: 
          description: "Quality of the output image. Currently a no-op, reserved for future use."
          enum: 
            - low
            - medium
            - high
          type: string
        resolution: 
          default: 1k
          description: Resolution of the generated image. Defaults to 1k.
          enum: 
            - 1k
            - 2k
          type: string
        response_format: 
          default: url
          description: Response format to return the image in. Can be url or b64_json.
          enum: 
            - url
            - b64_json
          type: string
        size: 
          description: Size of the image (not supported)
          type: string
        style: 
          description: Style of the image (not supported)
          type: string
        user: 
          description: "A unique identifier representing your end-user, which can help xAI to monitor and detect abuse"
          type: string
      required: 
        - prompt
      type: object
    XAIImageGenerationRequest: 
      description: Request body for xAI Grok Imagine image generation
      properties: 
        aspect_ratio: 
          default: auto
          description: Aspect ratio of the generated image. Defaults to auto for automatically selecting the best ratio for the prompt.
          enum: 
            - 1:1
            - 3:4
            - 4:3
            - 9:16
            - 16:9
            - 2:3
            - 3:2
            - 9:19.5
            - 19.5:9
            - 9:20
            - 20:9
            - 1:2
            - 2:1
            - auto
          type: string
        model: 
          default: grok-imagine-image
          description: Model to be used
          type: string
        "n": 
          default: 1
          description: Number of images to be generated
          maximum: 10
          minimum: 1
          type: integer
        prompt: 
          description: Prompt for image generation
          type: string
        quality: 
          description: "Quality of the output image. Currently a no-op, reserved for future use."
          enum: 
            - low
            - medium
            - high
          type: string
        resolution: 
          default: 1k
          description: Resolution of the generated image. Defaults to 1k.
          enum: 
            - 1k
            - 2k
          type: string
        response_format: 
          default: url
          description: Response format to return the image in. Can be url or b64_json.
          enum: 
            - url
            - b64_json
          type: string
        size: 
          description: Size of the image (not supported)
          type: string
        style: 
          description: Style of the image (not supported)
          type: string
        user: 
          description: "A unique identifier representing your end-user, which can help xAI to monitor and detect abuse"
          type: string
      required: 
        - prompt
      type: object
    XAIImageGenerationResponse: 
      description: Response from xAI image generation or editing
      properties: 
        block_reason: 
          description: "If the request was blocked by input moderation, contains the block reason"
          type: string
        data: 
          description: A list of generated image objects
          items: 
            $ref: "#/components/schemas/XAIGeneratedImage"
          type: array
        usage: 
          $ref: "#/components/schemas/XAIImageUsage"
      type: object
    XAIImageObject: 
      description: Input image object for xAI endpoints
      properties: 
        type: 
          description: Type of the image input
          enum: 
            - image_url
          type: string
        url: 
          description: URL of the input image (public URL or base64-encoded data URI)
          type: string
      required: 
        - url
      type: object
    XAIImageUsage: 
      description: Usage information for the image generation request
      properties: 
        cost_in_usd_ticks: 
          description: "Accurate cost of this request in USD ticks (10,000,000,000 ticks = 1 USD)"
          type: integer
      type: object
    XAIReferenceImageObject: 
      description: A reference image used to guide video generation in R2V mode
      properties: 
        url: 
          description: "URL of the reference image. Supports HTTPS URLs (public) or base64-encoded data URLs (e.g., data:image/jpeg;base64,...)."
          type: string
      required: 
        - url
      type: object
    XAIVideoAsyncResponse: 
      description: Response from xAI video generation or editing (async operation)
      properties: 
        request_id: 
          description: Unique identifier to poll for the completed video
          type: string
      type: object
    XAIVideoEditRequest: 
      description: Request body for xAI Grok Imagine video editing
      properties: 
        model: 
          description: Model to be used
          nullable: true
          type: string
        output: 
          description: Optional output destination for generated video
          nullable: true
          type: object
        prompt: 
          description: Prompt for video editing
          type: string
        user: 
          description: A unique identifier representing your end-user
          nullable: true
          type: string
        video: 
          $ref: "#/components/schemas/XAIVideoObject"
      required: 
        - prompt
        - video
      type: object
    XAIVideoExtensionRequest: 
      description: Request body for xAI Grok Imagine video extension
      properties: 
        duration: 
          default: 6
          description: "Length of the extension in seconds. Range [2, 10]. Default 6."
          maximum: 10
          minimum: 2
          nullable: true
          type: integer
        model: 
          description: Model to use
          nullable: true
          type: string
        prompt: 
          description: Text description of what should happen next in the video
          type: string
        video: 
          $ref: "#/components/schemas/XAIVideoObject"
      required: 
        - prompt
        - video
      type: object
    XAIVideoGenerationRequest: 
      description: "Request body for xAI Grok Imagine video generation.\nSupports three modes: text-to-video (prompt only), image-to-video (prompt + image),\nand reference-to-video (prompt + reference_images).\nThe fields image, reference_images, and video are mutually exclusive.\n"
      properties: 
        aspect_ratio: 
          default: 16:9
          description: Aspect ratio of the generated video
          enum: 
            - 1:1
            - 16:9
            - 9:16
            - 4:3
            - 3:4
            - 3:2
            - 2:3
          type: string
        duration: 
          default: 8
          description: "Video duration in seconds. Range [1, 15]. Default 8."
          maximum: 15
          minimum: 1
          nullable: true
          type: integer
        image: 
          $ref: "#/components/schemas/XAIImageObject"
        model: 
          description: Model to be used
          type: string
        output: 
          description: Optional output destination for generated video
          nullable: true
          type: object
        prompt: 
          description: "Prompt for video generation. Maximum 4,096 characters."
          type: string
        reference_images: 
          description: One or more reference images to guide the video generation (reference-to-video mode). Mutually exclusive with image and video.
          items: 
            $ref: "#/components/schemas/XAIReferenceImageObject"
          type: array
        resolution: 
          description: Resolution of the output video
          nullable: true
          type: string
        size: 
          description: Size of the output video
          nullable: true
          type: string
        user: 
          description: A unique identifier representing your end-user
          nullable: true
          type: string
      required: 
        - prompt
      type: object
    XAIVideoObject: 
      description: Input video object for xAI endpoints
      properties: 
        url: 
          description: "URL of the video (public URL or base64-encoded data URL). The video must have the .mp4 file extension and be encoded with .mp4 supported codecs such as H.265, H.264, AV1, etc."
          type: string
      required: 
        - url
      type: object
    XAIVideoResultResponse: 
      description: Response from getting video generation result
      properties: 
        block_reason: 
          description: "If the request was blocked by input moderation, contains the block reason"
          nullable: true
          type: string
        model: 
          description: The model used to generate the video
          type: string
        status: 
          description: "Status of the deferred request: \"pending\" or \"done\""
          enum: 
            - pending
            - done
          type: string
        usage: 
          $ref: "#/components/schemas/XAIVideoUsage"
        video: 
          $ref: "#/components/schemas/XAIGeneratedVideo"
      type: object
    XAIVideoUsage: 
      description: Usage information for the video generation request
      properties: 
        cost_in_usd_ticks: 
          description: "The cost of this request expressed in USD ticks. One USD cent equals 100,000,000 ticks, so one US dollar equals 10,000,000,000 ticks.\n"
          type: integer
      type: object
  securitySchemes: 
    BearerAuth: 
      bearerFormat: JWT
      scheme: bearer
      type: http
info: 
  title: Comfy API
  version: "1.0"
openapi: 3.0.2
paths: 
  "/admin/customers/{customer_id}/archive-metronome-data": 
    post: 
      description: Archives metronome data. See https://docs.metronome.com/api-reference/customers/archive-a-customer
      operationId: PostAdminArchiveMetronomeData
      parameters: 
        - description: The ID of the customer whose Metronome data to archive
          in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - description: Admin API secret used to authorize this request
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    description: Success message
                    type: string
                type: object
          description: Metronome data archived successfully
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request - missing required parameter
        "401": 
          description: Unauthorized or missing admin API secret
        "404": 
          description: Customer not found
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Archive customer Metronome data
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/balance": 
    get: 
      description: "Returns the specified customer's current remaining balance in microamount and its currency."
      operationId: GetAdminCustomerBalance
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  amount_micros: 
                    format: double
                    type: number
                  cloud_credit_balance_micros: 
                    format: double
                    type: number
                  currency: 
                    type: string
                  effective_balance_micros: 
                    format: double
                    type: number
                  pending_charges_micros: 
                    format: double
                    type: number
                  prepaid_balance_micros: 
                    format: double
                    type: number
                required: 
                  - amount_micros
                  - currency
                type: object
          description: Customer balance retrieved successfully
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Customer not found
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: "Admin get customer's remaining balance"
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/cloud-subscription-status": 
    get: 
      description: "Allows an admin to inspect a specific customer's cloud subscription status."
      operationId: GetAdminCustomerCloudSubscriptionStatus
      parameters: 
        - description: The ID of the customer whose subscription status to retrieve
          in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - description: Admin API secret used to authorize this request
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  end_date: 
                    description: The date when the subscription is set to end (ISO 8601 format)
                    format: date-time
                    nullable: true
                    type: string
                  has_fund: 
                    description: Whether the customer has funds/credits available
                    type: boolean
                  is_active: 
                    description: Whether the customer has an active cloud subscription
                    type: boolean
                  renewal_date: 
                    description: The next renewal date for the subscription (ISO 8601 format)
                    format: date-time
                    nullable: true
                    type: string
                  subscription_duration: 
                    allOf: 
                      - $ref: "#/components/schemas/SubscriptionDuration"
                    nullable: true
                  subscription_id: 
                    description: The active subscription ID if one exists
                    nullable: true
                    type: string
                  subscription_tier: 
                    allOf: 
                      - $ref: "#/components/schemas/SubscriptionTier"
                    nullable: true
                type: object
          description: Cloud subscription status retrieved successfully
        "401": 
          description: Unauthorized or missing admin API secret
        "404": 
          description: Customer not found
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Admin check cloud subscription status
      tags: 
        - Admin
      x-excluded: true
  "/admin/customers/{customer_id}/partner-node-concurrency-override": 
    delete: 
      description: "Clears the override (sets it to NULL) so the customer's limit reverts to the spend engine.\n"
      operationId: ClearAdminCustomerConcurrencyOverride
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    type: string
                type: object
          description: Override cleared successfully
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Customer not found
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Admin clear customer partner-node concurrency override
      tags: 
        - Admin
      x-excluded: true
    get: 
      description: "Returns the customer's current partner-node concurrency override (the raw column value), the limit the gate enforces right now, and the limit the spend engine would apply if the override were cleared.\n"
      operationId: GetAdminCustomerConcurrencyOverride
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  customer_id: 
                    type: string
                  effective_limit: 
                    description: Limit the gate enforces right now.
                    type: integer
                  effective_reason: 
                    type: string
                  engine_limit: 
                    description: Limit the spend engine would apply if the override were cleared.
                    type: integer
                  engine_reason: 
                    type: string
                  lifetime_paid_spend_cents: 
                    description: Lifetime paid spend in cents; null when the spend query failed.
                    format: int64
                    nullable: true
                    type: integer
                  override: 
                    description: Raw override column value; null when unset.
                    nullable: true
                    type: integer
                required: 
                  - customer_id
                  - effective_limit
                  - effective_reason
                  - engine_limit
                  - engine_reason
                type: object
          description: Override and resolved limits retrieved successfully
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Customer not found
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Admin get customer partner-node concurrency override
      tags: 
        - Admin
      x-excluded: true
    put: 
      description: "Pins the customer's partner-node concurrency override. Semantics: 0 = blocked, -1 = unlimited, positive = hard limit. Allowed values are -1, 0, and 1..200.\n"
      operationId: SetAdminCustomerConcurrencyOverride
      parameters: 
        - in: path
          name: customer_id
          required: true
          schema: 
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                override: 
                  description: "-1 unlimited, 0 blocked, 1..200 hard limit. Must be present and non-null; a missing or null value is rejected with 400 (use DELETE to clear the override).\n"
                  nullable: true
                  type: integer
              required: 
                - override
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  message: 
                    type: string
