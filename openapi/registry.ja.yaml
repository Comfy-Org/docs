  /admin/sync-api-key-deletion: 
    post: 
      description: "Reverse-direction delete-sync (cloud → comfy-api registry, BE-1542). When a\nworkspace API key is deleted in cloud (the new source of truth), cloud calls\nthis endpoint so the comfy-api registry's api_keys row is removed too,\nkeeping the two stores convergent. Idempotent: deleting an unknown hash is a\nno_op. M2M/admin-only; carries the key hash, never plaintext.\n"
      operationId: SyncApiKeyDeletion
      parameters: 
        - description: Admin API secret used to authorize this request
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                customer_id: 
                  description: "Firebase UID of the key's owner, for mismatch detection. The\ndeletion proceeds by hash regardless (mirrors cloud's inbound\nRevokeByHash semantics).\n"
                  type: string
                event: 
                  description: "Sync event type; only \"delete\" is supported."
                  enum: 
                    - delete
                  example: delete
                  type: string
                key_hash: 
                  description: SHA-256 hex hash of the API key to revoke.
                  maxLength: 64
                  minLength: 64
                  pattern: "^[A-Fa-f0-9]{64}$"
                  type: string
              required: 
                - event
                - key_hash
                - customer_id
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  result: 
                    description: "revoked when a matching key was deleted; no_op when no key\nmatched the hash (already deleted or never existed).\n"
                    type: string
                required: 
                  - result
                type: object
          description: Delete-sync processed
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request (missing fields or unsupported event)
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized or missing admin API secret
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Revoke a registry API key by hash (reverse delete-sync)
      tags: 
        - Admin
      x-excluded: true
  /admin/verify-api-key: 
    post: 
      description: "Validates a ComfyUI API key and returns the associated customer information.\nThis endpoint is used by cloud.comfy.org to authenticate users via API keys\ninstead of Firebase tokens.\n"
      operationId: VerifyApiKey
      parameters: 
        - description: Admin API secret used to authorize this request
          in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema: 
            type: string
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                api_key: 
                  description: "The ComfyUI API key to verify (e.g., comfy_xxx...)"
                  type: string
                include_customer_keys: 
                  description: "When true, the response also includes customer_api_keys: the\nfull set of the customer's API keys (hash + prefix + name +\ndescription) so cloud's migrate-on-miss can seed ALL of the\ncustomer's keys into workspace_api_keys, not just the one being\nverified. M2M/admin-only; carries hashes, never plaintext.\n"
                  type: boolean
              required: 
                - api_key
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                properties: 
                  customer_api_keys: 
                    description: "All of the customer's API keys — returned ONLY when the\nrequest sets include_customer_keys=true. Lets cloud's\nmigrate-on-miss seed every key into workspace_api_keys (by\nhash) so the cloud key list matches the customer's full set,\nnot just the one verified. M2M/admin-only; hashes, no plaintext.\n"
                    items: 
                      $ref: "#/components/schemas/MigrationAPIKey"
                    type: array
                  email: 
                    description: "The customer's email address"
                    type: string
                  firebase_uid: 
                    description: The Firebase UID of the user
                    type: string
                  is_admin: 
                    description: Whether the customer is an admin
                    type: boolean
                  key_description: 
                    description: "The api_keys row's own description. Returned so that cloud's\nmigrate-on-miss path can preserve it on the cached\nworkspace_api_keys row instead of writing a placeholder.\n"
                    type: string
                  key_name: 
                    description: "The api_keys row's own name (display label). Returned so that\ncloud's migrate-on-miss path can preserve it on the cached\nworkspace_api_keys row instead of writing a placeholder.\n"
                    type: string
                  name: 
                    description: "The customer's name"
                    type: string
                  valid: 
                    description: Whether the API key is valid
                    type: boolean
                required: 
                  - valid
                  - firebase_uid
                type: object
          description: API key is valid
        "401": 
          description: Unauthorized or missing admin API secret
        "403": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: "API key auth not allowed for this account (e.g., free tier)"
        "404": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: API key not found or invalid
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Verify a ComfyUI API key and return customer details
      tags: 
        - Admin
      x-excluded: true
