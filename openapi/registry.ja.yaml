  /proxy/tripo/v2/openapi/import: 
    post: 
      description: "Composite endpoint for Tripo model import (PN-328). The client first uploads the\nmodel file to ComfyUI API storage (POST /customers/storage) and then calls this\nendpoint with the resulting download URL. The backend performs the full Tripo\nimport flow server-side: downloads the file from storage, obtains short-lived STS\nupload credentials from Tripo, uploads the file to Tripo's object storage (SigV4),\nand creates an import_model task referencing the uploaded object. Returns Tripo's\ncreate-task response; poll /proxy/tripo/v2/openapi/task/{task_id} for completion.\nThe resulting task id is usable with Tripo post-processing tasks (texture_model,\nanimate_rig, convert_model, ...).\n\nThis is a synthetic comfy-api route (Tripo has no single-call equivalent); it\nexists so that Tripo's temporary storage credentials never leave the backend and\nno model binary ever travels inside this request.\n\nThe url host must be ComfyUI API storage (storage.googleapis.com).\nSupported formats: glb, fbx, obj, stl. Maximum file size: 150MB.\n"
      operationId: TripoImportModel
      requestBody: 
        content: 
          application/json: 
            schema: 
              properties: 
                format: 
                  description: "File format (\"glb\", \"fbx\", \"obj\", \"stl\"). Optional; derived from the URL path extension when omitted."
                  type: string
                url: 
                  description: Download URL of the model file previously uploaded to ComfyUI API storage.
                  type: string
              required: 
                - url
              type: object
        required: true
      responses: 
        "200": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoSuccessTask"
          description: Import task created
        "400": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Invalid request parameters
        "401": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Authentication failed
        "403": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Unauthorized access to requested resource
        "413": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: File exceeds the 150MB limit
        "429": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Account exception or Rate limit exceeded
        "500": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Internal server error
        "502": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Upstream upload or task creation failed
        "503": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Service temporarily unavailable
        "504": 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TripoErrorResponse"
          description: Server timeout
      summary: Import an External 3D Model into Tripo
      tags: 
        - API Nodes
        - Released
      x-excluded: true
