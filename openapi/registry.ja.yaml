    RodinTierType: 
      description: "Tier of generation. The default value is Regular. Sketch: fast generation with basic details, suitable for initial concepts. Regular: balanced quality and speed, ideal for general use. Detail: enhanced details compared to Regular, recommended for intricate results (longer processing time). Smooth: clearer and sharper output than Regular, with slightly longer processing time. Set the value to `Gen-2` to invoke Gen-2 generation. Use the `Gen-2.5-*` values to invoke Gen-2.5 generation: Gen-2.5-Extreme-Low (quick simple assets), Gen-2.5-Low (clean assets and small hardsurface props), Gen-2.5-Medium (moderately complex models), Gen-2.5-High (high-quality assets with richer structural representation and smooth surfaces), Gen-2.5-Extreme-High (high-frequency detail reproduction).\n"
      enum: 
        - Regular
        - Sketch
        - Detail
        - Smooth
        - Gen-2
        - Gen-2.5-Extreme-Low
        - Gen-2.5-Low
        - Gen-2.5-Medium
        - Gen-2.5-High
        - Gen-2.5-Extreme-High
      type: string
