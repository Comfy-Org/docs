      description: "指定されたフィルタに一致するアセットに表示されるタグのヒストグラムを返します。\n利用可能なタグとそのカウントを表示することで、アセット検索の絞り込みに役立ちます。\nカウントがゼロではないタグ（一致するアセットに存在するタグ）のみを返します。\n"
