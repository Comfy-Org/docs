          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 認証されていません
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 内部サーバーエラー
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  "/api/assets/hash/{hash}": 
    head: 
      tags: 
        - asset
      summary: ハッシュでアセットの存在を確認
      description: "指定されたハッシュのコンテンツがクラウドストレージに存在するか確認します。コンテンツが存在する場合は200、存在しない場合は404を返します。`/api/assets/from-hash` を使用する前に可用性を確認するのに便利です。"
      operationId: checkAssetByHash
      parameters: 
        - name: hash
          in: path
          required: true
          description: "アセットのBlake3ハッシュ (形式: 'blake3:hex_digest')"
          schema: 
            type: string
            pattern: "^blake3:[a-f0-9]{64}$"
            example: blake3:a1b2c3d4e5f6789012345678901234567890123456789012345678901234
      responses: 
        "200": 
          description: アセットが存在します
        "400": 
          description: 無効なハッシュ形式
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 認証されていません
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "404": 
          description: アセットが見つかりません
