              type: string
          style: form
          explode: false
        - name: exclude_tags
          in: query
          description: これらのタグのいずれかを持つアセットを除外
          schema: 
            type: array
            items: 
              type: string
          style: form
          explode: false
        - name: name_contains
          in: query
          description: 名前にこの部分文字列を含むアセットにフィルタ（大文字小文字を区別しない）
          schema: 
            type: string
        - name: metadata_filter
          in: query
          description: メタデータフィールドでフィルタリングするためのJSONオブジェクト
          schema: 
            type: string
        - name: limit
          in: query
          description: 返すタグの最大数（1～1000、デフォルト100）
          schema: 
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
