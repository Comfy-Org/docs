      summary: ユーザーデータファイルをアップロードまたは更新
      description: "ファイルをユーザーのデータディレクトリにアップロードします。オプションのクエリパラメータにより、上書き動作と応答の詳細を制御できます。\n"
      parameters: 
        - name: file
          in: path
          required: true
          description: ターゲットファイルパス（必要に応じてURLエンコード）。
          schema: 
            type: string
        - name: overwrite
          in: query
          required: false
          description: 「false」の場合、既存ファイルの上書きを防ぎます。デフォルトは「true」。
          schema: 
            type: string
            enum: 
              - "true"
              - "false"
            default: "true"
        - name: full_info
          in: query
          required: false
          description: 「true」の場合は詳細なファイル情報を返し、「false」の場合は相対パスのみを返します。
          schema: 
            type: string
            enum: 
              - "true"
              - "false"
            default: "false"
      requestBody: 
        required: true
        content: 
          application/octet-stream: 
            schema: 
              type: string
              format: binary
      responses: 
        "200": 
          description: ファイルのアップロードに成功しました。
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/UserDataResponseFull"
        "400": 
          description: "'file'パラメータが不足しているか無効です。"
          content: 
            text/plain: 
              schema: 
                type: string
        "401": 
          description: 認証されていません。
          content: 
            text/plain: 
              schema: 
                type: string
        "403": 
          description: 要求されたパスは許可されていません。
          content: 
            text/plain: 
              schema: 
                type: string
        "409": 
          description: ファイルは既に存在し、上書きがfalseに設定されています。
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: 一般エラー
          content: 
            text/plain: 
              schema: 
                type: string
    delete: 
      tags: 
        - user
      operationId: deleteUserdataFile
      summary: ユーザーデータファイルを削除
      description: "データベースからユーザーデータファイルを削除します。fileパラメータはユーザーのデータディレクトリ内の相対パスである必要があります。\n"
