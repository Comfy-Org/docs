              schema: 
                type: string
        "404": 
          description: ファイルが見つかりません。
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: サーバー内部エラー。
          content: 
            text/plain: 
              schema: 
                type: string
  /api/upload/image: 
    post: 
      tags: 
        - file
      summary: 画像ファイルをアップロード
      description: "画像ファイルをクラウドストレージにアップロードします。\n\n画像制限:\n  - 最大ファイルサイズ: 50 MB\n  - 各エッジの最大幅/高さ: 16384 px\n  - 最大総ピクセル数: 64メガピクセル (67108864 ピクセル)\n\nこれらの制限を超えるアップロードはHTTP 400で拒否されます。\n"
      operationId: uploadImage
      requestBody: 
        required: true
        content: 
          multipart/form-data: 
            schema: 
              type: object
              required: 
                - image
              properties: 
                image: 
                  type: string
                  format: binary
                  description: アップロードする画像ファイル
                overwrite: 
                  type: string
                  description: "既存のファイルを上書きするかどうか (true/false)。\n**注:** ComfyUI API互換性のため受け入れられますが、クラウドでは実質的に無視されます。\nクラウドはコンテンツアドレスストレージ（ハッシュベースの重複排除）を使用するため、同一の\nコンテンツは常に同じハッシュにマッピングされます。同じコンテンツを再アップロードしても効果はありません（no-op）。\n"
                subfolder: 
                  type: string
                  description: "オプションのサブフォルダパス。\n**注:** ComfyUI API互換性のため受け入れられますが、ストレージでは**無視**されます。\nクラウドはアセットをハッシュのみで保存します。サブフォルダはクライアント側での整理のためにレスポンスで返されますが、サーバー側のストレージパスには使用されません。\n"
                type: 
                  type: string
                  description: "アップロードタイプ (デフォルトは\"output\")。\n**注:** ComfyUI API互換性のため受け入れられます。クラウドはすべてのアップロードを\nディレクトリベースの整理ではなく、タグ付きのアセットとして保存します。\n"
      responses: 
        "200": 
          description: 画像のアップロードに成功しました
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  name: 
                    type: string
                    description: アップロードされた画像のファイル名
                  subfolder: 
                    type: string
                    description: 画像が保存されたサブフォルダパス
                  type: 
                    type: string
                    description: "アップロードのタイプ (例: \"output\")"
        "400": 
          description: 不正なリクエスト
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 未認証
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 内部サーバーエラー
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
