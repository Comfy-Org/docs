          schema: 
            type: boolean
            default: false
        - name: full_info
          in: query
          required: false
          description: "完全なファイルメタデータを返すかどうか。\n**注記：** ComfyUI API互換性のために受け付けられていますが、現在は無視されます（常に完全な情報を返します）。\n"
          schema: 
            type: boolean
            default: false
      responses: 
        "200": 
