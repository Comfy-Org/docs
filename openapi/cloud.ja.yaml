      summary: システム統計を取得
      description: ComfyUIバージョン、デバイス情報、システムリソースを含むシステム統計を返します
      operationId: getSystemStats
      security: 
        []
      responses: 
        "200": 
          description: 成功
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/SystemStatsResponse"
        "401": 
          description: 未認証
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  /api/user: 
    get: 
      tags: 
        - user
      summary: 現在のユーザー情報を取得
      description: 現在認証されているユーザーに関する情報を返します
      operationId: getUser
      responses: 
        "200": 
          description: 成功
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/UserResponse"
        "401": 
          description: 認証エラー
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  "/api/job/{job_id}/status": 
    get: 
      tags: 
        - job
      summary: ジョブステータスの取得
      description: 特定のジョブの現在のステータスをIDで返します
      operationId: getJobStatus
      parameters: 
        - name: job_id
          in: path
          required: true
          description: ジョブの一意のID
          schema: 
            type: string
            format: uuid
      responses: 
        "200": 
          description: 成功：ジョブのステータスが返されました
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/JobStatusResponse"
        "401": 
          description: 認証が必要です
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "403": 
          description: 禁止：ジョブは別のユーザーに属しています
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "404": 
          description: ジョブが見つかりません
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 内部サーバーエラー
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
components: 
  securitySchemes: 
    ApiKeyAuth: 
      type: apiKey
      in: header
      name: X-API-Key
      description: "APIキー認証。アカウント設定からAPIキーを生成します\n（https://platform.comfy.org/profile/api-keys）。X-API-Keyヘッダーでキーを渡します。\n"
  schemas: 
    PromptRequest: 
      type: object
      required: 
        - prompt
      properties: 
        prompt: 
          type: object
          description: 実行するワークフローグラフ
          additionalProperties: true
        number: 
          type: number
          description: "キューの優先順位番号（数字が小さいほど優先度が高い）。\n**注:** ComfyUI API互換性のために受け付けられますが、クラウドでは**無視されます**。\nクラウドはユーザーごとの順序と公平なスケジューリングを備えた独自のキュー管理を使用します。\n"
        front: 
          type: boolean
          description: "trueの場合、プロンプトをキューの先頭に追加します。\n**注:** ComfyUI API互換性のために受け付けられますが、クラウドでは**無視されます**。\nクラウドはジョブの送信時間と公平なスケジューリングに基づいて内部でキュー順序を管理します。\n"
        extra_data: 
          type: object
          description: プロンプトに関連付ける追加データ
          additionalProperties: true
        partial_execution_targets: 
          type: array
          items: 
            type: string
          description: 実行するノード名のリスト
    PromptResponse: 
      type: object
      properties: 
        prompt_id: 
          type: string
          format: uuid
          description: プロンプト実行の一意識別子
        number: 
          type: number
          description: キュー内の優先順位番号
        node_errors: 
          type: object
          description: プロンプトのノード内のエラー
          additionalProperties: true
    ErrorResponse: 
      type: object
      required: 
        - code
        - message
      properties: 
        code: 
          type: string
        message: 
          type: string
    PromptInfo: 
      type: object
      properties: 
        exec_info: 
          type: object
          properties: 
            queue_remaining: 
              type: integer
              description: キューに残っているアイテムの数
    NodeInfo: 
      type: object
      properties: 
        input: 
          type: object
          description: ノードの入力仕様
          additionalProperties: true
        input_order: 
          type: object
          description: 表示用の入力の順序
          additionalProperties: 
            type: array
            items: 
              type: string
        output: 
          type: array
          items: 
            type: string
          description: ノードの出力タイプ
        output_is_list: 
          type: array
          items: 
            type: boolean
          description: 各出力がリストかどうか
        output_name: 
          type: array
          items: 
            type: string
          description: 出力の名前
        name: 
          type: string
          description: ノードの内部名
        display_name: 
          type: string
          description: ノードの表示名
        description: 
          type: string
          description: ノードの説明
        python_module: 
          type: string
          description: ノードを実装するPythonモジュール
        category: 
          type: string
          description: ノードのカテゴリ
        output_node: 
          type: boolean
          description: これが出力ノードかどうか
        output_tooltips: 
          type: array
          items: 
            type: string
          description: 出力のツールチップ
        deprecated: 
          type: boolean
          description: ノードが非推奨かどうか
        experimental: 
          type: boolean
          description: ノードが実験的かどうか
        api_node: 
          type: boolean
          description: これがAPIノードかどうか
    GlobalSubgraphInfo: 
      type: object
      description: グローバルサブグラフブループリントのメタデータ（完全なデータなし）
      required: 
        - source
        - name
        - info
      properties: 
        source: 
          type: string
          description: "サブグラフのソースタイプ - \"templates\"はワークフローテンプレート、\"custom_node\"はカスタムノードサブグラフ"
        name: 
          type: string
          description: サブグラフブループリントの表示名
        info: 
          type: object
          description: サブグラフに関する追加情報
          required: 
            - node_pack
          properties: 
            node_pack: 
              type: string
              description: このサブグラフを提供するノードパック/モジュール
        data: 
          type: string
          description: 完全なサブグラフJSONデータ（リスト表示では空の可能性あり）
    GlobalSubgraphData: 
      type: object
      description: グローバルサブグラフブループリントの完全なデータ
      required: 
        - source
        - name
        - info
        - data
      properties: 
        source: 
          type: string
          description: "サブグラフのソースタイプ - \"templates\"はワークフローテンプレート、\"custom_node\"はカスタムノードサブグラフ"
        name: 
          type: string
          description: サブグラフブループリントの表示名
        info: 
          type: object
          description: サブグラフに関する追加情報
          required: 
            - node_pack
          properties: 
            node_pack: 
              type: string
              description: このサブグラフを提供するノードパック/モジュール
        data: 
          type: string
          description: 完全なサブグラフJSONデータ（文字列）
    HistoryResponse: 
      type: object
      description: "履歴配列を含む実行履歴レスポンス。\n\"history\"キーを持つオブジェクトを返し、その値は履歴エントリの配列です。\n各エントリには、実行データとともにプロパティとしてprompt_idが含まれます。"
      required: 
        - history
      properties: 
        history: 
          type: array
          description: 作成時間順（最新が最初）に並べられた履歴エントリの配列
          items: 
            $ref: "#/components/schemas/HistoryEntry"
    HistoryEntry: 
      type: object
      description: プロンプトIDと実行データを含む履歴エントリ
      required: 
        - prompt_id
      properties: 
        prompt_id: 
          type: string
          description: このプロンプト実行の一意の識別子
        create_time: 
          type: integer
          format: int64
          description: ジョブ作成タイムスタンプ（UNIXタイムスタンプ、ミリ秒）
        workflow_id: 
          type: string
          description: ワークフローグラフ定義を識別するUUID
        prompt: 
          type: object
          description: フィルタリングされたプロンプト実行データ（軽量形式）
          properties: 
            priority: 
              type: number
              format: double
              description: 実行優先度
            prompt_id: 
              type: string
              description: プロンプトID
            extra_data: 
              type: object
              description: 追加の実行データ（extra_pnginfoからワークフローを除去）
              additionalProperties: true
        outputs: 
          type: object
          description: 実行からの出力データ（生成済み画像、ファイルなど）
          additionalProperties: true
        status: 
          type: object
          description: 実行ステータスとタイムライン情報
          additionalProperties: true
        meta: 
          type: object
          description: 実行とノードに関するメタデータ
          additionalProperties: true
    HistoryDetailEntry: 
      type: object
      description: 完全なプロンプトデータを含む履歴エントリ
      properties: 
        prompt: 
          type: object
          description: 完全なプロンプト実行データ
          properties: 
            priority: 
              type: number
              format: double
              description: 実行優先度
            prompt_id: 
              type: string
              description: プロンプトID
            prompt: 
              type: object
              description: ワークフローノード
              additionalProperties: true
            extra_data: 
              type: object
              description: 追加の実行データ
              additionalProperties: true
            outputs_to_execute: 
              type: array
              items: 
                type: string
              description: 実行する出力ノード
        outputs: 
          type: object
          description: 実行からの出力データ（生成された画像、ファイルなど）
          additionalProperties: true
        status: 
          type: object
          description: 実行ステータスとタイムライン情報
          additionalProperties: true
        meta: 
          type: object
          description: 実行とノードに関するメタデータ
          additionalProperties: true
    HistoryDetailResponse: 
      type: object
      description: "特定のプロンプトに対する詳細な実行履歴レスポンス。\nprompt_idをキーとし、完全な履歴データを値として持つ辞書を返します。\n"
      additionalProperties: 
        $ref: "#/components/schemas/HistoryDetailEntry"
    QueueInfo: 
      type: object
      description: 保留中および実行中のジョブを含むキュー情報
      properties: 
        queue_running: 
          type: array
          description: 現在実行中のジョブアイテムの配列
          items: 
            $ref: "#/components/schemas/QueueItem"
        queue_pending: 
          type: array
          description: 保留中のジョブアイテムの配列（作成時間順、古い順）
          items: 
            $ref: "#/components/schemas/QueueItem"
    QueueItem: 
      type: array
      description: "キューアイテムのタプル形式: [job_number, prompt_id, workflow_json, output_node_ids, metadata]\n- [0] job_number (integer): キュー内の位置（1ベース）\n- [1] prompt_id (string): ジョブUUID\n- [2] workflow_json (object): 完全なComfyUIワークフロー\n- [3] output_node_ids (array): 結果を返すノードID\n- [4] metadata (object): {create_time: <ミリ秒>} を含む\n"
      items: 
        oneOf: 
          - type: integer
            description: ジョブ番号（キュー内の位置）
          - type: string
            description: プロンプトID（UUID）
          - type: object
            description: ワークフローJSON
          - type: array
            items: 
              type: string
            description: 出力ノードID
          - type: object
            description: create_timeを含むメタデータ
    QueueManageRequest: 
      type: object
      description: キュー操作を管理するリクエスト
      properties: 
        delete: 
          type: array
          items: 
            type: string
          description: キャンセルする保留中のジョブIDの配列
        clear: 
          type: boolean
          description: trueの場合、キューから保留中のジョブをすべてクリアします
      additionalProperties: false
    QueueManageResponse: 
      type: object
      properties: 
        deleted: 
          type: array
          items: 
            type: string
          description: 正常にキャンセルされたジョブIDの配列
        cleared: 
          type: boolean
          description: キューがクリアされたかどうか
    JobStatusResponse: 
      type: object
      description: ジョブステータス情報
      properties: 
        id: 
          type: string
          format: uuid
          description: ジョブID
        status: 
          type: string
          enum: 
            - waiting_to_dispatch
            - pending
            - in_progress
            - completed
            - error
            - cancelled
          description: 現在のジョブステータス
        created_at: 
          type: string
          format: date-time
          description: ジョブが作成された日時
        updated_at: 
          type: string
          format: date-time
          description: ジョブの最終更新日時
        last_state_update: 
          type: string
          format: date-time
          description: ジョブステータスが最後に変更された日時
        assigned_inference: 
          type: string
          nullable: true
          description: このジョブに割り当てられた推論インスタンス（ある場合）
        error_message: 
          type: string
          nullable: true
          description: ジョブが失敗した場合のエラーメッセージ
      required: 
        - id
        - status
        - created_at
        - updated_at
    HistoryManageRequest: 
      type: object
      description: 履歴操作を管理するリクエスト
      properties: 
        delete: 
          type: array
          items: 
            type: string
          description: 履歴から削除するジョブIDの配列
        clear: 
          type: boolean
          description: trueの場合、認証済みユーザーのすべての履歴をクリアします
      additionalProperties: false
    UserDataResponse: 
      oneOf: 
        - $ref: "#/components/schemas/UserDataResponseFull"
        - $ref: "#/components/schemas/UserDataResponseShort"
    UserDataResponseFull: 
      type: object
      properties: 
        path: 
          type: string
        size: 
          type: integer
        modified: 
          type: string
          format: date-time
    UserDataResponseShort: 
      type: string
    GetUserDataResponseFull: 
      type: array
      items: 
        $ref: "#/components/schemas/GetUserDataResponseFullFile"
    GetUserDataResponseFullFile: 
      type: object
      properties: 
        path: 
          type: string
          description: ファイル名またはユーザーディレクトリからの相対パス。
        size: 
          type: integer
          description: ファイルサイズ（バイト）。
        modified: 
          type: number
          format: float
          description: 最終更新のUNIXタイムスタンプ。
    PromptErrorResponse: 
      type: object
      description: ComfyUIプロンプト実行のエラーレスポンス。
      additionalProperties: true
    ModelFolder: 
      type: object
      description: モデルを含むフォルダーを表します
      required: 
        - name
        - folders
      properties: 
        name: 
          type: string
          description: モデルフォルダーの名前
          example: checkpoints
        folders: 
          type: array
          items: 
            type: string
          description: このタイプのモデルが保存されているパスのリスト
          example: 
            - checkpoints
    ModelFile: 
      type: object
      description: メタデータ付きのモデルファイルを表します
      required: 
        - name
        - pathIndex
      properties: 
        name: 
          type: string
          description: モデルのファイル名
          example: model.safetensors
        pathIndex: 
          type: integer
          description: このモデルが配置されているパスのインデックス
          example: 0
    SystemStatsResponse: 
      type: object
      description: システム統計レスポンス
      required: 
        - system
        - devices
      properties: 
        system: 
          type: object
          required: 
            - os
            - python_version
            - embedded_python
            - comfyui_version
            - pytorch_version
            - argv
            - ram_total
            - ram_free
          properties: 
            os: 
              type: string
              description: オペレーティングシステム
            python_version: 
              type: string
              description: Python バージョン
            embedded_python: 
              type: boolean
              description: 組み込みPythonを使用しているかどうか
            comfyui_version: 
              type: string
              description: ComfyUI バージョン
            comfyui_frontend_version: 
              type: string
              description: ComfyUI フロントエンドバージョン（コミットハッシュまたはタグ）
            workflow_templates_version: 
              type: string
              description: ワークフローテンプレートのバージョン
            cloud_version: 
              type: string
              description: クラウド取り込みサービスのバージョン（コミットハッシュ）
            pytorch_version: 
              type: string
              description: PyTorch バージョン
            argv: 
              type: array
              items: 
                type: string
              description: コマンドライン引数
            ram_total: 
              type: number
              description: 合計RAM（バイト単位）
            ram_free: 
              type: number
              description: 空きRAM（バイト単位）
        devices: 
          type: array
          items: 
            type: object
            required: 
              - name
              - type
            properties: 
              name: 
                type: string
                description: デバイス名
              type: 
                type: string
                description: デバイスタイプ
              vram_total: 
                type: number
                description: 合計VRAM（バイト単位）
              vram_free: 
                type: number
                description: 空きVRAM（バイト単位）
    UserResponse: 
      type: object
      description: ユーザー情報レスポンス
      required: 
        - status
      properties: 
        status: 
          type: string
          description: ユーザーステータス（アクティブまたはウェイトリスト）
    Asset: 
      type: object
      required: 
        - id
        - name
        - size
        - created_at
        - updated_at
      properties: 
        id: 
          type: string
          format: uuid
          description: アセットの一意な識別子
        name: 
          type: string
          description: アセットファイルの名前
        asset_hash: 
          type: string
          description: アセットコンテンツのBlake3ハッシュ
          pattern: "^blake3:[a-f0-9]{64}$"
        size: 
          type: integer
          format: int64
          description: アセットのサイズ（バイト単位）
        mime_type: 
          type: string
          description: アセットのMIMEタイプ
        tags: 
          type: array
          items: 
            type: string
          description: アセットに関連付けられたタグ
        user_metadata: 
          type: object
          description: アセットのカスタムユーザーメタデータ
          additionalProperties: true
        preview_url: 
          type: string
          format: uri
          description: アセットのプレビュー/サムネイルのURL
        preview_id: 
          type: string
          format: uuid
          description: 利用可能な場合のプレビューアセットのID
          nullable: true
        prompt_id: 
          type: string
          format: uuid
          description: このアセットを作成したジョブ/プロンプトのID（利用可能な場合）
          nullable: true
        created_at: 
          type: string
          format: date-time
          description: アセット作成時のタイムスタンプ
        updated_at: 
          type: string
          format: date-time
          description: アセットの最終更新時刻のタイムスタンプ
        last_access_time: 
          type: string
          format: date-time
          description: アセットの最終アクセス時刻のタイムスタンプ
        is_immutable: 
          type: boolean
          description: このアセットが不変であるかどうか（変更または削除不可）
    AssetCreated: 
      allOf: 
        - $ref: "#/components/schemas/Asset"
        - type: object
          required: 
            - created_new
          properties: 
            created_new: 
              type: boolean
              description: これが新しいアセットの作成であるか（true）または既存のものが返されたか（false）
    AssetUpdated: 
      type: object
      required: 
        - id
        - updated_at
      properties: 
        id: 
          type: string
          format: uuid
          description: アセットID
        name: 
          type: string
          description: 更新されたアセットの名前
        asset_hash: 
          type: string
          description: アセットコンテンツのBlake3ハッシュ
          pattern: "^blake3:[a-f0-9]{64}$"
        tags: 
          type: array
          items: 
            type: string
          description: 更新されたアセットのタグ
        mime_type: 
          type: string
          description: 更新されたアセットのMIMEタイプ
        user_metadata: 
          type: object
          description: 更新されたカスタムメタデータ
          additionalProperties: true
        updated_at: 
          type: string
          format: date-time
          description: 更新のタイムスタンプ
    ListAssetsResponse: 
      type: object
      required: 
        - assets
        - total
        - has_more
      properties: 
        assets: 
          type: array
          items: 
            $ref: "#/components/schemas/Asset"
          description: クエリに一致するアセットのリスト
        total: 
          type: integer
          description: フィルターに一致するアセットの総数
        has_more: 
          type: boolean
          description: このページを超えてさらにアセットが利用可能かどうか
    TagInfo: 
      type: object
      required: 
        - name
        - count
      properties: 
        name: 
          type: string
          description: タグ名
        count: 
          type: integer
          description: このタグを使用しているアセットの数
    ListTagsResponse: 
      type: object
      required: 
        - tags
        - total
        - has_more
      properties: 
        tags: 
          type: array
          items: 
            $ref: "#/components/schemas/TagInfo"
          description: タグのリスト
        total: 
          type: integer
          description: タグの総数
        has_more: 
          type: boolean
          description: さらにタグが利用可能かどうか
    AssetTagHistogramResponse: 
      type: object
      required: 
        - tag_counts
      properties: 
        tag_counts: 
          type: object
          additionalProperties: 
            type: integer
          description: タグ名と一致するアセット上の出現回数のマップ
          example: 
            checkpoint: 32
            lora: 193
            vae: 6
    AssetMetadataResponse: 
      type: object
      required: 
        - content_length
      properties: 
        content_length: 
          type: integer
          format: int64
          description: アセットのサイズ（バイト単位、不明の場合は-1）
          example: 4294967296
        content_type: 
          type: string
          description: アセットのMIMEタイプ
          example: application/octet-stream
        filename: 
          type: string
          description: ソースからのアセットの推奨ファイル名
          example: realistic-vision-v5.safetensors
        name: 
          type: string
          description: ソースからのアセットの表示名またはタイトル
          example: Realistic Vision v5.0
        tags: 
          type: array
          items: 
            type: string
          description: ソースからの分類用タグ
          example: 
            - models
            - checkpoint
        preview_image: 
          type: string
          description: base64エンコードされたデータURLとしての画像プレビュー
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        validation: 
          $ref: "#/components/schemas/ValidationResult"
          description: ファイルの検証結果
    AssetDownloadResponse: 
      type: object
      required: 
        - task_id
        - status
      properties: 
        task_id: 
          type: string
          format: uuid
          description: "GET /api/tasks/{task_id} を介したダウンロード進行状況追跡用のタスクID"
        status: 
          type: string
          enum: 
            - created
            - running
            - completed
            - failed
          description: 現在のタスクステータス
        message: 
          type: string
          description: 人間が読めるメッセージ
          example: Download task created. Use task_id to track progress.
    ValidationResult: 
      type: object
      required: 
        - is_valid
      properties: 
        is_valid: 
          type: boolean
          description: 全体的な検証ステータス（すべてのチェックに合格した場合はtrue）
          example: true
        errors: 
          type: array
          items: 
            $ref: "#/components/schemas/ValidationError"
          description: ダウンロードを妨げるブロッキング検証エラー
        warnings: 
          type: array
          items: 
            $ref: "#/components/schemas/ValidationError"
          description: 非ブロッキング検証警告（情報提供のみ）
    ValidationError: 
      type: object
      required: 
        - code
        - message
        - field
      properties: 
        code: 
          type: string
          description: 機械可読なエラーコード
          example: FORMAT_NOT_ALLOWED
        message: 
          type: string
          description: 人間可読なエラーメッセージ
          example: "File format \"PickleTensor\" is not allowed. Allowed formats: [SafeTensor]"
        field: 
          type: string
          description: 検証に失敗したフィールド
          example: format
    TagsModificationResponse: 
      type: object
      required: 
        - total_tags
      properties: 
        added: 
          type: array
          items: 
            type: string
          description: 正常に追加されたタグ（追加操作用）
        removed: 
          type: array
          items: 
            type: string
          description: 正常に削除されたタグ（削除操作用）
        already_present: 
          type: array
          items: 
            type: string
          description: 既に存在していたタグ（追加操作用）
        not_present: 
          type: array
          items: 
            type: string
          description: 存在しなかったタグ（削除操作用）
        total_tags: 
          type: array
          items: 
            type: string
          description: 操作後のアセット上のすべてのタグ
    JobsListResponse: 
      type: object
      required: 
        - jobs
        - pagination
      properties: 
        jobs: 
          type: array
          description: 指定された並び替えフィールドで並べられたジョブの配列
          items: 
            $ref: "#/components/schemas/JobEntry"
        pagination: 
          $ref: "#/components/schemas/PaginationInfo"
    JobEntry: 
      type: object
      description: リスト表示用の軽量ジョブデータ（ワークフローと完全な出力は除外）
      required: 
        - id
        - status
        - create_time
      properties: 
        id: 
          type: string
          format: uuid
          description: 一意のジョブ識別子
        status: 
          type: string
          enum: 
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
          description: ユーザーフレンドリーなジョブステータス
        execution_error: 
          $ref: "#/components/schemas/ExecutionError"
          description: ComfyUIからの詳細な実行エラー（構造化エラーデータがある失敗ジョブのみ）
        create_time: 
          type: integer
          format: int64
          description: ジョブ作成タイムスタンプ（秒単位のUnixタイムスタンプ）
        preview_output: 
          type: object
          description: プライマリ出力のプレビュー（ターミナル状態のみ存在）
          additionalProperties: true
        outputs_count: 
          type: integer
          description: 出力ファイルの総数（非ターミナル状態では省略）
        workflow_id: 
          type: string
          description: ワークフローグラフ定義を識別するUUID
        execution_start_time: 
          type: integer
          format: int64
          description: ワークフロー実行開始タイムスタンプ（ミリ秒単位のUnixタイムスタンプ、ターミナル状態のみ存在）
        execution_end_time: 
          type: integer
          format: int64
          description: ワークフロー実行完了タイムスタンプ（ミリ秒単位のUnixタイムスタンプ、ターミナル状態のみ存在）
    JobDetailResponse: 
      type: object
      description: ワークフローと出力を含む完全なジョブ詳細
      required: 
        - id
        - status
        - create_time
        - update_time
      properties: 
        id: 
          type: string
          format: uuid
          description: 一意のジョブ識別子
        status: 
          type: string
          enum: 
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
          description: ユーザーフレンドリーなジョブステータス
        workflow: 
          type: object
          description: 完全なComfyUIワークフロー（10〜100KB、利用不可の場合は省略）
          additionalProperties: true
        execution_error: 
          $ref: "#/components/schemas/ExecutionError"
          description: ComfyUIからの詳細な実行エラー（構造化エラーデータがある失敗ジョブのみ）
        create_time: 
          type: integer
          format: int64
          description: ジョブ作成タイムスタンプ（秒単位のUnixタイムスタンプ）
        update_time: 
          type: integer
          format: int64
          description: 最終更新タイムスタンプ（秒単位のUnixタイムスタンプ）
        outputs: 
          type: object
          description: ComfyUIからの完全な出力オブジェクト（ターミナル状態のみ）
          additionalProperties: true
        preview_output: 
          type: object
          description: プライマリ出力のプレビュー（ターミナル状態のみ）
          additionalProperties: true
        outputs_count: 
          type: integer
          description: 出力ファイルの総数（非ターミナル状態では省略）
        workflow_id: 
          type: string
          description: ワークフローグラフ定義を識別するUUID
        execution_status: 
          type: object
          description: ComfyUI実行ステータスとタイムライン（ターミナル状態のみ）
          additionalProperties: true
        execution_meta: 
          type: object
          description: ノードレベルの実行メタデータ（ターミナル状態のみ）
          additionalProperties: true
    ExecutionError: 
      type: object
      description: ComfyUIからの詳細な実行エラー情報
      required: 
        - node_id
        - node_type
        - exception_message
        - exception_type
        - traceback
        - current_inputs
        - current_outputs
      properties: 
        node_id: 
          type: string
          description: 失敗したノードのID
        node_type: 
          type: string
          description: "ノードのタイプ名（例: \"KSampler\"）"
        exception_message: 
          type: string
          description: 人間が読めるエラーメッセージ
        exception_type: 
          type: string
          description: "Pythonの例外タイプ（例: \"RuntimeError\"）"
        traceback: 
          type: array
          items: 
            type: string
          description: トレースバック行の配列（利用不可の場合は空の配列）
        current_inputs: 
          type: object
          additionalProperties: true
          description: 障害発生時の入力値（利用不可の場合は空のオブジェクト）
        current_outputs: 
          type: object
          additionalProperties: true
          description: 失敗時の出力値（利用不可の場合は空オブジェクト）
    PaginationInfo: 
      type: object
      required: 
        - offset
        - limit
        - total
        - has_more
      properties: 
        offset: 
          type: integer
          minimum: 0
          description: 現在のオフセット（0ベース）
        limit: 
          type: integer
          minimum: 1
          description: 1ページあたりのアイテム数
        total: 
          type: integer
          minimum: 0
          description: フィルターに一致するアイテムの総数
        has_more: 
          type: boolean
          description: このページ以降にさらにアイテムがあるかどうか
    WebSocketMessage: 
      type: object
      description: "すべてのWebSocketメッセージの基本構造。メッセージはJSONで、タイプフィールドがメッセージタイプを示し、データフィールドにタイプ固有のペイロードが含まれます。\n"
      required: 
        - type
      properties: 
        type: 
          $ref: "#/components/schemas/WebSocketMessageType"
        data: 
          type: object
          description: メッセージペイロード（構造はタイプによって異なります）
          additionalProperties: true
    WebSocketMessageType: 
      type: string
      description: "WebSocketメッセージのタイプ。これらはComfyUIのネイティブメッセージタイプに対応しています。\n"
      enum: 
        - status
        - execution_start
        - execution_cached
        - executing
        - progress
        - progress_state
        - executed
        - execution_success
        - execution_error
        - execution_interrupted
    WebSocketStatusMessage: 
      type: object
      description: "キュー状態の更新。キュー状態が変更されたときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - status
        data: 
          type: object
          properties: 
            status: 
              type: object
              properties: 
                exec_info: 
                  type: object
                  properties: 
                    queue_remaining: 
                      type: integer
                      description: このユーザーのキューに残っているジョブ数
            sid: 
              type: string
              description: セッションID（初期接続時のみ）
    WebSocketExecutionStartMessage: 
      type: object
      description: "ワークフローの実行が開始されたときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_start
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
              description: 実行を開始したジョブ/プロンプトID
    WebSocketExecutingMessage: 
      type: object
      description: "特定のノードが実行を開始したときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - executing
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 現在実行中のノードID（実行完了時はnull）
            display_node: 
              type: string
              description: 表示ノードID（グループ化されたノードの場合はノードと異なる場合があります）
    WebSocketProgressMessage: 
      type: object
      description: "ノード内のステップごとの進行状況（例：拡散サンプリングステップ）。\n"
      properties: 
        type: 
          type: string
          enum: 
            - progress
        data: 
          type: object
          required: 
            - prompt_id
            - node
            - value
            - max
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 進行状況を表示しているノードID
            value: 
              type: integer
              description: 現在のステップ番号
            max: 
              type: integer
              description: ステップの総数
    WebSocketProgressStateMessage: 
      type: object
      description: "詳細なノードメタデータを含む拡張進行状態。\nよりシンプルな`progress`メッセージよりもリッチなコンテキストを提供します。\n"
      properties: 
        type: 
          type: string
          enum: 
            - progress_state
        data: 
          type: object
          properties: 
            prompt_id: 
              type: string
              format: uuid
            nodes: 
              type: object
              description: ノードIDとその進行状態のマップ
              additionalProperties: 
                type: object
                properties: 
                  node_id: 
                    type: string
                  display_node_id: 
                    type: string
                  real_node_id: 
                    type: string
                  prompt_id: 
                    type: string
                  class_type: 
                    type: string
                    description: "ノードのクラスタイプ（例：\"KSampler\"）"
    WebSocketExecutedMessage: 
      type: object
      description: "ノードが出力を伴って実行を完了したときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - executed
        data: 
          type: object
          required: 
            - prompt_id
            - node
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 完了したノードID
            display_node: 
              type: string
              description: 表示ノードID
            output: 
              type: object
              description: "ノード出力。構造はノードタイプによって異なります。\n画像出力の場合: { \"images\": [{\"filename\": \"...\", \"subfolder\": \"\", \"type\": \"output\"}] }\nビデオ出力の場合: { \"video\": [{\"filename\": \"...\", \"subfolder\": \"\", \"type\": \"output\"}] }\n"
              additionalProperties: true
    WebSocketExecutionSuccessMessage: 
      type: object
      description: "ワークフロー全体が正常に完了したときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_success
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
    WebSocketExecutionErrorMessage: 
      type: object
      description: "ワークフローの実行がエラーで失敗したときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_error
        data: 
          type: object
          required: 
            - prompt_id
            - exception_message
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node_id: 
              type: string
              description: エラーが発生したノードID（該当する場合）
            node_type: 
              type: string
              description: エラーが発生したノードのタイプ
            exception_type: 
              type: string
              description: "エラーの分類。一般的なタイプ:\n- ValidationError: 無効なワークフローまたは入力\n- ModelDownloadError: 必要なモデルのダウンロードに失敗\n- OOMError: GPUメモリ不足\n- InsufficientFundsError: アカウント残高が不足しています\n- InactiveSubscriptionError: サブスクリプションがアクティブではありません\n"
              enum: 
                - ValidationError
                - ModelDownloadError
                - ImageDownloadError
                - OOMError
                - PanicError
                - ServiceError
                - WebSocketError
                - DispatcherError
                - InsufficientFundsError
                - InactiveSubscriptionError
            exception_message: 
              type: string
              description: 人間が読めるエラーメッセージ
            traceback: 
              type: array
              items: 
                type: string
              description: スタックトレース行（デバッグ用）
            executed: 
              type: array
              items: 
                type: string
              description: エラーが発生する前に完了したノードID
            current_inputs: 
              type: object
              description: 失敗時の入力値
              additionalProperties: true
            current_outputs: 
              type: object
              description: 失敗時の出力値
              additionalProperties: true
    WebSocketExecutionCachedMessage: 
      type: object
      description: "ノードがその出力がキャッシュされているためにスキップされたときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_cached
        data: 
          type: object
          required: 
            - prompt_id
            - nodes
          properties: 
            prompt_id: 
              type: string
              format: uuid
            nodes: 
              type: array
              items: 
                type: string
              description: キャッシュから提供されたノードIDのリスト
    WebSocketExecutionInterruptedMessage: 
      type: object
      description: "ワークフローの実行がキャンセルまたは中断されたときに送信されます。\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_interrupted
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
