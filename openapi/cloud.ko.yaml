    HistoryResponse: 
      type: object
      description: "히스토리 배열이 포함된 실행 히스토리 응답.\n히스토리 항목 배열을 포함하는 \"history\" 키가 있는 객체를 반환합니다.\n각 항목에는 실행 데이터와 함께 prompt_id 속성이 포함됩니다.\n"
      required: 
        - history
      properties: 
        history: 
          type: array
          description: 생성 시간 순으로 정렬된 히스토리 항목 배열 (최신순)
          items: 
            $ref: "#/components/schemas/HistoryEntry"
    HistoryEntry: 
      type: object
      description: prompt_id 및 실행 데이터가 포함된 히스토리 항목
      required: 
        - prompt_id
      properties: 
        prompt_id: 
          type: string
          description: 이 프롬프트 실행에 대한 고유 식별자
        create_time: 
          type: integer
          format: int64
          description: 작업 생성 타임스탬프 (밀리초 단위의 UNIX 타임스탬프)
        workflow_id: 
          type: string
          description: 워크플로 그래프 정의를 식별하는 UUID
        prompt: 
          type: object
          description: 필터링된 프롬프트 실행 데이터 (경량 형식)
          properties: 
            priority: 
              type: number
              format: double
              description: 실행 우선순위
            prompt_id: 
              type: string
              description: 프롬프트 ID
            extra_data: 
              type: object
              description: 추가 실행 데이터 (extra_pnginfo에서 워크플로가 제거됨)
              additionalProperties: true
        outputs: 
          type: object
          description: "실행에서 생성된 이미지, 파일 등의 출력 데이터"
          additionalProperties: true
        status: 
          type: object
          description: 실행 상태 및 타임라인 정보
          additionalProperties: true
        meta: 
          type: object
          description: 실행 및 노드에 대한 메타데이터
          additionalProperties: true
    HistoryDetailEntry: 
      type: object
      description: 전체 프롬프트 데이터가 포함된 히스토리 항목
      properties: 
        prompt: 
          type: object
          description: 전체 프롬프트 실행 데이터
          properties: 
            priority: 
              type: number
              format: double
              description: 실행 우선순위
            prompt_id: 
              type: string
              description: 프롬프트 ID
            prompt: 
              type: object
              description: 워크플로 노드
              additionalProperties: true
            extra_data: 
              type: object
              description: 추가 실행 데이터
              additionalProperties: true
            outputs_to_execute: 
              type: array
              items: 
                type: string
              description: 실행할 출력 노드
        outputs: 
          type: object
          description: "실행의 출력 데이터 (생성된 이미지, 파일 등)"
          additionalProperties: true
        status: 
          type: object
          description: 실행 상태 및 타임라인 정보
          additionalProperties: true
        meta: 
          type: object
          description: 실행 및 노드에 대한 메타데이터
          additionalProperties: true
    HistoryDetailResponse: 
      type: object
      description: "특정 프롬프트에 대한 상세 실행 히스토리 응답.\nprompt_id를 키로, 전체 히스토리 데이터를 값으로 하는 사전을 반환합니다.\n"
      additionalProperties: 
        $ref: "#/components/schemas/HistoryDetailEntry"
    QueueInfo: 
      type: object
      description: 대기 중 및 실행 중인 작업이 포함된 실행 대기열 정보
      properties: 
        queue_running: 
          type: array
          description: 현재 실행 중인 작업 항목 배열
          items: 
            $ref: "#/components/schemas/QueueItem"
        queue_pending: 
          type: array
          description: "대기 중인 작업 항목 배열(생성 시간 순, 가장 오래된 항목 먼저)"
          items: 
            $ref: "#/components/schemas/QueueItem"
    QueueItem: 
      type: array
      description: "실행 대기열 항목 튜플 형식: [job_number, prompt_id, workflow_json, output_node_ids, metadata]\n- [0] job_number (정수): 실행 대기열 내 위치(1부터 시작)\n- [1] prompt_id (문자열): 작업 UUID\n- [2] workflow_json (객체): 전체 ComfyUI 워크플로\n- [3] output_node_ids (배열): 결과를 반환할 노드 ID\n- [4] metadata (객체): {create_time: <밀리초>} 포함\n"
      items: 
        oneOf: 
          - type: integer
            description: 작업 번호(실행 대기열 내 위치)
          - type: string
            description: 프롬프트 ID(UUID)
          - type: object
            description: 워크플로 JSON
          - type: array
            items: 
              type: string
            description: 출력 노드 ID
          - type: object
            description: create_time이 포함된 메타데이터
    QueueManageRequest: 
      type: object
