          description: 취소할 대기 중인 작업 ID 배열
        clear: 
          type: boolean
          description: 참이면 실행 대기열에서 대기 중인 모든 작업을 지웁니다
      additionalProperties: false
    QueueManageResponse: 
      type: object
      properties: 
        deleted: 
          type: array
