        - job
      summary: 현재 실행 중인 작업 중단
      description: "인증된 사용자의 현재 **실행 중**인 모든 작업을 취소합니다.\n이 기능은 현재 'in_progress' 상태인 모든 작업을 중단합니다.\n참고: 이 엔드포인트는 실행 중인 작업에만 영향을 미칩니다. 대기 중인 작업을 취소하려면 /api/queue를 사용하세요.\n"
      operationId: interruptJob
      responses: 
        "200": 
          description: "성공: 작업이 중단되었거나 실행 중인 작업이 없음"
        "401": 
          description: "인증 실패: 인증이 필요합니다."
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 내부 서버 오류
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  /api/userdata: 
    get: 
      tags: 
        - user
      operationId: getUserdata
      summary: 사용자 데이터 파일 나열
      description: 지정된 디렉터리의 사용자 데이터 파일 목록을 반환합니다. 선택적으로 재귀적으로 검색하거나 전체 메타데이터를 포함할 수 있습니다.
      parameters: 
        - name: dir
          in: query
          required: true
          description: "파일을 나열할 디렉터리 경로. 마지막에 슬래시를 포함해야 합니다.\n예: \"워크플로/\" 또는 \"설정/\"\n"
          schema: 
            type: string
          example: workflows/
        - name: recurse
          in: query
          required: false
          description: 참이면 하위 디렉터리의 파일도 포함합니다. 그렇지 않으면 지정된 디렉터리에 있는 파일만 나열합니다.
          schema: 
            type: boolean
            default: false
        - name: split
          in: query
          required: false
          description: "파일 정보를 유형별로 분할할지 여부.\n**참고:** ComfyUI API 호환성을 위해 허용되지만 현재는 무시됩니다.\n"
          schema: 
            type: boolean
            default: false
        - name: full_info
          in: query
          required: false
          description: "전체 파일 메타데이터를 반환할지 여부.\n**참고:** ComfyUI API 호환성을 위해 허용되지만 현재는 무시됩니다(항상 전체 정보를 반환).\n"
          schema: 
            type: boolean
            default: false
      responses: 
        "200": 
          description: 사용자 데이터 파일 목록.
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/GetUserDataResponseFull"
        "400": 
          description: "잘못된 요청 (예: 잘못된 파일명)."
          content: 
            text/plain: 
              schema: 
                type: string
        "401": 
          description: 인증되지 않음.
          content: 
            text/plain: 
              schema: 
                type: string
        "404": 
          description: 파일을 찾을 수 없거나 잘못된 경로.
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: 일반 오류
          content: 
            text/plain: 
              schema: 
                type: string
  "/api/userdata/{file}": 
    get: 
      tags: 
        - user
      operationId: getUserdataFile
      summary: 사용자 데이터 파일 가져오기
      description: 요청한 사용자 데이터 파일이 존재하면 반환합니다.
      parameters: 
        - name: file
          in: path
          required: true
          description: 검색할 사용자 데이터의 파일 이름.
          schema: 
            type: string
      responses: 
        "200": 
          description: 파일을 성공적으로 검색했습니다.
          content: 
            application/octet-stream: 
              schema: 
                type: string
                format: binary
        "400": 
          description: "잘못된 요청 (예: 잘못된 파일명)."
          content: 
            text/plain: 
              schema: 
                type: string
        "401": 
          description: 인증되지 않음.
          content: 
            text/plain: 
              schema: 
                type: string
        "404": 
          description: 파일을 찾을 수 없거나 잘못된 경로.
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: 일반 오류
          content: 
            text/plain: 
              schema: 
                type: string
    post: 
      tags: 
        - user
      operationId: postUserdataFile
      summary: 사용자 데이터 파일 업로드 또는 업데이트
      description: "사용자 데이터 디렉토리에 파일을 업로드합니다. 선택적 쿼리 파라미터를 통해 덮어쓰기 동작 및 응답 세부 정보를 제어할 수 있습니다.\n"
      parameters: 
        - name: file
          in: path
          required: true
          description: 대상 파일 경로 (필요한 경우 URL 인코딩).
          schema: 
            type: string
        - name: overwrite
          in: query
          required: false
          description: "\"거짓\"이면 기존 파일 덮어쓰기를 방지합니다. 기본값은 \"참\"입니다."
          schema: 
            type: string
            enum: 
              - "true"
              - "false"
            default: "true"
        - name: full_info
          in: query
          required: false
          description: "\"참\"이면 자세한 파일 정보를 반환하고, \"거짓\"이면 상대 경로만 반환합니다."
          schema: 
            type: string
            enum: 
              - "true"
              - "false"
            default: "false"
      requestBody: 
        required: true
        content: 
          application/octet-stream: 
            schema: 
              type: string
              format: binary
      responses: 
        "200": 
          description: 파일 업로드 성공.
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/UserDataResponseFull"
        "400": 
          description: "'file' 파라미터 누락 또는 잘못됨."
          content: 
            text/plain: 
              schema: 
                type: string
        "401": 
          description: 인증되지 않음.
          content: 
            text/plain: 
              schema: 
                type: string
        "403": 
          description: 요청한 경로는 허용되지 않습니다.
          content: 
            text/plain: 
              schema: 
                type: string
        "409": 
          description: 파일이 이미 존재하며 덮어쓰기가 거짓으로 설정되어 있습니다.
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: 일반 오류
          content: 
            text/plain: 
              schema: 
                type: string
    delete: 
      tags: 
        - user
      operationId: deleteUserdataFile
      summary: 사용자 데이터 파일 삭제
      description: "데이터베이스에서 사용자 데이터 파일을 삭제합니다. 파일 파라미터는 사용자 데이터 디렉토리 내의 상대 경로여야 합니다.\n"
      parameters: 
        - name: file
          in: path
          required: true
          description: 삭제할 파일 경로 (필요한 경우 URL 인코딩).
          schema: 
            type: string
      responses: 
        "204": 
          description: 파일 삭제 성공 (콘텐츠 없음).
        "401": 
          description: 인증되지 않음.
          content: 
            text/plain: 
              schema: 
                type: string
        "404": 
          description: 파일을 찾을 수 없음.
          content: 
            text/plain: 
              schema: 
                type: string
        "500": 
          description: 내부 서버 오류.
          content: 
            text/plain: 
              schema: 
                type: string
  /api/upload/image: 
    post: 
      tags: 
        - file
      summary: 이미지 파일 업로드
      description: "클라우드 저장소에 이미지 파일을 업로드합니다.\n\n이미지 제한 사항:\n  - 최대 파일 크기: 50MB\n  - 각 변의 최대 너비/높이: 16384px\n  - 최대 총 픽셀 수: 64메가픽셀 (67108864 픽셀)\n\n이 제한을 초과하는 업로드는 HTTP 400으로 거부됩니다.\n"
      operationId: uploadImage
      requestBody: 
        required: true
        content: 
          multipart/form-data: 
            schema: 
              type: object
              required: 
                - image
              properties: 
                image: 
                  type: string
                  format: binary
                  description: 업로드할 이미지 파일
                overwrite: 
                  type: string
                  description: "기존 파일 덮어쓰기 여부 (참/거짓).\n**참고:** ComfyUI API 호환성을 위해 허용되지만 클라우드에서는 사실상 무시됩니다.\n클라우드는 콘텐츠 주소 지정 저장소(해시 기반 중복 제거)를 사용하므로, 동일한 콘텐츠는 항상 동일한 해시에 매핑됩니다.\n동일한 콘텐츠를 다시 업로드하는 것은 아무런 작업도 수행하지 않습니다.\n"
                subfolder: 
                  type: string
                  description: "선택적 하위 폴더 경로.\n**참고:** ComfyUI API 호환성을 위해 허용되지만 저장에는 **무시**됩니다.\n클라우드는 해시만으로 에셋을 저장합니다. 하위 폴더는 클라이언트 측 구성을 위해 응답에 반환되지만 서버 측 저장 경로에는 사용되지 않습니다.\n"
                type: 
                  type: string
                  description: "업로드 유형 (기본값: \"output\").\n**참고:** ComfyUI API 호환성을 위해 허용됩니다. 클라우드는 모든 업로드를 디렉토리 기반 구성이 아닌 태그가 있는 에셋으로 저장합니다.\n"
      responses: 
        "200": 
          description: 이미지 업로드 성공
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  name: 
                    type: string
                    description: 업로드된 이미지의 파일 이름
                  subfolder: 
                    type: string
                    description: 이미지가 저장된 하위 폴더 경로
                  type: 
                    type: string
                    description: "업로드 유형 (예: \"output\")"
        "400": 
          description: 잘못된 요청
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 인증되지 않음
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 내부 서버 오류
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  /api/upload/mask: 
    post: 
      tags: 
        - file
      summary: 마스크 이미지 업로드
      description: "기존 이미지에 적용할 마스크 이미지를 업로드합니다.\n\n이미지 제한 사항은 업로드된 마스크와 참조된 원본 이미지 모두에 적용됩니다:\n  - 최대 파일 크기: 50 MB\n  - 에지당 최대 너비/높이: 16384 px\n  - 최대 총 픽셀 수: 64 메가픽셀 (67108864 픽셀)\n\n이러한 제한을 초과하는 업로드는 HTTP 400으로 거부됩니다.\n"
      operationId: uploadMask
      requestBody: 
        required: true
        content: 
          multipart/form-data: 
            schema: 
              type: object
              required: 
                - image
                - original_ref
              properties: 
                image: 
                  type: string
                  format: binary
                  description: 업로드할 마스크 이미지 파일
                original_ref: 
                  type: string
                  description: 원본 이미지 참조를 포함하는 JSON 문자열
      responses: 
        "200": 
          description: 마스크 업로드 성공
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  name: 
                    type: string
                    description: 업로드된 마스크의 파일 이름
                  subfolder: 
                    type: string
                    description: 마스크가 저장된 하위 폴더 경로
                  type: 
                    type: string
                    description: "업로드 유형 (예: \"output\")"
                  metadata: 
                    type: object
                    description: 마스크 감지 및 재편집을 위한 추가 메타데이터
                    properties: 
                      is_mask: 
                        type: boolean
                        description: 이 파일이 마스크인지 여부
                      original_hash: 
                        type: string
                        description: 원본 언마스크 이미지의 해시
                      mask_type: 
                        type: string
                        description: "마스크 유형 (예: \"painted_masked\")"
                      related_files: 
                        type: object
                        description: 관련 마스크 레이어 파일 (있는 경우)
                        properties: 
                          mask: 
                            type: string
                            description: 마스크 레이어의 해시
                          paint: 
                            type: string
                            description: 페인트 레이어의 해시
                          painted: 
                            type: string
                            description: 페인트된 이미지의 해시
        "400": 
          description: 잘못된 요청
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 인증되지 않음
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 내부 서버 오류
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
