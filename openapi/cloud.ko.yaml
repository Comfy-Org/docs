          type: string
          description: base64로 인코딩된 데이터 URL 형태의 이미지 미리보기
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        validation: 
          $ref: "#/components/schemas/ValidationResult"
          description: 파일에 대한 검증 결과
    AssetDownloadResponse: 
      type: object
      required: 
        - task_id
        - status
      properties: 
        task_id: 
          type: string
          format: uuid
          description: "GET /api/tasks/{task_id}를 통해 다운로드 진행 상황을 추적하는 작업 ID"
        status: 
          type: string
          enum: 
            - created
            - running
            - completed
            - failed
          description: 현재 작업 상태
        message: 
          type: string
          description: 사람이 읽을 수 있는 메시지
          example: Download task created. Use task_id to track progress.
    ValidationResult: 
      type: object
      required: 
        - is_valid
      properties: 
        is_valid: 
          type: boolean
          description: 전체 검증 상태(모든 검사 통과 시 참)
          example: true
        errors: 
          type: array
          items: 
            $ref: "#/components/schemas/ValidationError"
          description: 다운로드를 차단하는 검증 오류
        warnings: 
          type: array
          items: 
            $ref: "#/components/schemas/ValidationError"
          description: 비차단 검증 경고(정보 제공용)
    ValidationError: 
      type: object
      required: 
        - code
        - message
        - field
      properties: 
        code: 
          type: string
          description: 기계 판독 가능 오류 코드
          example: FORMAT_NOT_ALLOWED
        message: 
          type: string
          description: 사람이 읽을 수 있는 오류 메시지
          example: "File format \"PickleTensor\" is not allowed. Allowed formats: [SafeTensor]"
        field: 
          type: string
          description: 검증에 실패한 필드
          example: format
    TagsModificationResponse: 
      type: object
      required: 
        - total_tags
      properties: 
        added: 
          type: array
          items: 
            type: string
          description: 성공적으로 추가된 태그(추가 작업의 경우)
        removed: 
          type: array
          items: 
            type: string
          description: 성공적으로 제거된 태그(제거 작업의 경우)
        already_present: 
          type: array
          items: 
            type: string
          description: 이미 존재했던 태그(추가 작업의 경우)
        not_present: 
          type: array
          items: 
            type: string
          description: 존재하지 않았던 태그(제거 작업의 경우)
        total_tags: 
          type: array
          items: 
            type: string
          description: 작업 후 에셋의 모든 태그
    JobsListResponse: 
      type: object
      required: 
        - jobs
        - pagination
      properties: 
        jobs: 
          type: array
          description: 지정된 정렬 필드에 따라 정렬된 작업 배열
          items: 
            $ref: "#/components/schemas/JobEntry"
        pagination: 
          $ref: "#/components/schemas/PaginationInfo"
    JobEntry: 
      type: object
      description: 목록 보기를 위한 경량 작업 데이터 (워크플로 및 전체 출력 제외)
      required: 
        - id
        - status
        - create_time
      properties: 
        id: 
          type: string
          format: uuid
          description: 고유 작업 식별자
        status: 
          type: string
          enum: 
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
          description: 사용자 친화적인 작업 상태
        execution_error: 
          $ref: "#/components/schemas/ExecutionError"
          description: ComfyUI의 상세 실행 오류 (구조화된 오류 데이터가 있는 실패한 작업에만 해당)
        create_time: 
          type: integer
          format: int64
          description: 작업 생성 타임스탬프 (초 단위 Unix 타임스탬프)
        preview_output: 
          type: object
          description: 기본 출력 미리보기 (터미널 상태에만 있음)
          additionalProperties: true
        outputs_count: 
          type: integer
          description: 출력 파일 총 개수 (비터미널 상태에서는 생략됨)
        workflow_id: 
          type: string
          description: 워크플로 그래프 정의를 식별하는 UUID
        execution_start_time: 
          type: integer
          format: int64
          description: "워크플로 실행 시작 타임스탬프 (Unix 밀리초, 터미널 상태에만 있음)"
        execution_end_time: 
          type: integer
          format: int64
          description: "워크플로 실행 완료 타임스탬프 (Unix 밀리초, 터미널 상태에만 있음)"
    JobDetailResponse: 
      type: object
      description: 워크플로 및 출력을 포함한 전체 작업 세부 정보
      required: 
        - id
        - status
        - create_time
        - update_time
      properties: 
        id: 
          type: string
          format: uuid
          description: 고유 작업 식별자
        status: 
          type: string
          enum: 
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
          description: 사용자 친화적인 작업 상태
        workflow: 
          type: object
          description: "전체 ComfyUI 워크플로 (10-100KB, 사용 불가 시 생략됨)"
          additionalProperties: true
        execution_error: 
          $ref: "#/components/schemas/ExecutionError"
          description: ComfyUI의 상세 실행 오류 (구조화된 오류 데이터가 있는 실패한 작업에만 해당)
        create_time: 
          type: integer
          format: int64
          description: 작업 생성 타임스탬프 (초 단위 Unix 타임스탬프)
        update_time: 
          type: integer
          format: int64
          description: 마지막 업데이트 타임스탬프 (초 단위 Unix 타임스탬프)
        outputs: 
          type: object
          description: ComfyUI의 전체 출력 객체 (터미널 상태에만 해당)
          additionalProperties: true
        preview_output: 
          type: object
          description: 기본 출력 미리보기 (터미널 상태에만 해당)
          additionalProperties: true
        outputs_count: 
          type: integer
          description: 출력 파일 총 개수 (비터미널 상태에서는 생략됨)
        workflow_id: 
          type: string
          description: 워크플로 그래프 정의를 식별하는 UUID
        execution_status: 
          type: object
          description: ComfyUI 실행 상태 및 타임라인 (터미널 상태에만 해당)
          additionalProperties: true
        execution_meta: 
          type: object
          description: 노드 수준 실행 메타데이터 (터미널 상태에만 해당)
          additionalProperties: true
    ExecutionError: 
      type: object
      description: ComfyUI의 상세한 실행 오류 정보
      required: 
        - node_id
        - node_type
        - exception_message
        - exception_type
        - traceback
        - current_inputs
        - current_outputs
      properties: 
        node_id: 
          type: string
          description: 실패한 노드의 ID
        node_type: 
          type: string
          description: "노드의 유형 이름 (예: \"KSampler\")"
        exception_message: 
          type: string
          description: 사람이 읽을 수 있는 오류 메시지
        exception_type: 
          type: string
          description: "Python 예외 유형 (예: \"RuntimeError\")"
        traceback: 
          type: array
          items: 
            type: string
          description: 역추적 라인의 배열 (사용 불가 시 빈 배열)
        current_inputs: 
          type: object
          additionalProperties: true
          description: 실패 시점의 입력 값 (사용 불가 경우 빈 객체)
        current_outputs: 
          type: object
          additionalProperties: true
          description: 실패 시점의 출력 값 (사용 불가 시 빈 객체)
    PaginationInfo: 
      type: object
      required: 
        - offset
        - limit
        - total
        - has_more
      properties: 
        offset: 
          type: integer
          minimum: 0
          description: 현재 오프셋(0부터 시작)
        limit: 
          type: integer
          minimum: 1
          description: 페이지당 항목 수
        total: 
          type: integer
          minimum: 0
          description: 필터와 일치하는 총 항목 수
        has_more: 
          type: boolean
          description: 이 페이지 이후에 추가 항목이 있는지 여부
    WebSocketMessage: 
      type: object
      description: "모든 WebSocket 메시지의 기본 구조. 메시지는 JSON이며, type 필드는 메시지 유형을 나타내고 data 필드는 유형별 페이로드를 포함합니다.\n"
      required: 
        - type
      properties: 
        type: 
          $ref: "#/components/schemas/WebSocketMessageType"
        data: 
          type: object
          description: 메시지 페이로드 (유형에 따라 구조가 다름)
          additionalProperties: true
    WebSocketMessageType: 
      type: string
      description: "WebSocket 메시지 유형. ComfyUI의 기본 메시지 유형과 일치합니다.\n"
      enum: 
        - status
        - execution_start
        - execution_cached
        - executing
        - progress
        - progress_state
        - executed
        - execution_success
        - execution_error
        - execution_interrupted
    WebSocketStatusMessage: 
      type: object
      description: "실행 대기열 상태 업데이트. 실행 대기열 상태가 변경될 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - status
        data: 
          type: object
          properties: 
            status: 
              type: object
              properties: 
                exec_info: 
                  type: object
                  properties: 
                    queue_remaining: 
                      type: integer
                      description: 이 사용자의 실행 대기열에 남은 작업 수
            sid: 
              type: string
              description: 세션 ID (초기 연결 시에만)
    WebSocketExecutionStartMessage: 
      type: object
      description: "워크플로 실행이 시작될 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_start
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
              description: 실행을 시작한 작업/프롬프트 ID
    WebSocketExecutingMessage: 
      type: object
      description: "특정 노드가 실행을 시작할 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - executing
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 현재 실행 중인 노드 ID(실행 완료 시 null)
            display_node: 
              type: string
              description: 표시 노드 ID(그룹화된 노드의 경우 노드와 다를 수 있음)
    WebSocketProgressMessage: 
      type: object
      description: "노드 내 단계별 진행 상황 (예: 확산 샘플링 단계).\n"
      properties: 
        type: 
          type: string
          enum: 
            - progress
        data: 
          type: object
          required: 
            - prompt_id
            - node
            - value
            - max
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 진행 상황을 표시하는 노드 ID
            value: 
              type: integer
              description: 현재 단계 번호
            max: 
              type: integer
              description: 전체 단계 수
    WebSocketProgressStateMessage: 
      type: object
      description: "자세한 노드 메타데이터가 포함된 확장된 진행 상태. 단순한 `progress` 메시지보다 더 풍부한 컨텍스트를 제공합니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - progress_state
        data: 
          type: object
          properties: 
            prompt_id: 
              type: string
              format: uuid
            nodes: 
              type: object
              description: 노드 ID를 해당 진행 상태에 매핑한 맵
              additionalProperties: 
                type: object
                properties: 
                  node_id: 
                    type: string
                  display_node_id: 
                    type: string
                  real_node_id: 
                    type: string
                  prompt_id: 
                    type: string
                  class_type: 
                    type: string
                    description: "노드의 클래스 유형 (예: \"KSampler\")"
    WebSocketExecutedMessage: 
      type: object
      description: "노드가 출력과 함께 실행을 완료할 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - executed
        data: 
          type: object
          required: 
            - prompt_id
            - node
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node: 
              type: string
              description: 완료된 노드 ID
            display_node: 
              type: string
              description: 표시 노드 ID
            output: 
              type: object
              description: "노드 출력. 구조는 노드 유형에 따라 다릅니다.\n이미지 출력의 예: { \"images\": [{\"filename\": \"...\", \"subfolder\": \"\", \"type\": \"output\"}] }\n비디오 출력의 예: { \"video\": [{\"filename\": \"...\", \"subfolder\": \"\", \"type\": \"output\"}] }\n"
              additionalProperties: true
    WebSocketExecutionSuccessMessage: 
      type: object
      description: "전체 워크플로가 성공적으로 완료되었을 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_success
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
    WebSocketExecutionErrorMessage: 
      type: object
      description: "워크플로 실행이 오류로 실패했을 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_error
        data: 
          type: object
          required: 
            - prompt_id
            - exception_message
          properties: 
            prompt_id: 
              type: string
              format: uuid
            node_id: 
              type: string
              description: 오류가 발생한 노드 ID (해당하는 경우)
            node_type: 
              type: string
              description: 오류가 발생한 노드 유형
            exception_type: 
              type: string
              description: "오류 분류. 일반적인 유형:\n- ValidationError: 잘못된 워크플로 또는 입력\n- ModelDownloadError: 필수 모델 다운로드 실패\n- OOMError: GPU 메모리 부족\n- InsufficientFundsError: 계정 잔액 부족\n- InactiveSubscriptionError: 구독이 활성화되지 않음\n"
              enum: 
                - ValidationError
                - ModelDownloadError
                - ImageDownloadError
                - OOMError
                - PanicError
                - ServiceError
                - WebSocketError
                - DispatcherError
                - InsufficientFundsError
                - InactiveSubscriptionError
            exception_message: 
              type: string
              description: 사람이 읽을 수 있는 오류 메시지
            traceback: 
              type: array
              items: 
                type: string
              description: 스택 트레이스 라인 (디버깅용)
            executed: 
              type: array
              items: 
                type: string
              description: 오류 이전에 완료된 노드 ID
            current_inputs: 
              type: object
              description: 실패 시 입력 값
              additionalProperties: true
            current_outputs: 
              type: object
              description: 실패 시 출력 값
              additionalProperties: true
    WebSocketExecutionCachedMessage: 
      type: object
      description: "출력이 캐시되어 노드가 건너뛰어질 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_cached
        data: 
          type: object
          required: 
            - prompt_id
            - nodes
          properties: 
            prompt_id: 
              type: string
              format: uuid
            nodes: 
              type: array
              items: 
                type: string
              description: 캐시에서 제공된 노드 ID 목록
    WebSocketExecutionInterruptedMessage: 
      type: object
      description: "워크플로 실행이 취소/중단되었을 때 전송됩니다.\n"
      properties: 
        type: 
          type: string
          enum: 
            - execution_interrupted
        data: 
          type: object
          required: 
            - prompt_id
          properties: 
            prompt_id: 
              type: string
              format: uuid
