            type: array
            items: 
              type: string
          style: form
          explode: false
        - name: exclude_tags
          in: query
          description: 이 태그 중 하나라도 가진 에셋을 제외합니다
          schema: 
            type: array
            items: 
              type: string
          style: form
          explode: false
        - name: name_contains
          in: query
          description: 이름에 이 부분 문자열을 포함하는 에셋 필터링 (대소문자 구분 없음)
          schema: 
            type: string
        - name: metadata_filter
          in: query
          description: 메타데이터 필드로 필터링하기 위한 JSON 객체
          schema: 
            type: string
        - name: limit
          in: query
          description: "반환할 최대 태그 수 (1-1000, 기본값 100)"
          schema: 
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: include_public
          in: query
          description: 결과에 공개/공유 에셋 포함 여부
          schema: 
            type: boolean
            default: true
      responses: 
        "200": 
          description: 성공 - 태그 히스토그램이 반환됨
          content: 
            application/json: 
              schema: 
