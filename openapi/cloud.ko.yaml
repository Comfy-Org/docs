              schema: 
                $ref: "#/components/schemas/ErrorResponse"
  "/api/assets/hash/{hash}": 
    head: 
      tags: 
        - asset
      summary: 해시로 에셋 존재 여부 확인
      description: "지정된 해시의 콘텐츠가 클라우드 스토리지에 존재하는지 확인합니다.\n콘텐츠가 존재하면 200을 반환하고, 없으면 404를 반환합니다.\n`/api/assets/from-hash`를 사용하기 전에 가용성을 확인하는 데 유용합니다.\n"
      operationId: checkAssetByHash
      parameters: 
        - name: hash
          in: path
          required: true
          description: "형식 'blake3:hex_digest'의 에셋 Blake3 해시"
          schema: 
            type: string
            pattern: "^blake3:[a-f0-9]{64}$"
            example: blake3:a1b2c3d4e5f6789012345678901234567890123456789012345678901234
      responses: 
        "200": 
          description: 에셋이 존재함
        "400": 
          description: 잘못된 해시 형식
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "401": 
          description: 인증되지 않음
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "404": 
          description: 에셋을 찾을 수 없음
        "500": 
          description: 내부 서버 오류
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
