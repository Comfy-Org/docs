          in: query
          description: 반환할 최대 태그 수 (1-1000)
          schema: 
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: 페이지 매김을 위해 건너뛸 태그 수
          schema: 
            type: integer
            minimum: 0
            default: 0
        - name: order
          in: query
          description: 태그 정렬 순서
          schema: 
            type: string
            enum: 
              - count_desc
              - name_asc
            default: count_desc
        - name: include_zero
          in: query
          description: 사용 횟수가 0인 태그 포함
          schema: 
            type: boolean
            default: false
        - name: include_public
          in: query
          description: 태그를 계산할 때 공개/공유 에셋 포함 여부
          schema: 
            type: boolean
            default: true
      responses: 
        "200": 
          description: 태그를 성공적으로 검색했습니다.
