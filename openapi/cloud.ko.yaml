          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "500": 
          description: 내부 서버 오류
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
components: 
  securitySchemes: 
    ApiKeyAuth: 
      type: apiKey
      in: header
      name: X-API-Key
      description: "API 키 인증. 계정 설정에서 API 키를 생성하세요.\nhttps://platform.comfy.org/profile/api-keys 에서 생성할 수 있습니다. X-API-Key 헤더에 키를 전달하세요.\n"
  schemas: 
    PromptRequest: 
      type: object
      required: 
        - prompt
      properties: 
        prompt: 
          type: object
          description: 실행할 워크플로 그래프
          additionalProperties: true
        number: 
          type: number
          description: "실행 대기열의 우선순위 번호(낮은 숫자가 높은 우선순위를 가짐).\n**참고:** ComfyUI API 호환성을 위해 허용되지만 클라우드에서는 **무시됩니다**.\n클라우드는 사용자별 순서와 공정한 스케줄링을 사용하여 자체 실행 대기열 관리를 사용합니다.\n"
        front: 
          type: boolean
          description: "참이면 프롬프트를 실행 대기열의 맨 앞에 추가합니다.\n**참고:** ComfyUI API 호환성을 위해 허용되지만 클라우드에서는 **무시됩니다**.\n클라우드는 작업 제출 시간과 공정한 스케줄링을 기준으로 내부적으로 실행 대기열 순서를 관리합니다.\n"
        extra_data: 
          type: object
          description: 프롬프트와 연결할 추가 데이터
          additionalProperties: true
        partial_execution_targets: 
          type: array
          items: 
            type: string
          description: 실행할 노드 이름 목록
    PromptResponse: 
      type: object
      properties: 
        prompt_id: 
          type: string
          format: uuid
          description: 프롬프트 실행의 고유 식별자
        number: 
          type: number
          description: 실행 대기열의 우선순위 번호
        node_errors: 
          type: object
          description: 프롬프트 노드의 오류
          additionalProperties: true
    ErrorResponse: 
      type: object
      required: 
        - code
        - message
      properties: 
        code: 
          type: string
        message: 
          type: string
    PromptInfo: 
      type: object
      properties: 
        exec_info: 
          type: object
          properties: 
            queue_remaining: 
              type: integer
              description: 실행 대기열에 남은 항목 수
    NodeInfo: 
      type: object
      properties: 
        input: 
          type: object
          description: 노드의 입력 사양
          additionalProperties: true
        input_order: 
          type: object
          description: 표시를 위한 입력 순서
          additionalProperties: 
            type: array
            items: 
              type: string
        output: 
          type: array
          items: 
            type: string
          description: 노드의 출력 유형
        output_is_list: 
          type: array
          items: 
            type: boolean
          description: 각 출력이 목록인지 여부
        output_name: 
          type: array
          items: 
            type: string
          description: 출력 이름
        name: 
          type: string
          description: 노드의 내부 이름
        display_name: 
          type: string
