  "/api/job/{job_id}/status": 
    get: 
      tags: 
        - job
      summary: 작업 상태 가져오기
      description: 특정 작업의 현재 상태를 ID로 반환합니다.
      operationId: getJobStatus
      parameters: 
        - name: job_id
          in: path
