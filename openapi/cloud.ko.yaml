          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "403": 
          description: "금지됨: 작업이 다른 사용자에게 속함"
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/ErrorResponse"
        "404": 
