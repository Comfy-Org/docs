name: CMS Changelog Sync

on:
  push:
    branches:
      - main
    paths:
      # Changelog content only — script-only merges should not trigger CMS sync
      - 'changelog/index.mdx'
      - 'zh/changelog/index.mdx'
      - 'ja/changelog/index.mdx'
      - 'ko/changelog/index.mdx'

concurrency:
  group: cms-changelog-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-drafts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Simplify EN staging
        env:
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          TRANSLATE_API_BASE_URL: ${{ vars.TRANSLATE_API_BASE_URL }}
          TRANSLATE_API_MODEL: ${{ secrets.TRANSLATE_API_MODEL }}
          CMS_SYNC_BEFORE: ${{ github.event.before }}
          CMS_SYNC_AFTER: ${{ github.sha }}
        run: bun .github/scripts/cms/prepare-cms-changelog.ts --en-only

      - name: Translate staging locales
        env:
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          TRANSLATE_API_BASE_URL: ${{ vars.TRANSLATE_API_BASE_URL }}
          TRANSLATE_API_MODEL: ${{ secrets.TRANSLATE_API_MODEL }}
          CMS_SYNC_BEFORE: ${{ github.event.before }}
          CMS_SYNC_AFTER: ${{ github.sha }}
        run: bun .github/scripts/cms/prepare-cms-changelog.ts --translate-only

      - name: Preview CMS sync
        env:
          CMS_BASE_URL: ${{ vars.CMS_BASE_URL }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_SYNC_BEFORE: ${{ github.event.before }}
          CMS_SYNC_AFTER: ${{ github.sha }}
        run: bun .github/scripts/cms/sync-to-strapi.ts --preview

      - name: Sync changelog drafts to CMS
        env:
          CMS_BASE_URL: ${{ vars.CMS_BASE_URL }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_SYNC_BEFORE: ${{ github.event.before }}
          CMS_SYNC_AFTER: ${{ github.sha }}
        run: bun .github/scripts/cms/sync-to-strapi.ts
