name: CMS Published Versions Check

on:
  pull_request:
    paths:
      - 'changelog/index.mdx'
      - '.github/scripts/cms/published-versions.json'
      - '.github/scripts/cms/cms-config.json'

permissions:
  contents: read

jobs:
  check-published-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify published-versions.json matches CMS
        env:
          CMS_BASE_URL: ${{ vars.CMS_BASE_URL }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
        run: bun .github/scripts/cms/update-published-versions.ts --check
